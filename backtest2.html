<script>
// ============================================================
// INDICATOR LIBRARY (oldest-first arrays)
// ============================================================

function emaArr(closes, p) {
  var n = closes.length, k = 2 / (p + 1), out = new Array(n);
  out[0] = closes[0];
  for (var i = 1; i < n; i++) { out[i] = closes[i] * k + out[i - 1] * (1 - k); }
  return out;
}

function rsiArr(closes, p) {
  var n = closes.length, out = new Array(n).fill(50);
  if (n < p + 1) { return out; }
  var ag = 0, al = 0;
  for (var i = 1; i <= p; i++) {
    var d = closes[i] - closes[i - 1];
    if (d > 0) { ag += d; } else { al -= d; }
  }
  ag /= p; al /= p;
  out[p] = al === 0 ? 100 : 100 - 100 / (1 + ag / al);
  for (var i = p + 1; i < n; i++) {
    var d = closes[i] - closes[i - 1];
    ag = (ag * (p - 1) + (d > 0 ? d : 0)) / p;
    al = (al * (p - 1) + (d < 0 ? -d : 0)) / p;
    out[i] = al === 0 ? 100 : 100 - 100 / (1 + ag / al);
  }
  return out;
}

function atrArr(hi, lo, cl, p) {
  var n = hi.length, out = new Array(n).fill(0);
  if (n < 2) { return out; }
  out[0] = hi[0] - lo[0];
  var sum = out[0];
  for (var i = 1; i < p && i < n; i++) {
    var tr = Math.max(hi[i] - lo[i], Math.abs(hi[i] - cl[i - 1]), Math.abs(lo[i] - cl[i - 1]));
    sum += tr; out[i] = sum / (i + 1);
  }
  if (n <= p) { return out; }
  var prev = sum / p; out[p - 1] = prev;
  for (var i = p; i < n; i++) {
    var tr = Math.max(hi[i] - lo[i], Math.abs(hi[i] - cl[i - 1]), Math.abs(lo[i] - cl[i - 1]));
    prev = (prev * (p - 1) + tr) / p; out[i] = prev;
  }
  return out;
}

function adxArr(hi, lo, cl, p) {
  var n = hi.length, out = new Array(n).fill(0);
  if (n < p + 2) { return out; }
  var dmP = new Array(n).fill(0), dmM = new Array(n).fill(0), tr = new Array(n).fill(0);
  tr[0] = hi[0] - lo[0];
  for (var i = 1; i < n; i++) {
    var up = hi[i] - hi[i - 1], dn = lo[i - 1] - lo[i];
    dmP[i] = (up > dn && up > 0) ? up : 0;
    dmM[i] = (dn > up && dn > 0) ? dn : 0;
    tr[i] = Math.max(hi[i] - lo[i], Math.abs(hi[i] - cl[i - 1]), Math.abs(lo[i] - cl[i - 1]));
  }
  var smTR = 0, smP = 0, smM = 0;
  for (var i = 1; i <= p; i++) { smTR += tr[i]; smP += dmP[i]; smM += dmM[i]; }
  var dxVals = new Array(n).fill(0);
  var diP = smTR > 0 ? 100 * smP / smTR : 0;
  var diM = smTR > 0 ? 100 * smM / smTR : 0;
  dxVals[p] = (diP + diM) > 0 ? 100 * Math.abs(diP - diM) / (diP + diM) : 0;
  for (var i = p + 1; i < n; i++) {
    smTR = smTR - smTR / p + tr[i]; smP = smP - smP / p + dmP[i]; smM = smM - smM / p + dmM[i];
    diP = smTR > 0 ? 100 * smP / smTR : 0; diM = smTR > 0 ? 100 * smM / smTR : 0;
    dxVals[i] = (diP + diM) > 0 ? 100 * Math.abs(diP - diM) / (diP + diM) : 0;
  }
  var cnt = 0, adxSum = 0;
  for (var i = p; i < Math.min(2 * p, n); i++) { adxSum += dxVals[i]; cnt++; }
  if (2 * p - 1 < n) { out[2 * p - 1] = cnt > 0 ? adxSum / cnt : 0; }
  for (var i = 2 * p; i < n; i++) { out[i] = (out[i - 1] * (p - 1) + dxVals[i]) / p; }
  return out;
}

function bbArr(closes, p, m) {
  var n = closes.length, upper = new Array(n).fill(0), lower = new Array(n).fill(0), mid = new Array(n).fill(0);
  for (var i = p - 1; i < n; i++) {
    var sum = 0;
    for (var j = i - p + 1; j <= i; j++) { sum += closes[j]; }
    var mn = sum / p, sq = 0;
    for (var j = i - p + 1; j <= i; j++) { sq += (closes[j] - mn) * (closes[j] - mn); }
    var sd = Math.sqrt(sq / p);
    mid[i] = mn; upper[i] = mn + m * sd; lower[i] = mn - m * sd;
  }
  return { upper: upper, lower: lower, mid: mid };
}

function stochRsiArr(closes, rl, sl, ks, ds) {
  var n = closes.length, rsi = rsiArr(closes, rl), rawK = new Array(n).fill(50);
  for (var i = sl - 1; i < n; i++) {
    var mn = Infinity, mx = -Infinity;
    for (var j = i - sl + 1; j <= i; j++) {
      if (rsi[j] < mn) { mn = rsi[j]; }
      if (rsi[j] > mx) { mx = rsi[j]; }
    }
    rawK[i] = mx === mn ? 50 : 100 * (rsi[i] - mn) / (mx - mn);
  }
  var smoothK = emaArr(rawK, ks), smoothD = emaArr(smoothK, ds);
  return { k: smoothK, d: smoothD };
}

function macdCalc(closes, fast, slow, sig) {
  var emaF = emaArr(closes, fast), emaS = emaArr(closes, slow);
  var n = closes.length, line = new Array(n);
  for (var i = 0; i < n; i++) { line[i] = emaF[i] - emaS[i]; }
  return { macd: line, sig: emaArr(line, sig) };
}

function supertrendArr(hi, lo, cl, p, m) {
  var n = hi.length, trend = new Array(n).fill(1), slLine = new Array(n).fill(0);
  var atr = atrArr(hi, lo, cl, p), upB = new Array(n), loB = new Array(n);
  for (var i = 0; i < n; i++) {
    var mid = (hi[i] + lo[i]) / 2;
    upB[i] = mid + m * atr[i]; loB[i] = mid - m * atr[i];
  }
  slLine[0] = upB[0]; trend[0] = -1;
  for (var i = 1; i < n; i++) {
    var nu = upB[i], nl = loB[i];
    if (cl[i - 1] <= slLine[i - 1]) { nu = Math.min(nu, slLine[i - 1]); }
    if (cl[i - 1] >= slLine[i - 1]) { nl = Math.max(nl, slLine[i - 1]); }
    if (trend[i - 1] === 1) {
      if (cl[i] < nl) { trend[i] = -1; slLine[i] = nu; } else { trend[i] = 1; slLine[i] = nl; }
    } else {
      if (cl[i] > nu) { trend[i] = 1; slLine[i] = nl; } else { trend[i] = -1; slLine[i] = nu; }
    }
  }
  return { trend: trend, slLine: slLine };
}

function haCalc(o, h, l, c) {
  var n = o.length, haO = new Array(n), haH = new Array(n), haL = new Array(n), haC = new Array(n);
  haO[0] = (o[0] + c[0]) / 2; haC[0] = (o[0] + h[0] + l[0] + c[0]) / 4; haH[0] = h[0]; haL[0] = l[0];
  for (var i = 1; i < n; i++) {
    haC[i] = (o[i] + h[i] + l[i] + c[i]) / 4;
    haO[i] = (haO[i - 1] + haC[i - 1]) / 2;
    haH[i] = Math.max(h[i], haO[i], haC[i]);
    haL[i] = Math.min(l[i], haO[i], haC[i]);
  }
  return { haO: haO, haH: haH, haL: haL, haC: haC };
}

function buildInd(candles) {
  var n = candles.length;
  var o = new Array(n), h = new Array(n), l = new Array(n), c = new Array(n);
  for (var i = 0; i < n; i++) {
    o[i] = parseFloat(candles[i][1]); h[i] = parseFloat(candles[i][2]);
    l[i] = parseFloat(candles[i][3]); c[i] = parseFloat(candles[i][4]);
  }
  var ema8 = emaArr(c, 8), ema21 = emaArr(c, 21), ema55 = emaArr(c, 55), ema200 = emaArr(c, 200);
  var rsi14 = rsiArr(c, 14), atr14 = atrArr(h, l, c, 14), adx14 = adxArr(h, l, c, 14);
  var bb = bbArr(c, 20, 2);
  var srsi = stochRsiArr(c, 14, 14, 3, 3);
  var macd = macdCalc(c, 12, 26, 9);
  var st = supertrendArr(h, l, c, 10, 3);
  var ha = haCalc(o, h, l, c);
  return {
    n: n, o: o, h: h, l: l, c: c,
    ema8: ema8, ema21: ema21, ema55: ema55, ema200: ema200,
    rsi14: rsi14, atr14: atr14, adx14: adx14,
    bbU: bb.upper, bbL: bb.lower,
    srsiK: srsi.k, srsiD: srsi.d,
    macdL: macd.macd, macdS: macd.sig,
    stTrend: st.trend, stSl: st.slLine,
    haO: ha.haO, haC: ha.haC
  };
}

function aggCandles(c5, factor) {
  var result = [], n = c5.length;
  for (var g = 0; g * factor < n; g++) {
    var start = g * factor, end = Math.min(start + factor, n);
    var grp = c5.slice(start, end);
    if (!grp.length) { continue; }
    var hiV = -Infinity, loV = Infinity, vol = 0;
    for (var j = 0; j < grp.length; j++) {
      var hv = parseFloat(grp[j][2]), lv = parseFloat(grp[j][3]);
      if (hv > hiV) { hiV = hv; }
      if (lv < loV) { loV = lv; }
      vol += parseFloat(grp[j][5] || 0);
    }
    result.push([grp[0][0], grp[0][1], String(hiV), String(loV), grp[grp.length - 1][4], String(vol)]);
  }
  return result;
}

// ============================================================
// SIGNAL FUNCTIONS
// ============================================================

function scalpSig(stratId, i, ind) {
  if (i < 2) { return null; }
  if (ind.adx14[i] < 20) { return null; }
  var atr = ind.atr14[i]; if (!atr || atr <= 0) { return null; }
  var bull = ind.c[i] > ind.ema200[i], bear = ind.c[i] < ind.ema200[i];
  var haUp = ind.haC[i] > ind.haO[i], haDn = ind.haC[i] < ind.haO[i];

  if (stratId === 's_ema38') {
    var tUp = ind.ema8[i] > ind.ema21[i] && bull;
    var tDn = ind.ema8[i] < ind.ema21[i] && bear;
    var rUp = ind.rsi14[i] > ind.rsi14[i - 1] && ind.rsi14[i] < 55;
    var rDn = ind.rsi14[i] < ind.rsi14[i - 1] && ind.rsi14[i] > 45;
    if (tUp && rUp && haUp) { return { type: 'long',  stopLoss: ind.c[i] - atr * 1.5 }; }
    if (tDn && rDn && haDn) { return { type: 'short', stopLoss: ind.c[i] + atr * 1.5 }; }
  }
  if (stratId === 's_bb') {
    var pb = ind.c[i - 1] < ind.bbL[i - 1] && ind.c[i] >= ind.bbL[i];
    var ps = ind.c[i - 1] > ind.bbU[i - 1] && ind.c[i] <= ind.bbU[i];
    if (pb && bull && ind.rsi14[i] < 45 && haUp) { return { type: 'long',  stopLoss: ind.c[i] - atr * 1.5 }; }
    if (ps && bear && ind.rsi14[i] > 55 && haDn) { return { type: 'short', stopLoss: ind.c[i] + atr * 1.5 }; }
  }
  if (stratId === 's_stoch') {
    var kU = ind.srsiK[i] > ind.srsiD[i] && ind.srsiK[i - 1] <= ind.srsiD[i - 1] && ind.srsiK[i] < 30;
    var kD = ind.srsiK[i] < ind.srsiD[i] && ind.srsiK[i - 1] >= ind.srsiD[i - 1] && ind.srsiK[i] > 70;
    if (kU && bull && ind.c[i] > ind.ema21[i] && haUp) { return { type: 'long',  stopLoss: ind.c[i] - atr * 1.2 }; }
    if (kD && bear && ind.c[i] < ind.ema21[i] && haDn) { return { type: 'short', stopLoss: ind.c[i] + atr * 1.2 }; }
  }
  return null;
}

function daySig(stratId, i, ind) {
  if (i < 2) { return null; }
  if (ind.adx14[i] < 20) { return null; }
  var atr = ind.atr14[i]; if (!atr || atr <= 0) { return null; }
  var bull = ind.c[i] > ind.ema200[i], bear = ind.c[i] < ind.ema200[i];
  var haUp = ind.haC[i] > ind.haO[i], haDn = ind.haC[i] < ind.haO[i];

  if (stratId === 'd_macd') {
    var cU = ind.macdL[i] > ind.macdS[i] && ind.macdL[i - 1] <= ind.macdS[i - 1];
    var cD = ind.macdL[i] < ind.macdS[i] && ind.macdL[i - 1] >= ind.macdS[i - 1];
    if (cU && bull && ind.ema21[i] > ind.ema55[i]) { return { type: 'long',  stopLoss: ind.c[i] - atr * 1.5 }; }
    if (cD && bear && ind.ema21[i] < ind.ema55[i]) { return { type: 'short', stopLoss: ind.c[i] + atr * 1.5 }; }
  }
  if (stratId === 'd_st') {
    var fU = ind.stTrend[i] === 1 && ind.stTrend[i - 1] === -1;
    var fD = ind.stTrend[i] === -1 && ind.stTrend[i - 1] === 1;
    if (fU && bull) { return { type: 'long',  stopLoss: ind.stSl[i] }; }
    if (fD && bear) { return { type: 'short', stopLoss: ind.stSl[i] }; }
  }
  if (stratId === 'd_rsi') {
    var r5U = ind.rsi14[i] > 50 && ind.rsi14[i - 1] <= 50 && bull;
    var r5D = ind.rsi14[i] < 50 && ind.rsi14[i - 1] >= 50 && bear;
    if (r5U && haUp) { return { type: 'long',  stopLoss: ind.c[i] - atr * 1.5 }; }
    if (r5D && haDn) { return { type: 'short', stopLoss: ind.c[i] + atr * 1.5 }; }
  }
  return null;
}

function swingSig(stratId, i, ind) {
  if (i < 2) { return null; }
  if (ind.adx14[i] < 20) { return null; }
  var atr = ind.atr14[i]; if (!atr || atr <= 0) { return null; }
  var bull = ind.c[i] > ind.ema200[i], bear = ind.c[i] < ind.ema200[i];
  var haUp = ind.haC[i] > ind.haO[i], haDn = ind.haC[i] < ind.haO[i];

  if (stratId === 'w_ha_srsi') {
    var haBull = haUp, haPrevBear = ind.haC[i - 1] <= ind.haO[i - 1];
    var haBear = haDn, haPrevBull = ind.haC[i - 1] >= ind.haO[i - 1];
    var kU = ind.srsiK[i] > ind.srsiD[i] && ind.srsiK[i - 1] <= ind.srsiD[i - 1] && ind.srsiK[i] < 30;
    var kD = ind.srsiK[i] < ind.srsiD[i] && ind.srsiK[i - 1] >= ind.srsiD[i - 1] && ind.srsiK[i] > 70;
    if (haBull && haPrevBear && kU && bull) { return { type: 'long',  stopLoss: ind.c[i] - atr * 2.5 }; }
    if (haBear && haPrevBull && kD && bear) { return { type: 'short', stopLoss: ind.c[i] + atr * 2.5 }; }
  }
  if (stratId === 'w_ema2155') {
    var bT = ind.ema21[i] > ind.ema55[i] && bull;
    var brT = ind.ema21[i] < ind.ema55[i] && bear;
    var near = ind.c[i] >= ind.ema21[i] * 0.99 && ind.c[i] <= ind.ema21[i] * 1.01;
    if (bT && near && ind.srsiK[i] < 35 && haUp) { return { type: 'long',  stopLoss: ind.c[i] - atr * 2.0 }; }
    if (brT && near && ind.srsiK[i] > 65 && haDn) { return { type: 'short', stopLoss: ind.c[i] + atr * 2.0 }; }
  }
  if (stratId === 'w_macd') {
    var mU = ind.macdL[i] > ind.macdS[i] && ind.macdL[i - 1] <= ind.macdS[i - 1];
    var mD = ind.macdL[i] < ind.macdS[i] && ind.macdL[i - 1] >= ind.macdS[i - 1];
    if (mU && bull && haUp) { return { type: 'long',  stopLoss: ind.c[i] - atr * 2.0 }; }
    if (mD && bear && haDn) { return { type: 'short', stopLoss: ind.c[i] + atr * 2.0 }; }
  }
  return null;
}

// ============================================================
// BACKTEST ENGINE
// ============================================================

function runBacktest(c5, stratId, tier, riskFrac, leverage, posSizePct, rrMult) {
  var ind5   = buildInd(c5);
  var c15    = aggCandles(c5, 3),  c4h = aggCandles(c5, 48);
  var ind15  = buildInd(c15),      ind4h = buildInd(c4h);

  var equity = 10000, pos = null, pending = null;
  var wins = 0, total = 0, trades = [], curve = [], lastDay = -1;

  var WARMUP = tier === 'SCALP' ? 500 : tier === 'DAY' ? 1500 : 9600;
  var SL_MIN = tier === 'SCALP' ? 0.001 : tier === 'DAY' ? 0.003 : 0.005;
  var SL_MAX = tier === 'SCALP' ? 0.015 : tier === 'DAY' ? 0.030 : 0.080;
  var FEE    = 0.0004;
  var maxNF  = (posSizePct / 100) * leverage;

  for (var i = WARMUP; i < c5.length - 1; i++) {
    var ts   = parseInt(c5[i][0]);
    var hi5  = parseFloat(c5[i][2]);
    var lo5  = parseFloat(c5[i][3]);
    var cl5  = parseFloat(c5[i][4]);
    var day  = Math.floor(ts / 86400000);
    if (day !== lastDay) { curve.push({ ts: ts, equity: equity }); lastDay = day; }

    if (pending && !pos) {
      var op5 = parseFloat(c5[i][1]);
      var slD = Math.abs(op5 - pending.sl) / op5;
      if (slD >= SL_MIN && slD <= SL_MAX) {
        var nf   = Math.min(riskFrac / slD, maxNF);
        var slAmt = Math.abs(op5 - pending.sl);
        var tp   = pending.dir === 'long' ? op5 + slAmt * rrMult : op5 - slAmt * rrMult;
        pos = { dir: pending.dir, entry: op5, sl: pending.sl, tp: tp, nf: nf };
        equity = Math.max(100, equity * (1 - nf * FEE));
      }
      pending = null;
    }

    if (pos) {
      var slHit = pos.dir === 'long' ? lo5 <= pos.sl : hi5 >= pos.sl;
      var tpHit = pos.dir === 'long' ? hi5 >= pos.tp : lo5 <= pos.tp;
      if (slHit || tpHit) {
        var win    = tpHit && !slHit;
        var exitPx = win ? pos.tp : pos.sl;
        var ret    = pos.dir === 'long' ? (exitPx - pos.entry) / pos.entry : (pos.entry - exitPx) / pos.entry;
        var pnl    = equity * pos.nf * ret;
        equity = Math.max(100, equity + pnl - equity * pos.nf * FEE);
        trades.push({ ts: ts, type: win ? 'WIN' : 'LOSS', pnl: pnl, eq: equity });
        if (win) { wins++; }
        total++;
        pos = null;
      }
    }

    if (!pos && !pending) {
      var sig = null;
      if (tier === 'SCALP') {
        sig = scalpSig(stratId, i, ind5);
      } else if (tier === 'DAY' && i % 3 === 2) {
        var i15 = Math.floor(i / 3);
        if (i15 >= 300) { sig = daySig(stratId, i15, ind15); }
      } else if (tier === 'SWING' && i % 48 === 47) {
        var i4h = Math.floor(i / 48);
        if (i4h >= 210) { sig = swingSig(stratId, i4h, ind4h); }
      }
      if (sig && sig.stopLoss) {
        var dd = Math.abs(cl5 - sig.stopLoss) / cl5;
        if (dd >= SL_MIN && dd <= SL_MAX) {
          pending = { dir: sig.type, sl: sig.stopLoss };
        }
      }
    }
  }

  var wr = total > 0 ? wins / total : 0;
  var nDays = curve.length || 365;
  var totalRet = (equity - 10000) / 10000;
  var annRet   = Math.pow(1 + totalRet, 365 / nDays) - 1;
  var monRet   = Math.pow(1 + annRet, 1 / 12) - 1;
  var peak = 0, maxDD = 0;
  for (var j = 0; j < curve.length; j++) {
    if (curve[j].equity > peak) { peak = curve[j].equity; }
    var dd2 = (peak - curve[j].equity) / peak;
    if (dd2 > maxDD) { maxDD = dd2; }
  }
  var ev = total > 0 ? wr * rrMult - (1 - wr) : 0;
  var annTrades = Math.round(total * 365 / nDays);
  return {
    equity: equity, totalRet: totalRet, annRet: annRet, monRet: monRet,
    totalTrades: total, annTrades: annTrades, winRate: wr, ev: ev, rrMult: rrMult,
    maxDD: maxDD, curve: curve, trades: trades
  };
}

// ============================================================
// OKX DATA FETCH
// ============================================================

async function fetchCandles5m(pair, onProgress) {
  var ONE_YEAR = Math.floor(Date.now() / 3600000) * 3600000 - 365 * 24 * 3600 * 1000;
  var all = [], after = '';
  for (var iter = 0; iter < 1200; iter++) {
    var qs = 'instId=' + encodeURIComponent(pair) + '&bar=5m&limit=100' + (after ? '&after=' + after : '');
    try {
      var res = await fetch('https://www.okx.com/api/v5/market/history-candles?' + qs);
      var j = await res.json();
      var batch = j.data || [];
      if (!batch.length) { break; }
      all.push.apply(all, batch);
      after = batch[batch.length - 1][0];
      if (onProgress) { onProgress(all.length); }
      if (parseInt(batch[batch.length - 1][0]) <= ONE_YEAR) { break; }
      await new Promise(function(r) { setTimeout(r, 55); });
    } catch (e) { break; }
  }
  var seen = {}, deduped = [];
  all.forEach(function(c) { if (!seen[c[0]]) { seen[c[0]] = 1; deduped.push(c); } });
  deduped = deduped.filter(function(c) { return parseInt(c[0]) >= ONE_YEAR; });
  deduped.sort(function(a, b) { return parseInt(a[0]) - parseInt(b[0]); });
  return deduped;
}

// ============================================================
// STRATEGY REGISTRY
// ============================================================

var STRATS = [
  { id: 's_ema38',   name: 'EMA 3/8 교차',    tier: 'SCALP'  },
  { id: 's_bb',      name: 'BB 밴드 반등',     tier: 'SCALP'  },
  { id: 's_stoch',   name: 'StochRSI 5m',      tier: 'SCALP'  },
  { id: 'd_macd',    name: 'MACD 15m',         tier: 'DAY'    },
  { id: 'd_st',      name: '슈퍼트렌드 15m',   tier: 'DAY'    },
  { id: 'd_rsi',     name: 'RSI 50 15m',       tier: 'DAY'    },
  { id: 'w_ha_srsi', name: 'HA+StochRSI 4H',   tier: 'SWING'  },
  { id: 'w_ema2155', name: 'EMA 21/55 4H',     tier: 'SWING'  },
  { id: 'w_macd',    name: 'MACD 4H',          tier: 'SWING'  }
];

// ============================================================
// STATE
// ============================================================

var _c5 = null, _loadedPair = '', _results = {}, _chart = null;

// ============================================================
// UI HELPERS
// ============================================================

function setProgress(p, msg) {
  document.getElementById('progBar').style.width = (p || 0) + '%';
  if (msg !== undefined) { document.getElementById('progMsg').textContent = msg; }
}

function setBusy(busy) {
  var r = document.getElementById('btnRun'), q = document.getElementById('btnQuick');
  r.disabled = busy; q.disabled = busy;
  r.textContent = busy ? '실행 중...' : '백테스팅 시작';
}

function fmtPct(v, d) { d = (d == null) ? 2 : d; return (v >= 0 ? '+' : '') + (v * 100).toFixed(d) + '%'; }
function clr(v) { return v >= 0 ? '#22c55e' : '#ef4444'; }

function tierCss(t) { return t === 'SCALP' ? 'scalp' : t === 'DAY' ? 'day' : 'swing'; }
function tierColor(t) { return t === 'SCALP' ? '#fbbf24' : t === 'DAY' ? '#60a5fa' : '#4ade80'; }

function getCfg() {
  return {
    pair:      (document.getElementById('cfgPair').value  || 'BTC-USDT-SWAP').trim().toUpperCase(),
    lev:       parseFloat(document.getElementById('cfgLev').value)    || 10,
    rr:        parseFloat(document.getElementById('cfgRR').value)     || 2.0,
    riskScalp: parseFloat(document.getElementById('riskScalp').value) / 100 || 0.005,
    riskDay:   parseFloat(document.getElementById('riskDay').value)   / 100 || 0.010,
    riskSwing: parseFloat(document.getElementById('riskSwing').value) / 100 || 0.020,
    posScalp:  parseFloat(document.getElementById('posScalp').value)  || 5,
    posDay:    parseFloat(document.getElementById('posDay').value)    || 7,
    posSwing:  parseFloat(document.getElementById('posSwing').value)  || 10
  };
}

function riskForTier(cfg, tier) {
  if (tier === 'SCALP') { return { risk: cfg.riskScalp, pos: cfg.posScalp }; }
  if (tier === 'DAY')   { return { risk: cfg.riskDay,   pos: cfg.posDay   }; }
  return                         { risk: cfg.riskSwing, pos: cfg.posSwing };
}

// ============================================================
// RENDER TABLE + TABS
// ============================================================

function renderResults(cfg) {
  var tbody = document.getElementById('resTbody');
  var tabs  = document.getElementById('chartTabs');
  tbody.innerHTML = '';
  tabs.innerHTML  = '';

  STRATS.forEach(function(s) {
    var r = _results[s.id]; if (!r) { return; }
    var na   = r.totalTrades === 0;
    var tCls = tierCss(s.tier);

    var evTxt = na ? 'N/A' : '<span style="color:' + clr(r.ev)              + '">' + r.ev.toFixed(3)                          + '</span>';
    var wrTxt = na ? 'N/A' : '<span style="color:' + clr(r.winRate - 0.5)   + '">' + (r.winRate * 100).toFixed(1) + '%'        + '</span>';
    var mrTxt = na ? 'N/A' : '<span style="color:' + clr(r.monRet)          + '">' + fmtPct(r.monRet)                         + '</span>';
    var arTxt = na ? 'N/A' : '<span style="color:' + clr(r.annRet)          + '">' + fmtPct(r.annRet, 1)                      + '</span>';
    var ddTxt = na ? 'N/A' : '<span style="color:#ef4444">-'                        + fmtPct(r.maxDD, 1).replace('+','')       + '</span>';
    var cnt   = r.totalTrades + (r.annTrades ? ' / ~' + r.annTrades + '/y' : '');

    var tr = document.createElement('tr');
    tr.innerHTML =
      '<td><strong>' + s.name + '</strong></td>' +
      '<td><span class="tier-label tier-' + tCls + '" style="font-size:11px;padding:2px 7px;border-radius:4px;">' + s.tier + '</span></td>' +
      '<td>' + cnt + '</td>' +
      '<td>' + wrTxt + '</td>' +
      '<td>' + evTxt + '</td>' +
      '<td>' + mrTxt + '</td>' +
      '<td>' + arTxt + '</td>' +
      '<td>' + ddTxt + '</td>' +
      '<td style="text-align:center;">' +
        '<button onclick="showChart(\'' + s.id + '\')" ' +
        'style="background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);' +
        'color:#fff;padding:4px 12px;border-radius:6px;cursor:pointer;font-size:12px;font-family:inherit;">차트</button>' +
      '</td>';
    tbody.appendChild(tr);

    var tab = document.createElement('button');
    tab.className = 'tab ' + tCls;
    tab.id        = 'tab_' + s.id;
    tab.textContent = s.name;
    (function(id) { tab.onclick = function() { showChart(id); }; })(s.id);
    tabs.appendChild(tab);
  });

  var rrV = cfg.rr, bep = (1 / (rrV + 1) * 100).toFixed(1);
  document.getElementById('evRow').innerHTML =
    '<div class="ev-item"><span>R:R</span>' + rrV.toFixed(1) + '</div>' +
    '<div class="ev-item"><span>손익분기 승률</span>' + bep + '%</div>' +
    '<div class="ev-item"><span>EV 공식</span>WR &times; ' + rrV.toFixed(1) + ' &minus; (1 &minus; WR)</div>';

  document.getElementById('cardResults').classList.remove('hidden');
  document.getElementById('cardChart').classList.remove('hidden');
}

// ============================================================
// CHART
// ============================================================

function showChart(stratId) {
  var s = null;
  for (var k = 0; k < STRATS.length; k++) { if (STRATS[k].id === stratId) { s = STRATS[k]; break; } }
  var r = _results[stratId];
  if (!s || !r) { return; }

  for (var k = 0; k < STRATS.length; k++) {
    var t = document.getElementById('tab_' + STRATS[k].id);
    if (t) { t.classList.toggle('active', STRATS[k].id === stratId); }
  }

  document.getElementById('chartTitle').textContent =
    s.name + '  |  연 복리: ' + fmtPct(r.annRet, 1) +
    '  |  승률: ' + (r.winRate * 100).toFixed(1) + '%' +
    '  |  거래: ' + r.totalTrades + '건' +
    '  |  최대낙폭: -' + fmtPct(r.maxDD, 1).replace('+', '');

  var ctx = document.getElementById('eqCanvas').getContext('2d');
  if (_chart) { _chart.destroy(); _chart = null; }

  var labels = r.curve.map(function(p) {
    return new Date(p.ts).toLocaleDateString('ko-KR', { month: '2-digit', day: '2-digit' });
  });
  var data = r.curve.map(function(p) { return p.equity; });
  var col  = tierColor(s.tier);
  var grd  = ctx.createLinearGradient(0, 0, 0, 280);
  grd.addColorStop(0, col + '44');
  grd.addColorStop(1, 'rgba(0,0,0,0)');

  _chart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: labels,
      datasets: [{
        label: '자산 ($)',
        data: data,
        borderColor: col,
        borderWidth: 1.8,
        pointRadius: 0,
        fill: true,
        backgroundColor: grd,
        tension: 0.25
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: function(c) { return '$' + c.parsed.y.toFixed(0); } } }
      },
      scales: {
        x: {
          ticks: { color: 'rgba(255,255,255,0.3)', maxTicksLimit: 12, font: { size: 10 } },
          grid:  { color: 'rgba(255,255,255,0.04)' }
        },
        y: {
          ticks: {
            color: 'rgba(255,255,255,0.4)', font: { size: 10 },
            callback: function(v) { return '$' + v.toFixed(0); }
          },
          grid: { color: 'rgba(255,255,255,0.06)' }
        }
      }
    }
  });

  document.getElementById('cardChart').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

// ============================================================
// MAIN FLOW
// ============================================================

async function _run(forceRefetch) {
  setBusy(true);
  try {
    var cfg = getCfg();
    setProgress(2, '시작됨...');

    if (forceRefetch || !_c5 || _c5.length === 0 || _loadedPair !== cfg.pair) {
      setProgress(3, 'OKX 5분봉 데이터 수집 중...');
      _c5 = await fetchCandles5m(cfg.pair, function(n) {
        setProgress(Math.min(40, Math.round(n / 2630)), '5분봉 수집: ' + n.toLocaleString() + '개...');
      });
      _loadedPair = cfg.pair;
    } else {
      setProgress(40, '캐시 재사용: ' + _c5.length.toLocaleString() + '개 5분봉');
    }

    setProgress(42, '지표 계산 및 백테스팅 실행 중 (' + _c5.length.toLocaleString() + '개 봉)...');
    await new Promise(function(r) { setTimeout(r, 10); });

    _results = {};
    for (var i = 0; i < STRATS.length; i++) {
      var s   = STRATS[i];
      var rk  = riskForTier(cfg, s.tier);
      var pct2 = 42 + Math.round((i / STRATS.length) * 56);
      setProgress(pct2, '[' + (i + 1) + '/' + STRATS.length + '] ' + s.name + ' 실행 중...');
      await new Promise(function(r) { setTimeout(r, 0); });
      _results[s.id] = runBacktest(_c5, s.id, s.tier, rk.risk, cfg.lev, rk.pos, cfg.rr);
    }

    setProgress(100, '완료! ' + STRATS.length + '개 전략 · 5분봉 ' + _c5.length.toLocaleString() + '개 사용');
    renderResults(cfg);
    showChart(STRATS[0].id);
  } catch (e) {
    setProgress(0, '오류: ' + (e.message || String(e)));
    console.error(e);
  } finally {
    setBusy(false);
  }
}

function startBacktest() { _run(true); }
function startQuick()    { _run(false); }
</script>
