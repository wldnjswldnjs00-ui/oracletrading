<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 - Oracle Trading</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --primary: #0071e3;
            --secondary: #f5f5f7;
            --text: #1d1d1f;
            --text-light: #86868b;
            --border: #d2d2d7;
            --success: #34c759;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: white;
            color: var(--text);
        }
        
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 40px;
            border-bottom: 1px solid var(--border);
        }
        
        .logo {
            font-size: 1.3em;
            font-weight: 600;
            background: linear-gradient(135deg, #0071e3, #00c4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 60px 20px;
        }
        
        h1 {
            font-size: 2.4em;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }
        
        .subtitle {
            color: var(--text-light);
            font-size: 1.05em;
            margin-bottom: 40px;
            font-weight: 400;
        }
        
        .form-group {
            margin-bottom: 24px;
        }
        
        label {
            display: block;
            font-size: 0.95em;
            font-weight: 500;
            margin-bottom: 8px;
            color: var(--text);
        }
        
        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 1em;
            transition: all 0.3s;
            background: var(--secondary);
            color: var(--text);
        }
        
        input[type="email"]:focus,
        input[type="password"]:focus {
            outline: none;
            background: white;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0, 113, 227, 0.1);
        }
        
        .btn {
            width: 100%;
            padding: 14px 16px;
            border: none;
            border-radius: 10px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 20px;
        }
        
        .btn-primary {
            background: var(--primary);
            color: white;
        }
        
        .btn-primary:hover:not(:disabled) {
            background: #0a66d2;
            box-shadow: 0 8px 24px rgba(0, 113, 227, 0.15);
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .divider {
            text-align: center;
            color: var(--text-light);
            margin: 32px 0;
            font-size: 0.95em;
        }
        
        .divider::before {
            content: '';
            display: block;
            height: 1px;
            background: var(--border);
            margin-bottom: 12px;
        }
        
        .2fa-options {
            background: var(--secondary);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .2fa-title {
            font-weight: 600;
            margin-bottom: 12px;
            font-size: 0.95em;
        }
        
        .2fa-option {
            display: flex;
            align-items: center;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 8px;
        }
        
        .2fa-option:hover {
            background: white;
        }
        
        .2fa-option input[type="radio"] {
            margin-right: 12px;
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
        
        .2fa-option label {
            margin: 0;
            cursor: pointer;
            flex: 1;
        }
        
        .signup-link {
            text-align: center;
            margin-top: 32px;
            color: var(--text-light);
        }
        
        .signup-link a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }
        
        .signup-link a:hover {
            text-decoration: underline;
        }
        
        .info-box {
            background: #f0f9ff;
            border-left: 4px solid var(--primary);
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 24px;
            font-size: 0.9em;
            color: #1e40af;
        }
        
        .info-icon {
            font-size: 1.2em;
            margin-right: 8px;
        }
        
        @media (max-width: 600px) {
            .container {
                padding: 40px 20px;
            }
            
            h1 {
                font-size: 1.8em;
            }
        }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="logo">🚀 Oracle Trading</div>
        <div>
            <a href="signup.html" style="text-decoration: none; color: var(--primary); font-weight: 600;">회원가입</a>
        </div>
    </div>
    
    <div class="container">
        <h1>로그인</h1>
        <p class="subtitle">당신의 거래 계정에 접근하세요</p>
        
        <div class="info-box">
            <span class="info-icon">🔐</span>
            <strong>보안 로그인</strong>: 매번 로그인할 때 이메일 또는 휴대폰으로 인증 코드를 받게 됩니다. 이는 당신의 계정을 안전하게 보호합니다.
        </div>
        
        <form id="loginForm">
            <div class="form-group">
                <label for="email">이메일 주소</label>
                <input type="email" id="email" placeholder="you@example.com" required>
            </div>
            
            <div class="form-group">
                <label for="password">비밀번호</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            
            <div class="2fa-options">
                <div class="2fa-title">📱 2단계 인증 방식 선택</div>
                
                <div class="2fa-option">
                    <input type="radio" id="email2fa" name="2fa" value="email" checked>
                    <label for="email2fa">이메일로 인증코드 받기</label>
                </div>
                
                <div class="2fa-option">
                    <input type="radio" id="phone2fa" name="2fa" value="phone">
                    <label for="phone2fa">휴대폰 SMS로 인증코드 받기</label>
                </div>
            </div>
            
            <button type="submit" class="btn btn-primary">로그인</button>
        </form>
        
        <div class="divider">또는</div>
        
        <div style="text-align: center;">
            <p style="color: var(--text-light); margin-bottom: 16px;">아직 계정이 없으신가요?</p>
            <a href="signup.html" class="btn btn-primary" style="text-decoration: none;">회원가입 하기</a>
        </div>
        
        <div style="text-align: center; margin-top: 24px;">
            <a href="#" style="color: var(--text-light); text-decoration: none; font-size: 0.9em;">비밀번호를 잊으셨나요?</a>
        </div>
    </div>
    
    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const twoFa = document.querySelector('input[name="2fa"]:checked').value;
            
            console.log('로그인:', { email, password, twoFa });
            alert(`로그인 중... (2FA: ${twoFa === 'email' ? '이메일' : 'SMS'})`);
        });
    </script>
</body>
</html>
