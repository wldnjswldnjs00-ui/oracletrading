<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 - Oracle Trading</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --primary: #0071e3;
            --secondary: #f5f5f7;
            --text: #1d1d1f;
            --text-light: #86868b;
            --border: #d2d2d7;
            --success: #34c759;
            --danger: #ff3b30;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: white;
            color: var(--text);
        }
        
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 40px;
            border-bottom: 1px solid var(--border);
        }
        
        .logo {
            font-size: 1.3em;
            font-weight: 600;
            background: linear-gradient(135deg, #0071e3, #00c4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 60px 20px;
        }
        
        h1 {
            font-size: 2.4em;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }
        
        .subtitle {
            color: var(--text-light);
            font-size: 1.05em;
            margin-bottom: 40px;
            font-weight: 400;
        }
        
        .step-indicator {
            display: flex;
            justify-content: space-between;
            margin-bottom: 40px;
        }
        
        .step {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
        }
        
        .step-number {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            color: var(--text-light);
            margin-bottom: 8px;
            transition: all 0.3s;
        }
        
        .step.active .step-number {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 12px rgba(0, 113, 227, 0.2);
        }
        
        .step.completed .step-number {
            background: var(--success);
            color: white;
        }
        
        .step-label {
            font-size: 0.85em;
            color: var(--text-light);
            text-align: center;
        }
        
        .step.active .step-label {
            color: var(--text);
            font-weight: 500;
        }
        
        .form-group {
            margin-bottom: 24px;
        }
        
        label {
            display: block;
            font-size: 0.95em;
            font-weight: 500;
            margin-bottom: 8px;
            color: var(--text);
        }
        
        input[type="email"],
        input[type="password"],
        input[type="text"] {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 1em;
            transition: all 0.3s;
            background: var(--secondary);
            color: var(--text);
        }
        
        input:focus {
            outline: none;
            background: white;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0, 113, 227, 0.1);
        }
        
        .password-strength {
            margin-top: 8px;
            height: 4px;
            background: var(--border);
            border-radius: 2px;
            overflow: hidden;
        }
        
        .password-strength-bar {
            height: 100%;
            width: 0%;
            border-radius: 2px;
            transition: all 0.3s;
        }
        
        .password-strength-text {
            font-size: 0.8em;
            margin-top: 6px;
            color: var(--text-light);
        }
        
        .checkbox {
            display: flex;
            align-items: flex-start;
            margin-bottom: 20px;
        }
        
        .checkbox input[type="checkbox"] {
            width: 18px;
            height: 18px;
            margin-top: 2px;
            margin-right: 12px;
            cursor: pointer;
            accent-color: var(--primary);
        }
        
        .checkbox label {
            margin: 0;
            font-size: 0.9em;
            cursor: pointer;
            line-height: 1.5;
        }
        
        .checkbox a {
            color: var(--primary);
            text-decoration: none;
        }
        
        .checkbox a:hover {
            text-decoration: underline;
        }
        
        .btn {
            width: 100%;
            padding: 14px 16px;
            border: none;
            border-radius: 10px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 20px;
        }
        
        .btn-primary {
            background: var(--primary);
            color: white;
        }
        
        .btn-primary:hover:not(:disabled) {
            background: #0a66d2;
            box-shadow: 0 8px 24px rgba(0, 113, 227, 0.15);
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .btn-secondary {
            background: var(--secondary);
            color: var(--text);
            margin-right: 10px;
        }
        
        .btn-secondary:hover {
            background: var(--border);
        }
        
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        
        .btn-group .btn {
            flex: 1;
            margin-top: 0;
        }
        
        .info-box {
            background: #f0f9ff;
            border-left: 4px solid var(--primary);
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 24px;
            font-size: 0.9em;
            color: #1e40af;
        }
        
        .success-box {
            background: #f0fdf4;
            border-left: 4px solid var(--success);
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 24px;
            text-align: center;
        }
        
        .success-icon {
            font-size: 3em;
            margin-bottom: 12px;
        }
        
        .success-text {
            font-size: 1.1em;
            font-weight: 600;
            color: #166534;
            margin-bottom: 8px;
        }
        
        .success-subtext {
            font-size: 0.9em;
            color: #15803d;
        }
        
        .step-content {
            display: none;
        }
        
        .step-content.active {
            display: block;
        }
        
        .login-link {
            text-align: center;
            color: var(--text-light);
            margin-top: 24px;
        }
        
        .login-link a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }
        
        @media (max-width: 600px) {
            .container {
                padding: 40px 20px;
            }
            
            h1 {
                font-size: 1.8em;
            }
            
            .step-label {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="logo">🚀 Oracle Trading</div>
        <div>
            <a href="login.html" style="text-decoration: none; color: var(--primary); font-weight: 600;">로그인</a>
        </div>
    </div>
    
    <div class="container">
        <h1>계정 만들기</h1>
        <p class="subtitle">자동 매매 봇을 시작하세요</p>
        
        <!-- Step Indicator -->
        <div class="step-indicator">
            <div class="step active" id="step1-indicator">
                <div class="step-number">1</div>
                <div class="step-label">정보입력</div>
            </div>
            <div class="step" id="step2-indicator">
                <div class="step-number">2</div>
                <div class="step-label">검증</div>
            </div>
            <div class="step" id="step3-indicator">
                <div class="step-number">3</div>
                <div class="step-label">완료</div>
            </div>
        </div>
        
        <!-- Step 1: 기본 정보 -->
        <div class="step-content active" id="step1">
            <div class="info-box">
                💡 <strong>팁</strong>: 우리 <a href="https://okx.com/join/ORACLETRADING" target="_blank" style="color: inherit; text-decoration: underline;">레퍼럴 링크</a>로 OKX에 가입하면 <strong>엔터프라이즈 플랜을 영구 무료</strong>로 사용할 수 있습니다!
            </div>
            
            <form id="form1">
                <div class="form-group">
                    <label for="email">이메일 주소</label>
                    <input type="email" id="email" placeholder="you@example.com" required>
                </div>
                
                <div class="form-group">
                    <label for="password">비밀번호</label>
                    <input type="password" id="password" placeholder="최소 8글자 이상" required>
                    <div class="password-strength">
                        <div class="password-strength-bar" id="passwordStrengthBar"></div>
                    </div>
                    <div class="password-strength-text" id="passwordStrengthText">약함</div>
                </div>
                
                <div class="form-group">
                    <label for="password-confirm">비밀번호 확인</label>
                    <input type="password" id="password-confirm" placeholder="비밀번호 다시 입력" required>
                </div>
                
                <div class="checkbox">
                    <input type="checkbox" id="terms" required>
                    <label for="terms">
                        <a href="#">이용약관</a> 및 <a href="#">개인정보 처리방침</a>에 동의합니다
                    </label>
                </div>
                
                <button type="button" class="btn btn-primary" onclick="nextStep()">계속</button>
            </form>
            
            <div class="login-link">
                이미 계정이 있으신가요? <a href="login.html">로그인</a>
            </div>
        </div>
        
        <!-- Step 2: 검증 -->
        <div class="step-content" id="step2">
            <div class="info-box">
                📧 <strong>이메일 확인</strong>: 가입 완료를 위해 이메일 인증이 필요합니다.
            </div>
            
            <form id="form2">
                <div class="form-group">
                    <label>인증 방식 선택</label>
                    <div style="background: var(--secondary); border-radius: 10px; padding: 16px;">
                        <div style="display: flex; align-items: center; margin-bottom: 12px; cursor: pointer;">
                            <input type="radio" id="email-verify" name="verify" value="email" checked>
                            <label for="email-verify" style="margin: 0; margin-left: 12px; cursor: pointer;">이메일로 인증코드 받기</label>
                        </div>
                        <div style="display: flex; align-items: center; cursor: pointer;">
                            <input type="radio" id="phone-verify" name="verify" value="phone">
                            <label for="phone-verify" style="margin: 0; margin-left: 12px; cursor: pointer;">휴대폰 SMS로 인증코드 받기</label>
                        </div>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="verification-code">인증코드</label>
                    <input type="text" id="verification-code" placeholder="6자리 숫자" maxlength="6" required>
                </div>
                
                <div class="btn-group">
                    <button type="button" class="btn btn-secondary" onclick="previousStep()">뒤로</button>
                    <button type="button" class="btn btn-primary" onclick="nextStep()">확인</button>
                </div>
            </form>
        </div>
        
        <!-- Step 3: 완료 -->
        <div class="step-content" id="step3">
            <div class="success-box">
                <div class="success-icon">🎉</div>
                <div class="success-text">계정이 생성되었습니다!</div>
                <div class="success-subtext">자동 매매 봇을 시작할 준비가 되었습니다.</div>
            </div>
            
            <div style="background: var(--secondary); border-radius: 10px; padding: 20px; margin-bottom: 24px;">
                <div style="font-weight: 600; margin-bottom: 12px;">✅ 다음 단계:</div>
                <ul style="margin-left: 20px; line-height: 1.8; color: var(--text-light);">
                    <li>요금제 선택하기</li>
                    <li>OKX API 키 설정하기</li>
                    <li>매매 봇 시작하기</li>
                </ul>
            </div>
            
            <button class="btn btn-primary" onclick="goToPlans()">요금제 선택</button>
            
            <div style="text-align: center; margin-top: 24px;">
                <a href="dashboard.html" style="color: var(--text-light); text-decoration: none; font-size: 0.9em;">먼저 대시보드 둘러보기</a>
            </div>
        </div>
    </div>
    
    <script>
        let currentStep = 1;
        
        // 비밀번호 강도 체크
        document.getElementById('password')?.addEventListener('input', function() {
            const password = this.value;
            const bar = document.getElementById('passwordStrengthBar');
            const text = document.getElementById('passwordStrengthText');
            
            let strength = 0;
            if (password.length >= 8) strength += 25;
            if (/[A-Z]/.test(password)) strength += 25;
            if (/[0-9]/.test(password)) strength += 25;
            if (/[!@#$%^&*]/.test(password)) strength += 25;
            
            bar.style.width = strength + '%';
            
            if (strength < 25) {
                bar.style.backgroundColor = '#ff3b30';
                text.textContent = '약함';
            } else if (strength < 50) {
                bar.style.backgroundColor = '#ff9500';
                text.textContent = '보통';
            } else if (strength < 75) {
                bar.style.backgroundColor = '#ffcc00';
                text.textContent = '좋음';
            } else {
                bar.style.backgroundColor = '#34c759';
                text.textContent = '매우 강함';
            }
        });
        
        function nextStep() {
            if (currentStep === 1) {
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;
                const passwordConfirm = document.getElementById('password-confirm').value;
                const terms = document.getElementById('terms').checked;
                
                if (!email || !password || !passwordConfirm || !terms) {
                    alert('모든 필드를 입력하고 약관에 동의해주세요.');
                    return;
                }
                
                if (password !== passwordConfirm) {
                    alert('비밀번호가 일치하지 않습니다.');
                    return;
                }
                
                if (password.length < 8) {
                    alert('비밀번호는 최소 8글자 이상이어야 합니다.');
                    return;
                }
            }
            
            if (currentStep === 2) {
                const verificationCode = document.getElementById('verification-code').value;
                if (!verificationCode || verificationCode.length !== 6) {
                    alert('올바른 인증코드를 입력하세요.');
                    return;
                }
            }
            
            document.getElementById(`step${currentStep}`).classList.remove('active');
            document.getElementById(`step${currentStep}-indicator`).classList.remove('active');
            document.getElementById(`step${currentStep}-indicator`).classList.add('completed');
            
            currentStep++;
            
            document.getElementById(`step${currentStep}`).classList.add('active');
            document.getElementById(`step${currentStep}-indicator`).classList.add('active');
        }
        
        function previousStep() {
            if (currentStep > 1) {
                document.getElementById(`step${currentStep}`).classList.remove('active');
                document.getElementById(`step${currentStep}-indicator`).classList.remove('active');
                document.getElementById(`step${currentStep}-indicator`).classList.remove('completed');
                
                currentStep--;
                
                document.getElementById(`step${currentStep}`).classList.add('active');
                document.getElementById(`step${currentStep}-indicator`).classList.add('active');
                document.getElementById(`step${currentStep}-indicator`).classList.remove('completed');
            }
        }
        
        function goToPlans() {
            window.location.href = 'pricing.html';
        }
    </script>
</body>
</html>
