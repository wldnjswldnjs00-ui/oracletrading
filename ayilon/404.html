<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Page Not Found · AYILON</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet" />
  <script src="i18n.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #000; color: #fff; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 40px 24px; }
    .glitch { font-family: 'Space Grotesk', sans-serif; font-size: clamp(96px, 20vw, 160px); font-weight: 700; letter-spacing: -0.04em; line-height: 1; color: #fff; position: relative; display: inline-block; margin-bottom: 8px; }
    .glitch::before, .glitch::after { content: '404'; position: absolute; top: 0; left: 0; width: 100%; }
    .glitch::before { color: rgba(239,68,68,0.6); animation: glitch1 2.5s infinite; clip-path: polygon(0 20%, 100% 20%, 100% 40%, 0 40%); }
    .glitch::after  { color: rgba(59,130,246,0.5); animation: glitch2 2.5s infinite; clip-path: polygon(0 60%, 100% 60%, 100% 80%, 0 80%); }
    @keyframes glitch1 { 0%,90%,100%{transform:translate(0)} 92%{transform:translate(-3px,1px)} 94%{transform:translate(3px,-1px)} 96%{transform:translate(-2px,0)} }
    @keyframes glitch2 { 0%,88%,100%{transform:translate(0)} 90%{transform:translate(3px,-1px)} 92%{transform:translate(-3px,1px)} 94%{transform:translate(1px,2px)} }
    .label { font-size: 11px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: #525252; margin-bottom: 28px; }
    h1 { font-family: 'Space Grotesk', sans-serif; font-size: clamp(22px, 4vw, 30px); font-weight: 700; letter-spacing: -0.02em; margin-bottom: 14px; }
    p { font-size: 15px; color: #a3a3a3; margin-bottom: 40px; line-height: 1.6; max-width: 380px; }
    .btns { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    .btn-primary { background: #fff; color: #000; padding: 13px 28px; border-radius: 8px; font-size: 14px; font-weight: 600; text-decoration: none; transition: opacity 0.2s; }
    .btn-primary:hover { opacity: 0.85; }
    .btn-outline { background: none; color: #fff; padding: 13px 28px; border-radius: 8px; font-size: 14px; font-weight: 500; text-decoration: none; border: 1px solid rgba(255,255,255,0.15); transition: border-color 0.2s; }
    .btn-outline:hover { border-color: rgba(255,255,255,0.4); }
    .logo { position: fixed; top: 24px; left: 50%; transform: translateX(-50%); font-family: 'Space Grotesk', sans-serif; font-size: 18px; font-weight: 700; letter-spacing: 0.12em; color: #fff; text-decoration: none; }

    /* LANG SWITCHER */
    .lang-switcher { position: fixed; top: 20px; right: 24px; display: flex; gap: 4px; align-items: center; }
    .lang-btn { background: none; border: 1px solid transparent; color: #525252; font-size: 11px; font-weight: 600; letter-spacing: 0.06em; padding: 4px 8px; border-radius: 4px; cursor: pointer; transition: all 0.2s; font-family: 'Inter', sans-serif; }
    .lang-btn:hover { color: #fff; border-color: rgba(255,255,255,0.2); }
    .lang-btn.active { color: #fff; border-color: rgba(255,255,255,0.3); background: rgba(255,255,255,0.06); }
  </style>
</head>
<body>
  <a href="index.html" class="logo">AYILON</a>
  <div class="lang-switcher">
    <button class="lang-btn active" data-lang="en" onclick="setLanguage('en')">EN</button>
    <button class="lang-btn" data-lang="ko" onclick="setLanguage('ko')">KO</button>
  </div>
  <div class="glitch">404</div>
  <div class="label" data-i18n="404.label">Page Not Found</div>
  <h1 data-i18n="404.title">You've gone off the grid.</h1>
  <p data-i18n="404.desc">The page you're looking for doesn't exist — or it may have moved. Let's get you back on track.</p>
  <div class="btns">
    <a href="index.html" class="btn-primary" data-i18n="404.home">Back to Home</a>
    <a href="dashboard.html" class="btn-outline" data-i18n="404.dash">Go to Dashboard</a>
  </div>
</body>
</html>
