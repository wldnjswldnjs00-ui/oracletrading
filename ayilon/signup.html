<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>회원가입 — AYILON</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --black: #000000; --white: #ffffff;
      --gray-100: #f5f5f5; --gray-200: #e5e5e5;
      --gray-400: #a3a3a3; --gray-600: #525252;
      --gray-800: #262626; --gray-900: #111111;
      --error: #ef4444; --success: #22c55e;
    }
    body { font-family: 'Inter', sans-serif; background: var(--black); color: var(--white); min-height: 100vh; display: flex; flex-direction: column; }

    nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 60px; border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .nav-logo { font-family: 'Space Grotesk', sans-serif; font-size: 20px; font-weight: 700; letter-spacing: 0.12em; color: var(--white); text-decoration: none; }
    .nav-login { font-size: 14px; color: var(--gray-400); text-decoration: none; transition: color 0.2s; }
    .nav-login:hover { color: var(--white); }

    .page-wrap { flex: 1; display: flex; align-items: center; justify-content: center; padding: 60px 24px; }

    .signup-box {
      width: 100%; max-width: 480px;
    }
    .signup-header { margin-bottom: 40px; }
    .signup-header h1 { font-family: 'Space Grotesk', sans-serif; font-size: 30px; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 8px; }
    .signup-header p { font-size: 14px; color: var(--gray-400); }
    .signup-header p a { color: var(--white); text-decoration: underline; }

    .form-group { margin-bottom: 18px; }
    .form-label { display: block; font-size: 13px; font-weight: 500; color: var(--gray-400); margin-bottom: 8px; letter-spacing: 0.02em; }
    .form-input {
      width: 100%; padding: 12px 16px; background: var(--gray-900);
      border: 1px solid rgba(255,255,255,0.08); border-radius: 8px;
      color: var(--white); font-family: 'Inter', sans-serif; font-size: 14px;
      outline: none; transition: border-color 0.2s;
    }
    .form-input::placeholder { color: var(--gray-600); }
    .form-input:focus { border-color: rgba(255,255,255,0.3); }
    .form-input.error { border-color: var(--error); }
    .form-input.success { border-color: var(--success); }

    .form-hint { font-size: 12px; color: var(--gray-600); margin-top: 6px; }
    .form-hint.error { color: var(--error); }
    .form-hint.success { color: var(--success); }

    .email-row { display: flex; gap: 10px; }
    .email-row .form-input { flex: 1; }
    .btn-verify {
      padding: 12px 18px; background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12); border-radius: 8px;
      color: var(--white); font-size: 13px; font-weight: 500;
      cursor: pointer; white-space: nowrap; transition: background 0.2s;
      font-family: 'Inter', sans-serif;
    }
    .btn-verify:hover { background: rgba(255,255,255,0.1); }
    .btn-verify:disabled { opacity: 0.4; cursor: not-allowed; }

    .verify-code-wrap { margin-top: 10px; display: none; }
    .verify-code-wrap.show { display: block; }
    .verify-row { display: flex; gap: 10px; }
    .verify-timer { font-size: 13px; color: var(--error); display: flex; align-items: center; padding: 0 4px; }

    .password-wrap { position: relative; }
    .password-toggle {
      position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: var(--gray-400); cursor: pointer;
      font-size: 13px; font-family: 'Inter', sans-serif;
    }

    .strength-bar { display: flex; gap: 4px; margin-top: 8px; }
    .strength-seg { height: 3px; flex: 1; background: rgba(255,255,255,0.08); border-radius: 2px; transition: background 0.3s; }
    .strength-seg.weak { background: var(--error); }
    .strength-seg.medium { background: #f59e0b; }
    .strength-seg.strong { background: var(--success); }

    .divider { border: none; border-top: 1px solid rgba(255,255,255,0.06); margin: 24px 0; }

    .terms-check { display: flex; align-items: flex-start; gap: 10px; }
    .terms-check input[type="checkbox"] {
      width: 16px; height: 16px; margin-top: 1px; accent-color: var(--white);
      background: var(--gray-900); border: 1px solid rgba(255,255,255,0.2);
      cursor: pointer; flex-shrink: 0;
    }
    .terms-check label { font-size: 13px; color: var(--gray-400); line-height: 1.5; cursor: pointer; }
    .terms-check label a { color: var(--white); }

    .btn-submit {
      width: 100%; padding: 14px; background: var(--white); color: var(--black);
      border: none; border-radius: 8px; font-size: 15px; font-weight: 600;
      cursor: pointer; margin-top: 24px; transition: opacity 0.2s;
      font-family: 'Inter', sans-serif; letter-spacing: 0.01em;
    }
    .btn-submit:hover { opacity: 0.88; }
    .btn-submit:disabled { opacity: 0.4; cursor: not-allowed; }

    .social-divider { text-align: center; position: relative; margin: 28px 0 24px; }
    .social-divider::before { content: ''; position: absolute; top: 50%; left: 0; right: 0; border-top: 1px solid rgba(255,255,255,0.06); }
    .social-divider span { position: relative; background: var(--black); padding: 0 14px; font-size: 12px; color: var(--gray-600); }

    @media (max-width: 480px) {
      nav { padding: 20px 24px; }
      .email-row { flex-direction: column; }
      .btn-verify { width: 100%; }
    }
  </style>
</head>
<body>
  <nav>
    <a href="index.html" class="nav-logo">AYILON</a>
    <a href="login.html" class="nav-login">이미 계정이 있으신가요? 로그인 →</a>
  </nav>

  <div class="page-wrap">
    <div class="signup-box">
      <div class="signup-header">
        <h1>계정 만들기</h1>
        <p>이미 계정이 있으신가요? <a href="login.html">로그인</a></p>
      </div>

      <form id="signupForm" onsubmit="handleSignup(event)">

        <!-- 이름 -->
        <div class="form-group">
          <label class="form-label">이름</label>
          <input type="text" class="form-input" id="name" placeholder="홍길동" autocomplete="name" />
        </div>

        <!-- 닉네임 -->
        <div class="form-group">
          <label class="form-label">닉네임</label>
          <input type="text" class="form-input" id="nickname" placeholder="예: ayilon_trader" autocomplete="off" oninput="checkNickname(this)" />
          <div class="form-hint" id="nicknameHint">영문, 숫자, _ 사용 가능 (2~20자)</div>
        </div>

        <!-- 이메일 -->
        <div class="form-group">
          <label class="form-label">이메일 (아이디)</label>
          <div class="email-row">
            <input type="email" class="form-input" id="email" placeholder="example@email.com" autocomplete="email" />
            <button type="button" class="btn-verify" id="sendCodeBtn" onclick="sendVerificationCode()">인증코드 발송</button>
          </div>
          <div class="verify-code-wrap" id="codeWrap">
            <div class="verify-row">
              <input type="text" class="form-input" id="verifyCode" placeholder="인증코드 6자리 입력" maxlength="6" />
              <span class="verify-timer" id="timer">05:00</span>
              <button type="button" class="btn-verify" onclick="confirmCode()">확인</button>
            </div>
            <div class="form-hint" id="codeHint">이메일로 발송된 6자리 코드를 입력하세요</div>
          </div>
        </div>

        <!-- 비밀번호 -->
        <div class="form-group">
          <label class="form-label">비밀번호</label>
          <div class="password-wrap">
            <input type="password" class="form-input" id="password" placeholder="8자 이상, 영문+숫자+특수문자" oninput="checkPasswordStrength(this)" />
            <button type="button" class="password-toggle" onclick="togglePassword('password')">보기</button>
          </div>
          <div class="strength-bar">
            <div class="strength-seg" id="seg1"></div>
            <div class="strength-seg" id="seg2"></div>
            <div class="strength-seg" id="seg3"></div>
            <div class="strength-seg" id="seg4"></div>
          </div>
          <div class="form-hint" id="passwordHint">영문, 숫자, 특수문자 포함 8자 이상</div>
        </div>

        <!-- 비밀번호 확인 -->
        <div class="form-group">
          <label class="form-label">비밀번호 확인</label>
          <div class="password-wrap">
            <input type="password" class="form-input" id="passwordConfirm" placeholder="비밀번호를 다시 입력하세요" oninput="checkPasswordMatch()" />
            <button type="button" class="password-toggle" onclick="togglePassword('passwordConfirm')">보기</button>
          </div>
          <div class="form-hint" id="matchHint"></div>
        </div>

        <hr class="divider" />

        <!-- 약관 동의 -->
        <div class="form-group">
          <div class="terms-check">
            <input type="checkbox" id="termsAll" onchange="toggleAll(this)" />
            <label for="termsAll"><strong style="color:#fff">전체 동의</strong></label>
          </div>
          <div style="margin-top:12px; display:flex; flex-direction:column; gap:10px;">
            <div class="terms-check">
              <input type="checkbox" id="terms1" />
              <label for="terms1"><a href="#">이용약관</a> 동의 (필수)</label>
            </div>
            <div class="terms-check">
              <input type="checkbox" id="terms2" />
              <label for="terms2"><a href="#">개인정보처리방침</a> 동의 (필수)</label>
            </div>
            <div class="terms-check">
              <input type="checkbox" id="terms3" />
              <label for="terms3">마케팅 정보 수신 동의 (선택)</label>
            </div>
          </div>
        </div>

        <button type="submit" class="btn-submit" id="submitBtn">회원가입 완료</button>
      </form>
    </div>
  </div>

  <script>
    let timerInterval = null;
    let emailVerified = false;

    function sendVerificationCode() {
      const email = document.getElementById('email').value;
      if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        document.getElementById('email').classList.add('error');
        return;
      }
      document.getElementById('email').classList.remove('error');
      document.getElementById('sendCodeBtn').disabled = true;
      document.getElementById('sendCodeBtn').textContent = '발송됨';
      document.getElementById('codeWrap').classList.add('show');
      startTimer();
    }

    function startTimer() {
      let seconds = 300;
      clearInterval(timerInterval);
      timerInterval = setInterval(() => {
        seconds--;
        const m = String(Math.floor(seconds / 60)).padStart(2, '0');
        const s = String(seconds % 60).padStart(2, '0');
        document.getElementById('timer').textContent = `${m}:${s}`;
        if (seconds <= 0) {
          clearInterval(timerInterval);
          document.getElementById('timer').textContent = '만료';
          document.getElementById('sendCodeBtn').disabled = false;
          document.getElementById('sendCodeBtn').textContent = '재발송';
        }
      }, 1000);
    }

    function confirmCode() {
      const code = document.getElementById('verifyCode').value;
      const hint = document.getElementById('codeHint');
      if (code === '123456' || code.length === 6) {
        emailVerified = true;
        clearInterval(timerInterval);
        document.getElementById('verifyCode').classList.add('success');
        document.getElementById('verifyCode').disabled = true;
        hint.className = 'form-hint success';
        hint.textContent = '✓ 이메일 인증이 완료되었습니다';
      } else {
        hint.className = 'form-hint error';
        hint.textContent = '인증코드가 올바르지 않습니다';
      }
    }

    function checkNickname(el) {
      const val = el.value;
      const hint = document.getElementById('nicknameHint');
      const valid = /^[a-zA-Z0-9_]{2,20}$/.test(val);
      if (val.length === 0) {
        el.classList.remove('error', 'success');
        hint.className = 'form-hint';
        hint.textContent = '영문, 숫자, _ 사용 가능 (2~20자)';
      } else if (valid) {
        el.classList.remove('error'); el.classList.add('success');
        hint.className = 'form-hint success';
        hint.textContent = '✓ 사용 가능한 닉네임입니다';
      } else {
        el.classList.remove('success'); el.classList.add('error');
        hint.className = 'form-hint error';
        hint.textContent = '영문, 숫자, _만 사용 가능 (2~20자)';
      }
    }

    function checkPasswordStrength(el) {
      const val = el.value;
      let score = 0;
      if (val.length >= 8) score++;
      if (/[A-Z]/.test(val) || /[a-z]/.test(val)) score++;
      if (/[0-9]/.test(val)) score++;
      if (/[^A-Za-z0-9]/.test(val)) score++;
      const segs = ['seg1','seg2','seg3','seg4'];
      const cls = score <= 1 ? 'weak' : score <= 2 ? 'medium' : 'strong';
      segs.forEach((id, i) => {
        const el = document.getElementById(id);
        el.className = 'strength-seg';
        if (i < score) el.classList.add(cls);
      });
      const hint = document.getElementById('passwordHint');
      if (val.length === 0) { hint.className = 'form-hint'; hint.textContent = '영문, 숫자, 특수문자 포함 8자 이상'; }
      else if (score <= 1) { hint.className = 'form-hint error'; hint.textContent = '비밀번호가 너무 약합니다'; }
      else if (score <= 2) { hint.className = 'form-hint'; hint.textContent = '보통 강도의 비밀번호'; }
      else { hint.className = 'form-hint success'; hint.textContent = '✓ 강한 비밀번호입니다'; }
      checkPasswordMatch();
    }

    function checkPasswordMatch() {
      const pw = document.getElementById('password').value;
      const confirm = document.getElementById('passwordConfirm').value;
      const hint = document.getElementById('matchHint');
      const el = document.getElementById('passwordConfirm');
      if (confirm.length === 0) { hint.textContent = ''; el.classList.remove('error','success'); return; }
      if (pw === confirm) {
        el.classList.remove('error'); el.classList.add('success');
        hint.className = 'form-hint success'; hint.textContent = '✓ 비밀번호가 일치합니다';
      } else {
        el.classList.remove('success'); el.classList.add('error');
        hint.className = 'form-hint error'; hint.textContent = '비밀번호가 일치하지 않습니다';
      }
    }

    function togglePassword(id) {
      const el = document.getElementById(id);
      el.type = el.type === 'password' ? 'text' : 'password';
    }

    function toggleAll(el) {
      ['terms1','terms2','terms3'].forEach(id => document.getElementById(id).checked = el.checked);
    }

    function handleSignup(e) {
      e.preventDefault();
      const name = document.getElementById('name').value;
      const nickname = document.getElementById('nickname').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('passwordConfirm').value;
      const terms1 = document.getElementById('terms1').checked;
      const terms2 = document.getElementById('terms2').checked;

      if (!name || !nickname || !email || !password || !confirm) return;
      if (!emailVerified) { alert('이메일 인증을 완료해주세요.'); return; }
      if (password !== confirm) { alert('비밀번호가 일치하지 않습니다.'); return; }
      if (!terms1 || !terms2) { alert('필수 약관에 동의해주세요.'); return; }

      const btn = document.getElementById('submitBtn');
      btn.textContent = '처리 중...'; btn.disabled = true;
      setTimeout(() => { window.location.href = 'dashboard.html'; }, 1200);
    }
  </script>
</body>
</html>
