<script>
// ── 지표 ──────────────────────────────────────────────────────
function ema(c,p){
  var k=2/(p+1),a=new Float64Array(c.length);
  a[0]=c[0];
  for(var i=1;i<c.length;i++) a[i]=c[i]*k+a[i-1]*(1-k);
  return a;
}
function rsi(c,p){
  var a=new Float64Array(c.length),g=0,l=0;
  for(var i=1;i<=p;i++){var d=c[i]-c[i-1];d>0?g+=d:l-=d;}
  g/=p;l/=p;
  a[p]=l===0?100:100-100/(1+g/l);
  for(var i=p+1;i<c.length;i++){
    var d=c[i]-c[i-1];
    if(d>0){g=(g*(p-1)+d)/p;l=l*(p-1)/p;}
    else{g=g*(p-1)/p;l=(l*(p-1)-d)/p;}
    a[i]=l===0?100:100-100/(1+g/l);
  }
  return a;
}
function atr(h,lo,c,p){
  var a=new Float64Array(c.length);
  for(var i=1;i<c.length;i++){
    var tr=Math.max(h[i]-lo[i],Math.abs(h[i]-c[i-1]),Math.abs(lo[i]-c[i-1]));
    a[i]=i<=p?(a[i-1]*(i-1)+tr)/i:(a[i-1]*(p-1)+tr)/p;
  }
  return a;
}
function adx(h,lo,c,p){
  var n=c.length,pdm=new Float64Array(n),ndm=new Float64Array(n),tr=new Float64Array(n);
  for(var i=1;i<n;i++){
    var hd=h[i]-h[i-1],ld=lo[i-1]-lo[i];
    pdm[i]=hd>ld&&hd>0?hd:0;
    ndm[i]=ld>hd&&ld>0?ld:0;
    tr[i]=Math.max(h[i]-lo[i],Math.abs(h[i]-c[i-1]),Math.abs(lo[i]-c[i-1]));
  }
  var sT=new Float64Array(n),sP=new Float64Array(n),sN=new Float64Array(n),dx=new Float64Array(n),ax=new Float64Array(n);
  for(var i=1;i<n;i++){
    sT[i]=i<=p?(sT[i-1]*(i-1)+tr[i])/i:(sT[i-1]*(p-1)+tr[i])/p;
    sP[i]=i<=p?(sP[i-1]*(i-1)+pdm[i])/i:(sP[i-1]*(p-1)+pdm[i])/p;
    sN[i]=i<=p?(sN[i-1]*(i-1)+ndm[i])/i:(sN[i-1]*(p-1)+ndm[i])/p;
  }
  for(var i=p;i<n;i++){
    var pdi=sT[i]?100*sP[i]/sT[i]:0,ndi=sT[i]?100*sN[i]/sT[i]:0;
    dx[i]=(pdi+ndi)?100*Math.abs(pdi-ndi)/(pdi+ndi):0;
    ax[i]=i===p?dx[i]:(ax[i-1]*(p-1)+dx[i])/p;
  }
  return ax;
}
function bb(c,p,m){
  var U=new Float64Array(c.length),L=new Float64Array(c.length);
  for(var i=p-1;i<c.length;i++){
    var s=0;for(var j=i-p+1;j<=i;j++)s+=c[j];
    var mn=s/p,v=0;for(var j=i-p+1;j<=i;j++)v+=(c[j]-mn)**2;
    var sd=Math.sqrt(v/p);U[i]=mn+m*sd;L[i]=mn-m*sd;
  }
  return{U,L};
}
function srsi(c,rl,sl,ks,ds){
  var r=rsi(c,rl),K=new Float64Array(c.length);
  for(var i=sl-1;i<c.length;i++){
    var mn=r[i],mx=r[i];
    for(var j=i-sl+1;j<=i;j++){if(r[j]<mn)mn=r[j];if(r[j]>mx)mx=r[j];}
    K[i]=mx===mn?50:100*(r[i]-mn)/(mx-mn);
  }
  var kS=ema(Array.from(K),ks);
  return{K:kS,D:ema(Array.from(kS),ds)};
}
function macd(c,f,s,sig){
  var eF=ema(c,f),eS=ema(c,s),L=new Float64Array(c.length);
  for(var i=0;i<c.length;i++) L[i]=eF[i]-eS[i];
  return{L,S:ema(Array.from(L),sig)};
}
function st(h,lo,c,p,m){
  var a=atr(h,lo,c,p),trend=new Int8Array(c.length),sl=new Float64Array(c.length);
  var up=new Float64Array(c.length),dn=new Float64Array(c.length);
  trend[0]=1;
  for(var i=1;i<c.length;i++){
    var mid=(h[i]+lo[i])/2;
    up[i]=mid+m*a[i]; dn[i]=mid-m*a[i];
    if(trend[i-1]===1){dn[i]=Math.max(dn[i],dn[i-1]);trend[i]=c[i]<dn[i]?-1:1;}
    else{up[i]=Math.min(up[i],up[i-1]);trend[i]=c[i]>up[i]?1:-1;}
    sl[i]=trend[i]===1?dn[i]:up[i];
  }
  return{trend,sl};
}
function buildInd(K){
  var n=K.length;
  var o=new Float64Array(n),h=new Float64Array(n),lo=new Float64Array(n),c=new Float64Array(n);
  for(var i=0;i<n;i++){o[i]=+K[i][1];h[i]=+K[i][2];lo[i]=+K[i][3];c[i]=+K[i][4];}
  var e21=ema(Array.from(c),21),e55=ema(Array.from(c),55),e200=ema(Array.from(c),200);
  var r14=rsi(Array.from(c),14),a14=atr(h,lo,c,14),d14=adx(h,lo,c,14);
  var B=bb(Array.from(c),20,2);
  var sr=srsi(Array.from(c),14,14,3,3);
  var mc=macd(Array.from(c),12,26,9);
  var S=st(h,lo,c,10,3);
  return{o,h,lo,c,e21,e55,e200,rsi:r14,atr:a14,adx:d14,bbU:B.U,bbL:B.L,srK:sr.K,srD:sr.D,mL:mc.L,mS:mc.S,stT:S.trend,stL:S.sl};
}

// ── 신호 ──────────────────────────────────────────────────────
function getSig(id,i,ind){
  if(i<3)return null;
  var a=ind.atr[i];if(!a||a<=0)return null;
  var bull=ind.c[i]>ind.e200[i],bear=ind.c[i]<ind.e200[i];

  if(id==='s_ema_pb'){
    var upT=ind.e21[i]>ind.e55[i]&&ind.e55[i]>ind.e200[i];
    var dnT=ind.e21[i]<ind.e55[i]&&ind.e55[i]<ind.e200[i];
    if(upT&&ind.adx[i]>18&&ind.c[i-1]<ind.e21[i-1]&&ind.c[i]>ind.e21[i]&&ind.srK[i]<60&&ind.c[i]>ind.o[i])
      return{dir:'long',sl:ind.c[i]-a*1.5};
    if(dnT&&ind.adx[i]>18&&ind.c[i-1]>ind.e21[i-1]&&ind.c[i]<ind.e21[i]&&ind.srK[i]>40&&ind.c[i]<ind.o[i])
      return{dir:'short',sl:ind.c[i]+a*1.5};
  }
  if(id==='s_macd_h'){
    var hist=ind.mL[i]-ind.mS[i],histP=ind.mL[i-1]-ind.mS[i-1];
    if(bull&&ind.adx[i]>14&&hist>0&&histP<=0&&ind.rsi[i]<68)
      return{dir:'long',sl:ind.c[i]-a*1.5};
    if(bear&&ind.adx[i]>14&&hist<0&&histP>=0&&ind.rsi[i]>32)
      return{dir:'short',sl:ind.c[i]+a*1.5};
  }
  if(id==='s_rsi_c'){
    var upT=ind.e21[i]>ind.e55[i],dnT=ind.e21[i]<ind.e55[i];
    if(bull&&upT&&ind.rsi[i]>40&&ind.rsi[i-1]<=40)
      return{dir:'long',sl:ind.c[i]-a*1.2};
    if(bear&&dnT&&ind.rsi[i]<60&&ind.rsi[i-1]>=60)
      return{dir:'short',sl:ind.c[i]+a*1.2};
  }
  if(id==='s_bb_m'){
    if(bull&&ind.c[i]>ind.bbU[i]&&ind.adx[i]>20&&ind.rsi[i]>58&&ind.c[i]>ind.c[i-2])
      return{dir:'long',sl:ind.c[i]-a*1.5};
    if(bear&&ind.c[i]<ind.bbL[i]&&ind.adx[i]>20&&ind.rsi[i]<42&&ind.c[i]<ind.c[i-2])
      return{dir:'short',sl:ind.c[i]+a*1.5};
  }
  if(id==='s_st'){
    // 플립 진입
    if(ind.stT[i]===1&&ind.stT[i-1]===-1&&bull&&ind.rsi[i]<72)
      return{dir:'long',sl:ind.stL[i]};
    if(ind.stT[i]===-1&&ind.stT[i-1]===1&&bear&&ind.rsi[i]>28)
      return{dir:'short',sl:ind.stL[i]};
    // 추세 유지 중 ST라인 터치 후 반등
    if(ind.stT[i]===1&&ind.stT[i-1]===1&&bull&&ind.c[i-1]<=ind.stL[i-1]*1.002&&ind.c[i]>ind.stL[i]*1.001&&ind.rsi[i]<65)
      return{dir:'long',sl:ind.stL[i]};
    if(ind.stT[i]===-1&&ind.stT[i-1]===-1&&bear&&ind.c[i-1]>=ind.stL[i-1]*0.998&&ind.c[i]<ind.stL[i]*0.999&&ind.rsi[i]>35)
      return{dir:'short',sl:ind.stL[i]};
  }
  return null;
}

// ── 백테스트 엔진 ─────────────────────────────────────────────
var STRATS=[
  {id:'s_ema_pb',name:'EMA Pullback'},
  {id:'s_macd_h',name:'MACD Histogram'},
  {id:'s_rsi_c', name:'RSI Recovery'},
  {id:'s_bb_m',  name:'BB Momentum'},
  {id:'s_st',    name:'Supertrend'},
];

function runBacktest(K,stratId,cfg){
  var ind=buildInd(K);
  var eq=cfg.capital,peak=eq,wins=0;
  var trades=[],curve=[];
  var pos=null,pending=null;
  var dailyLimit=cfg.dailyLoss/100;
  var dayEq=eq,dayHalt=false,lastDay=-1;
  var SL_MIN=0.001,SL_MAX=0.020;
  var cbT=1-cfg.cb/100;

  for(var i=200;i<K.length-1;i++){
    var ts=+K[i][0];
    var day=Math.floor(ts/86400000);
    if(day!==lastDay){curve.push({ts,eq});dayEq=eq;dayHalt=false;lastDay=day;}

    // 집행
    if(pending&&!pos){
      var ep=+K[i][1];
      var slD=Math.abs(ep-pending.sl)/ep;
      if(slD>=SL_MIN&&slD<=SL_MAX){
        var nf=Math.min((cfg.risk/100)/slD,(cfg.posMax/100)*cfg.leverage);
        if(eq<peak*cbT)nf*=0.5;
        var sa=Math.abs(ep-pending.sl);
        var tp=pending.dir==='long'?ep+sa*cfg.rr:ep-sa*cfg.rr;
        eq-=eq*nf*0.0005;
        pos={dir:pending.dir,entry:ep,sl:pending.sl,tp,nf};
      }
      pending=null;
    }

    // SL/TP
    if(pos){
      var hi=+K[i][2],lo=+K[i][3];
      var slH=pos.dir==='long'?lo<=pos.sl:hi>=pos.sl;
      var tpH=pos.dir==='long'?hi>=pos.tp:lo<=pos.tp;
      if(slH||tpH){
        var win=tpH&&!slH;
        var xp=win?pos.tp:pos.sl;
        var ret=pos.dir==='long'?(xp-pos.entry)/pos.entry:(pos.entry-xp)/pos.entry;
        var pnl=eq*pos.nf*ret;
        eq+=pnl;eq-=eq*pos.nf*0.0005;eq=Math.max(eq,1);
        if(eq>peak)peak=eq;
        if(win)wins++;
        trades.push({ts,win,pnl,eq});
        pos=null;
        if((dayEq-eq)/dayEq>=dailyLimit)dayHalt=true;
      }
    }

    // 신호
    if(!pos&&!pending&&!dayHalt){
      var sig=getSig(stratId,i,ind);
      if(sig)pending=sig;
    }
  }
  curve.push({ts:+K[K.length-1][0],eq});

  var n=trades.length;
  if(n===0)return{stratId,n:0,wr:0,pf:0,totRet:0,annRet:0,mdd:0,finalEq:eq,curve,trades};

  var wr=wins/n,tw=0,tl=0;
  for(var t of trades){t.win?tw+=t.pnl:tl+=Math.abs(t.pnl);}
  var pf=tl>0?tw/tl:tw>0?999:0;

  var pk=cfg.capital,mdd=0,re=cfg.capital;
  for(var t of trades){
    re+=t.pnl;if(re>pk)pk=re;
    var dd=(pk-re)/pk;if(dd>mdd)mdd=dd;
  }

  var t0=+K[200][0],t1=+K[K.length-2][0];
  var yrs=(t1-t0)/(365.25*24*3600*1000);
  var totRet=(eq/cfg.capital-1)*100;
  var annRet=yrs>0?((eq/cfg.capital)**(1/yrs)-1)*100:0;

  return{stratId,n,wr,pf,totRet,annRet,mdd,finalEq:eq,curve,trades,yrs,t0,t1};
}

// ── OKX 데이터 ────────────────────────────────────────────────
async function fetchCandles(symbol,limit){
  var all=[],after='';
  var base='https://www.okx.com/api/v5/market/history-candles';
  var fetched=0;
  while(fetched<limit){
    var need=Math.min(300,limit-fetched);
    var url=base+'?instId='+encodeURIComponent(symbol)+'&bar=5m&limit='+need+(after?'&after='+after:'');
    var r=await fetch(url);
    if(!r.ok)throw new Error('OKX '+r.status);
    var j=await r.json();
    var d=j.data||[];
    if(!d.length)break;
    all=all.concat(d);
    after=d[d.length-1][0];
    fetched+=d.length;
    if(d.length<need)break;
    _setProg(fetched/limit*0.7,'캔들 로딩: '+fetched.toLocaleString()+' / '+limit.toLocaleString());
    await new Promise(r=>setTimeout(r,80));
  }
  return all.reverse();
}

// ── UI ────────────────────────────────────────────────────────
var _running=false,_results=[],_chart=null,_candles=null;

function _setBusy(on,msg){
  _running=on;
  ['btnRun','btnQuick'].forEach(id=>document.getElementById(id).disabled=on);
  var ov=document.getElementById('overlay');
  on?ov.classList.add('show'):ov.classList.remove('show');
  if(msg)document.getElementById('ovMsg').textContent=msg;
}
function _setProg(r,msg){
  document.getElementById('progBar').style.width=(r*100)+'%';
  if(msg)document.getElementById('progMsg').textContent=msg;
}
function _setOvSub(t){document.getElementById('ovSub').textContent=t;}

async function startRun(){await _run(parseInt(document.getElementById('bars').value)||100000);}
async function startQuick(){await _run(20000);}

async function _run(limit){
  if(_running)return;
  _setBusy(true,'데이터 로딩 중...');
  _setProg(0,'시작...');
  try{
    var sym=document.getElementById('symbol').value.trim()||'BTC-USDT-SWAP';
    var cfg={
      capital:+document.getElementById('capital').value||10000,
      leverage:+document.getElementById('leverage').value||10,
      posMax:+document.getElementById('posMax').value||20,
      risk:+document.getElementById('risk').value||1,
      rr:+document.getElementById('rr').value||2,
      dailyLoss:3,cb:15,
    };
    var sel=document.getElementById('stratSel').value;
    var toRun=sel==='all'?STRATS:STRATS.filter(s=>s.id===sel);

    _setOvSub(sym+' '+limit.toLocaleString()+'봉 로딩 중...');
    _candles=await fetchCandles(sym,limit);
    if(_candles.length<1000)throw new Error('데이터 부족: '+_candles.length+'봉');

    _results=[];
    for(var i=0;i<toRun.length;i++){
      var s=toRun[i];
      document.getElementById('ovMsg').textContent=s.name+' 계산 중...';
      _setOvSub((i+1)+'/'+toRun.length+' 전략');
      _setProg(0.7+(i+1)/toRun.length*0.3,'');
      await new Promise(r=>setTimeout(r,20));
      var res=runBacktest(_candles,s.id,cfg);
      res.name=s.name;
      _results.push(res);
    }
    await new Promise(r=>setTimeout(r,60));
    renderAll(_results,_candles);
  }catch(e){
    alert('오류: '+e.message);
    _setProg(0,'오류');
  }finally{
    _setBusy(false);
    _setProg(1,'완료');
  }
}

function fmtDate(ts){return new Date(ts).toLocaleDateString('ko-KR',{year:'2-digit',month:'numeric',day:'numeric'});}
function f2(v){return v.toFixed(2);}
function pct(v,d){
  d=d===undefined?1:d;
  var s=v.toFixed(d)+'%';
  return'<span class="'+(v>0?'pos':v<0?'neg':'neu')+'">'+s+'</span>';
}

function renderAll(results,candles){
  // 결과 테이블
  var card=document.getElementById('resCard');
  card.classList.remove('hidden');
  var t0=+candles[0][0],t1=+candles[candles.length-1][0];
  document.getElementById('infoRange').textContent=fmtDate(t0)+' ~ '+fmtDate(t1);
  document.getElementById('infoCandles').textContent=candles.length.toLocaleString()+'봉';

  var hasLow=results.some(r=>r.n<1000);
  var wd=document.getElementById('warnDiv');
  hasLow?wd.classList.remove('hidden'):wd.classList.add('hidden');

  var bestIdx=0,bestRet=-Infinity;
  results.forEach((r,i)=>{if(r.totRet>bestRet){bestRet=r.totRet;bestIdx=i;}});

  var tb=document.getElementById('resBody');
  tb.innerHTML='';
  results.forEach((r,i)=>{
    var tr=document.createElement('tr');
    if(i===bestIdx)tr.className='best';
    tr.innerHTML=
      '<td>'+r.name+'</td>'+
      '<td style="text-align:right;color:'+(r.n>=1000?'#22c55e':'#f59e0b')+'">'+r.n.toLocaleString()+'</td>'+
      '<td>'+pct(r.wr*100)+'</td>'+
      '<td><span class="'+(r.pf>=1?'pos':'neg')+'">'+f2(r.pf)+'</span></td>'+
      '<td>'+pct(r.totRet)+'</td>'+
      '<td>'+pct(r.annRet)+'</td>'+
      '<td><span class="neg">'+f2(r.mdd*100)+'%</span></td>';
    tb.appendChild(tr);
  });

  // 상세 탭
  var det=document.getElementById('detCard');
  det.classList.remove('hidden');
  var tabs=document.getElementById('detTabs');
  tabs.innerHTML='';
  results.forEach((r,i)=>{
    var b=document.createElement('button');
    b.className='tab'+(i===0?' active':'');
    b.textContent=r.name;
    b.onclick=(function(idx){return function(){
      document.querySelectorAll('#detTabs .tab').forEach(x=>x.classList.remove('active'));
      this.classList.add('active');
      renderDetail(results[idx]);
    };})(i);
    tabs.appendChild(b);
  });
  if(results.length>0)renderDetail(results[0]);
}

function renderDetail(r){
  var cfg_capital=parseFloat(document.getElementById('capital').value)||10000;

  // 스탯 박스
  var g=document.getElementById('statGrid');
  g.innerHTML=
    statBox((r.wr*100).toFixed(1)+'%','승률',r.wr>=0.4?'pos':r.wr>=0.35?'neu':'neg')+
    statBox(r.n.toLocaleString(),'거래수',r.n>=1000?'pos':'neu')+
    statBox(f2(r.pf),'Profit Factor',r.pf>=1?'pos':'neg');

  var g2=document.getElementById('statGrid2');
  g2.innerHTML=
    statBox(r.totRet.toFixed(1)+'%','총 수익률',r.totRet>0?'pos':'neg')+
    statBox(r.annRet.toFixed(1)+'%','연 환산',r.annRet>0?'pos':'neg')+
    statBox((r.mdd*100).toFixed(1)+'%','MDD','neg')+
    statBox('$'+(r.finalEq|0).toLocaleString(),'최종 자본',r.finalEq>=cfg_capital?'pos':'neg');

  // 차트
  var ctx=document.getElementById('curveChart').getContext('2d');
  if(_chart)_chart.destroy();
  var labels=r.curve.map(p=>fmtDate(p.ts));
  var data=r.curve.map(p=>p.eq);
  _chart=new Chart(ctx,{
    type:'line',
    data:{labels,datasets:[{
      data,borderColor:'#6366f1',borderWidth:1.5,pointRadius:0,
      fill:true,backgroundColor:'rgba(99,102,241,0.07)',tension:0.15,
    }]},
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false}},
      scales:{
        x:{ticks:{color:'#444',maxTicksLimit:6,font:{size:10}},grid:{color:'rgba(255,255,255,0.03)'}},
        y:{ticks:{color:'#444',font:{size:10},callback:v=>'$'+(v|0)},grid:{color:'rgba(255,255,255,0.04)'}}
      }
    }
  });
}

function statBox(val,lbl,cls){
  return'<div class="stat-box"><div class="stat-val '+(cls||'')+'">'+val+'</div><div class="stat-lbl">'+lbl+'</div></div>';
}
</script>
