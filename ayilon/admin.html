<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — AYILON</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --surface2: #1a1a1a;
      --border: rgba(255,255,255,0.06);
      --text: #f0f0f0;
      --gray-400: #9ca3af;
      --gray-600: #4b5563;
      --green: #22c55e;
      --red: #ef4444;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:var(--bg); color:var(--text); font-family:'Inter',sans-serif; min-height:100vh; }
  </style>
</head>
<body>

<!-- HEADER -->
<div style="background:var(--surface);border-bottom:1px solid var(--border);padding:16px 32px;display:flex;justify-content:space-between;align-items:center;">
  <div style="display:flex;align-items:center;gap:16px;">
    <a href="/" style="color:var(--gray-400);font-size:13px;text-decoration:none;">&#8592; 아레나</a>
    <span style="color:var(--border);">|</span>
    <span style="font-size:16px;font-weight:700;">AYILON 관리자</span>
  </div>
  <div style="display:flex;align-items:center;gap:12px;">
    <span id="adminEmailDisplay" style="font-size:12px;color:var(--gray-400);"></span>
    <button onclick="doLogout()" style="padding:6px 14px;background:none;border:1px solid rgba(239,68,68,0.3);border-radius:6px;color:#ef4444;font-size:12px;cursor:pointer;">로그아웃</button>
  </div>
</div>

<!-- MAIN CONTENT -->
<div style="padding:32px;">

  <!-- Stats Row -->
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:24px;">
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:20px 24px;">
      <div style="font-size:12px;color:var(--gray-400);font-weight:500;margin-bottom:10px;">총 회원</div>
      <div id="adminTotalUsers" style="font-size:24px;font-weight:700;">—</div>
    </div>
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:20px 24px;">
      <div style="font-size:12px;color:var(--gray-400);font-weight:500;margin-bottom:10px;">유료 구독</div>
      <div id="adminPaidUsers" style="font-size:24px;font-weight:700;color:var(--green);">—</div>
    </div>
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:20px 24px;">
      <div style="font-size:12px;color:var(--gray-400);font-weight:500;margin-bottom:10px;">봇 실행 중</div>
      <div id="adminActiveBots" style="font-size:24px;font-weight:700;color:#3b82f6;">—</div>
    </div>
  </div>

  <!-- User Table Card -->
  <div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:24px;margin-bottom:20px;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:12px;">
      <div style="font-size:16px;font-weight:600;">회원 목록</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;">
        <input id="searchInput" type="text" placeholder="이메일 검색..."
          style="padding:8px 12px;background:var(--surface2);border:1px solid rgba(255,255,255,0.1);border-radius:8px;color:var(--text);font-size:13px;width:220px;outline:none;font-family:'Inter',sans-serif;"
          oninput="filterUsers()" />
        <button onclick="loadUsers()"
          style="padding:6px 14px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:6px;color:var(--text);font-size:12px;font-weight:500;cursor:pointer;font-family:'Inter',sans-serif;">
          &#8635; 새로고침
        </button>
      </div>
    </div>
    <div id="adminUserTable" style="overflow-x:auto;">
      <div style="padding:32px;text-align:center;color:var(--gray-400);">로딩 중...</div>
    </div>
  </div>

  <!-- Set Plan Panel -->
  <div id="setPlanPanel" style="display:none;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:24px;">
    <div style="font-size:15px;font-weight:600;margin-bottom:16px;">플랜 설정</div>
    <div id="setPlanTarget" style="font-size:13px;color:var(--gray-400);margin-bottom:16px;"></div>
    <div style="font-size:11px;color:var(--gray-400);margin-bottom:8px;">구독 플랜 (30일)</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;">
      <button onclick="doSetPlan('starter')"
        style="padding:8px 18px;background:none;border:1px solid rgba(34,197,94,0.3);border-radius:6px;color:#22c55e;font-size:13px;font-weight:500;cursor:pointer;font-family:'Inter',sans-serif;">
        Starter $39 (30일)
      </button>
      <button onclick="doSetPlan('elite')"
        style="padding:8px 18px;background:none;border:1px solid rgba(168,85,247,0.3);border-radius:6px;color:#a855f7;font-size:13px;font-weight:500;cursor:pointer;font-family:'Inter',sans-serif;">
        Elite $99 (30일)
      </button>
      <button onclick="doSetPlan('free')"
        style="padding:8px 18px;background:none;border:1px solid rgba(255,255,255,0.15);border-radius:6px;color:var(--gray-400);font-size:13px;font-weight:500;cursor:pointer;font-family:'Inter',sans-serif;">
        Free (구독 해제)
      </button>
    </div>
    <div style="font-size:11px;color:var(--gray-400);margin-bottom:8px;">리퍼럴 인증 — 인증 시 Elite(전 종목) 영구 무료</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;">
      <button onclick="doSetReferral(true)"
        style="padding:8px 18px;background:none;border:1px solid rgba(245,158,11,0.4);border-radius:6px;color:#fbbf24;font-size:13px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;">
        ★ 리퍼럴 인증 (무료 Elite)
      </button>
      <button onclick="doSetReferral(false)"
        style="padding:8px 18px;background:none;border:1px solid rgba(255,255,255,0.15);border-radius:6px;color:var(--gray-400);font-size:13px;font-weight:500;cursor:pointer;font-family:'Inter',sans-serif;">
        리퍼럴 해제
      </button>
      <button onclick="document.getElementById('setPlanPanel').style.display='none'; _planTarget=null;"
        style="padding:8px 18px;background:none;border:1px solid rgba(239,68,68,0.2);border-radius:6px;color:var(--red);font-size:13px;font-weight:500;cursor:pointer;font-family:'Inter',sans-serif;">
        닫기
      </button>
    </div>
  </div>

  <!-- Arena Prize Pool Panel -->
  <div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:24px;margin-top:20px;">
    <div style="font-size:16px;font-weight:600;margin-bottom:4px;">아레나 상금 풀</div>
    <div style="font-size:12px;color:var(--gray-400);margin-bottom:18px;">홈페이지에 실시간으로 표시되는 상금 금액입니다. 여기에 입력한 값이 즉시 반영됩니다. (어필리에이트 API 연동 전까지 수동 입력)</div>
    <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:14px;max-width:520px;margin-bottom:14px;">
      <div>
        <div style="font-size:11px;color:var(--gray-400);margin-bottom:6px;">주간 상금 풀 ($) — 수익률 부문 Top3</div>
        <input id="poolWeekly" type="number" min="0" placeholder="0"
          style="width:100%;padding:10px 12px;background:var(--surface2);border:1px solid rgba(255,255,255,0.1);border-radius:8px;color:var(--text);font-size:14px;outline:none;font-family:'Inter',sans-serif;" />
      </div>
      <div>
        <div style="font-size:11px;color:var(--gray-400);margin-bottom:6px;">월간 상금 풀 ($) — 각 부문 Top5</div>
        <input id="poolMonthly" type="number" min="0" placeholder="0"
          style="width:100%;padding:10px 12px;background:var(--surface2);border:1px solid rgba(255,255,255,0.1);border-radius:8px;color:var(--text);font-size:14px;outline:none;font-family:'Inter',sans-serif;" />
      </div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:14px;max-width:520px;margin-bottom:16px;">
      <div>
        <div style="font-size:11px;color:var(--gray-400);margin-bottom:6px;">상금 자격 최소 잔고 ($)</div>
        <input id="poolMinBal" type="number" min="0" placeholder="100"
          style="width:100%;padding:10px 12px;background:var(--surface2);border:1px solid rgba(255,255,255,0.1);border-radius:8px;color:var(--text);font-size:14px;outline:none;font-family:'Inter',sans-serif;" />
      </div>
      <div>
        <div style="font-size:11px;color:var(--gray-400);margin-bottom:6px;">풀 비율 (수수료의 %) — 참고용</div>
        <input id="poolPct" type="number" min="0" max="100" placeholder="40"
          style="width:100%;padding:10px 12px;background:var(--surface2);border:1px solid rgba(255,255,255,0.1);border-radius:8px;color:var(--text);font-size:14px;outline:none;font-family:'Inter',sans-serif;" />
      </div>
    </div>
    <div style="display:flex;gap:10px;align-items:center;">
      <button onclick="saveArenaConfig()"
        style="padding:9px 20px;background:#22c55e;border:none;border-radius:7px;color:#04140e;font-size:13px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;">저장</button>
      <span id="arenaSaveMsg" style="font-size:12px;color:var(--gray-400);"></span>
    </div>
  </div>

</div><!-- end main content -->

<script>
  var WORKER_URL = 'https://ayilon-email.wldnjswldnjs00.workers.dev';
  var ADMIN_EMAIL = 'wldnjswldnjs00@gmail.com';

  function getToken() { return localStorage.getItem('ayilon_session_token') || ''; }
  function getEmail() {
    // login stores email under 'ayilon_email'; 'ayilon_user' may not exist on a fresh domain
    try { var u = JSON.parse(localStorage.getItem('ayilon_user') || '{}'); if (u && u.email) return u.email; } catch(e) {}
    return localStorage.getItem('ayilon_email') || '';
  }

  // Auth check on load — no redirect loops: no session → login; logged-in non-admin → message
  (async function init() {
    var token = getToken();
    var email = getEmail();
    if (!token) { window.location.href = 'login.html'; return; }
    if (String(email).toLowerCase() !== ADMIN_EMAIL.toLowerCase()) {
      document.body.innerHTML = '<div style="padding:48px 24px;text-align:center;color:#fff;font-family:Inter,sans-serif;">'
        + '<div style="font-size:18px;font-weight:700;margin-bottom:10px;">관리자 전용 페이지</div>'
        + '<div style="color:#9ca3af;font-size:13px;margin-bottom:18px;">관리자 계정으로 로그인해야 합니다.</div>'
        + '<a href="login.html" style="color:#60a5fa;text-decoration:underline;font-size:13px;">다른 계정으로 로그인 →</a></div>';
      return;
    }
    document.getElementById('adminEmailDisplay').textContent = email;
    await loadUsers();
    await loadArenaConfig();
  })();

  async function loadArenaConfig() {
    try {
      var res = await fetch(WORKER_URL + '/admin/arena-config', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ sessionToken: getToken(), read: true })
      });
      var data = await res.json();
      if (!data.ok || !data.config) return;
      var c = data.config;
      document.getElementById('poolWeekly').value  = (c.manualPool && c.manualPool.weekly)  || 0;
      document.getElementById('poolMonthly').value = (c.manualPool && c.manualPool.monthly) || 0;
      document.getElementById('poolMinBal').value  = c.minBalance != null ? c.minBalance : 100;
      document.getElementById('poolPct').value     = c.poolPct != null ? c.poolPct : 40;
    } catch(e) {}
  }

  async function saveArenaConfig() {
    var msg = document.getElementById('arenaSaveMsg');
    msg.style.color = 'var(--gray-400)'; msg.textContent = '저장 중...';
    var payload = {
      sessionToken: getToken(),
      manualPool: {
        weekly:  parseFloat(document.getElementById('poolWeekly').value)  || 0,
        monthly: parseFloat(document.getElementById('poolMonthly').value) || 0
      },
      minBalance: parseFloat(document.getElementById('poolMinBal').value) || 0,
      poolPct:    parseFloat(document.getElementById('poolPct').value)    || 0
    };
    try {
      var res = await fetch(WORKER_URL + '/admin/arena-config', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      var data = await res.json();
      if (data.ok) { msg.style.color = '#22c55e'; msg.textContent = '저장 완료 — 홈페이지에 반영됩니다.'; }
      else { msg.style.color = '#ef4444'; msg.textContent = '실패: ' + (data.error || '오류'); }
    } catch(e) { msg.style.color = '#ef4444'; msg.textContent = '실패: ' + e.message; }
  }

  function doLogout() {
    fetch(WORKER_URL + '/logout', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ sessionToken: getToken() })
    }).catch(function(){});
    localStorage.removeItem('ayilon_session_token');
    localStorage.removeItem('ayilon_user');
    localStorage.removeItem('ayilon_subscription');
    window.location.href = 'index.html';
  }

  var _allUsers = [];
  var _planTarget = null;

  async function loadUsers() {
    var tableEl = document.getElementById('adminUserTable');
    if (tableEl) tableEl.innerHTML = '<div style="padding:32px;text-align:center;color:var(--gray-400);">로딩 중...</div>';
    try {
      var res = await fetch(WORKER_URL + '/admin/list-users', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ sessionToken: getToken() })
      });
      var data = await res.json();
      if (!data.ok) { window.location.href = 'login.html'; return; }
      _allUsers = data.users || [];
      var paid = _allUsers.filter(function(u) { return u.plan && u.plan !== 'free' && u.plan !== ''; }).length;
      var bots = _allUsers.filter(function(u) { return u.botRunning; }).length;
      document.getElementById('adminTotalUsers').textContent = _allUsers.length;
      document.getElementById('adminPaidUsers').textContent = paid;
      document.getElementById('adminActiveBots').textContent = bots;
      filterUsers();
    } catch(e) {
      if (tableEl) tableEl.innerHTML = '<div style="padding:32px;text-align:center;color:#ef4444;">불러오기 실패: ' + e.message + '</div>';
    }
  }

  function filterUsers() {
    var q = (document.getElementById('searchInput').value || '').toLowerCase();
    var filtered = q ? _allUsers.filter(function(u) { return u.email.toLowerCase().indexOf(q) !== -1; }) : _allUsers;
    renderTable(filtered);
  }

  function renderTable(users) {
    var el = document.getElementById('adminUserTable');
    if (!el) return;
    if (!users.length) { el.innerHTML = '<div style="padding:32px;text-align:center;color:var(--gray-400);">회원 없음</div>'; return; }
    var planColor = { starter: '#22c55e', pro: '#3b82f6', elite: '#a855f7' };
    el.innerHTML = '<table style="width:100%;border-collapse:collapse;font-size:13px;">' +
      '<thead><tr style="border-bottom:1px solid var(--border);color:var(--gray-400);">' +
      '<th style="padding:10px 12px;text-align:left;font-weight:500;">이메일</th>' +
      '<th style="padding:10px 12px;text-align:left;font-weight:500;">플랜</th>' +
      '<th style="padding:10px 12px;text-align:left;font-weight:500;">리퍼럴</th>' +
      '<th style="padding:10px 12px;text-align:left;font-weight:500;">라이브</th>' +
      '<th style="padding:10px 12px;text-align:left;font-weight:500;">봇</th>' +
      '<th style="padding:10px 12px;text-align:left;font-weight:500;">가입일</th>' +
      '<th style="padding:10px 12px;text-align:left;font-weight:500;">관리</th>' +
      '</tr></thead><tbody>' +
      users.map(function(u) {
        var plan = u.plan || '';
        var planLabel = plan && plan !== 'free' ? plan.toUpperCase() : '미구독';
        var planStyle = planColor[plan] ? 'color:' + planColor[plan] + ';font-weight:600;' : 'color:var(--gray-400);';
        var refBadge = u.referralVerified ? '<span style="color:#fbbf24;font-weight:600;">★ 인증</span>' : '<span style="color:var(--gray-400);">—</span>';
        var liveBadge = u.canLive ? '<span style="color:#22c55e;">가능</span>' : '<span style="color:var(--gray-400);">데모</span>';
        var botBadge = u.botRunning ? '<span style="color:#22c55e;">실행 중</span>' : '<span style="color:var(--gray-400);">—</span>';
        var joined = u.createdAt ? new Date(u.createdAt).toLocaleDateString('ko-KR') : '—';
        return '<tr style="border-bottom:1px solid var(--border);">' +
          '<td style="padding:12px;">' + u.email + '</td>' +
          '<td style="padding:12px;"><span style="' + planStyle + '">' + planLabel + '</span></td>' +
          '<td style="padding:12px;">' + refBadge + '</td>' +
          '<td style="padding:12px;">' + liveBadge + '</td>' +
          '<td style="padding:12px;">' + botBadge + '</td>' +
          '<td style="padding:12px;color:var(--gray-400);">' + joined + '</td>' +
          '<td style="padding:12px;"><button onclick="showSetPlan(\'' + u.email.replace(/'/g, "\\'") + '\')" style="padding:4px 10px;background:none;border:1px solid rgba(255,255,255,0.15);border-radius:6px;color:var(--text);font-size:11px;cursor:pointer;">관리</button></td>' +
          '</tr>';
      }).join('') + '</tbody></table>';
  }

  function showSetPlan(email) {
    _planTarget = email;
    document.getElementById('setPlanTarget').textContent = '대상: ' + email;
    document.getElementById('setPlanPanel').style.display = '';
    document.getElementById('setPlanPanel').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  async function doSetPlan(plan) {
    if (!_planTarget) return;
    try {
      var res = await fetch(WORKER_URL + '/admin/set-plan', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ sessionToken: getToken(), email: _planTarget, plan: plan })
      });
      var data = await res.json();
      if (data.ok) {
        document.getElementById('setPlanPanel').style.display = 'none';
        _planTarget = null;
        alert('플랜 설정 완료: ' + plan.toUpperCase() + (plan === 'free' ? '' : ' (30일)'));
        await loadUsers();
      } else {
        alert('실패: ' + (data.error || '알 수 없는 오류'));
      }
    } catch(e) {
      alert('실패: ' + e.message);
    }
  }

  async function doSetReferral(verified) {
    if (!_planTarget) return;
    try {
      var res = await fetch(WORKER_URL + '/admin/set-referral', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ sessionToken: getToken(), email: _planTarget, verified: verified })
      });
      var data = await res.json();
      if (data.ok) {
        document.getElementById('setPlanPanel').style.display = 'none';
        _planTarget = null;
        alert(verified ? '리퍼럴 인증 완료 — Elite(전 종목) 영구 무료' : '리퍼럴 해제 완료');
        await loadUsers();
      } else {
        alert('실패: ' + (data.error || '알 수 없는 오류'));
      }
    } catch(e) {
      alert('실패: ' + e.message);
    }
  }
</script>
</body>
</html>
