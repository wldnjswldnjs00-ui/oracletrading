<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oracle Trading Backtest</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',sans-serif;background:#0f0f13;color:#e0e0e0;min-height:100vh;padding:20px;}
h1{text-align:center;font-size:1.6rem;margin-bottom:20px;color:#fff;}
.card{background:#1a1a24;border-radius:12px;padding:18px;margin-bottom:16px;border:1px solid #2a2a3a;}
.card h2{font-size:1rem;margin-bottom:12px;color:#aaa;text-transform:uppercase;letter-spacing:.05em;}
.row{display:flex;flex-wrap:wrap;gap:12px;align-items:flex-end;}
.field{display:flex;flex-direction:column;gap:4px;}
.field label{font-size:.75rem;color:#888;}
.field input{background:#0f0f18;border:1px solid #333;border-radius:6px;color:#e0e0e0;padding:6px 10px;width:110px;font-size:.85rem;}
.tier-row{display:flex;align-items:center;gap:12px;padding:6px 0;}
.tier-badge{font-size:.7rem;font-weight:700;padding:2px 8px;border-radius:9999px;min-width:70px;text-align:center;}
.tier-SCALP{background:#78350f;color:#fbbf24;}
.tier-DAY{background:#1e3a5f;color:#60a5fa;}
.tier-SWING{background:#14532d;color:#4ade80;}
button{padding:12px 28px;border:none;border-radius:8px;cursor:pointer;font-size:1rem;font-weight:700;touch-action:manipulation;-webkit-tap-highlight-color:rgba(99,102,241,.3);user-select:none;}
.btn-primary{background:#6366f1;color:#fff;}
.btn-primary:active{background:#4f46e5;}
.btn-secondary{background:#374151;color:#e0e0e0;}
.btn-secondary:active{background:#4b5563;}
button:disabled{opacity:.4;cursor:not-allowed;}
#runOverlay{display:none;position:fixed;top:0;left:0;width:100%;z-index:9999;background:#6366f1;color:#fff;text-align:center;padding:14px;font-size:1.1rem;font-weight:700;letter-spacing:.03em;}
.progress-wrap{height:8px;background:#1f1f2e;border-radius:4px;overflow:hidden;margin:10px 0;}
.progress-bar{height:100%;background:#6366f1;transition:width .2s;border-radius:4px;}
#statusMsg{font-size:.82rem;color:#888;min-height:18px;}
table{width:100%;border-collapse:collapse;font-size:.8rem;}
th{background:#1f1f2e;padding:8px 6px;text-align:left;color:#aaa;border-bottom:1px solid #2a2a3a;}
td{padding:7px 6px;border-bottom:1px solid #1f1f2e;}
tr:hover td{background:#1f1f2e;}
.win{color:#4ade80;} .loss{color:#f87171;} .neutral{color:#facc15;}
.ev-table td,.ev-table th{padding:5px 10px;}
canvas{width:100%;height:220px;display:block;}
.tabs{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;}
.tab{padding:4px 14px;border-radius:6px;background:#1f1f2e;cursor:pointer;font-size:.78rem;border:1px solid #2a2a3a;}
.tab.active{background:#6366f1;color:#fff;border-color:#6366f1;}
.math-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.math-box{background:#0f0f18;border-radius:8px;padding:12px;}
.math-box h3{font-size:.78rem;color:#888;margin-bottom:8px;}
</style>
</head>
<body>
<div id="runOverlay">⏳ 백테스트 실행 중... 잠시 기다려 주세요</div>
<h1>Oracle Trading Backtest — 3-Tier Strategy</h1>

<div class="card">
  <h2>공통 설정</h2>
  <div class="row">
    <div class="field"><label>페어</label><input id="pair" value="BTC-USDT-SWAP" /></div>
    <div class="field"><label>레버리지</label><input id="leverage" type="number" value="10" min="1" max="100" /></div>
    <div class="field"><label>R:R 배율</label><input id="rr" type="number" value="2.5" step="0.1" min="1" /></div>
  </div>
</div>

<div class="card">
  <h2>티어별 리스크 설정</h2>
  <div class="tier-row">
    <span class="tier-badge tier-SCALP">SCALP 5m</span>
    <div class="field"><label>위험/거래(%)</label><input id="risk_scalp" type="number" value="0.5" step="0.1" min="0.1" max="5" style="width:90px"/></div>
    <div class="field"><label>최대포지션(%×lev)</label><input id="pos_scalp" type="number" value="5" step="0.5" min="1" max="50" style="width:90px"/></div>
  </div>
  <div class="tier-row">
    <span class="tier-badge tier-DAY">DAY 15m</span>
    <div class="field"><label>위험/거래(%)</label><input id="risk_day" type="number" value="1.0" step="0.1" min="0.1" max="5" style="width:90px"/></div>
    <div class="field"><label>최대포지션(%×lev)</label><input id="pos_day" type="number" value="7" step="0.5" min="1" max="50" style="width:90px"/></div>
  </div>
  <div class="tier-row">
    <span class="tier-badge tier-SWING">SWING 4H</span>
    <div class="field"><label>위험/거래(%)</label><input id="risk_swing" type="number" value="2.0" step="0.1" min="0.1" max="5" style="width:90px"/></div>
    <div class="field"><label>최대포지션(%×lev)</label><input id="pos_swing" type="number" value="10" step="0.5" min="1" max="50" style="width:90px"/></div>
  </div>
</div>

<div class="card">
  <div class="row" style="align-items:center;gap:16px;">
    <button type="button" id="btnFull" class="btn-primary" onclick="runAll()">전체 백테스트 실행</button>
    <button type="button" id="btnQuick" class="btn-secondary" onclick="runQuick()">빠른 실행 (ADX≥20 고정)</button>
    <div id="statusMsg">준비됨</div>
  </div>
  <div class="progress-wrap"><div class="progress-bar" id="pBar" style="width:0%"></div></div>
</div>

<div class="card" id="resultsCard" style="display:none">
  <h2>백테스트 결과</h2>
  <div style="overflow-x:auto">
  <table id="resTable">
    <thead>
      <tr>
        <th>전략</th><th>티어</th><th>거래수(실)/연환산</th><th>승률</th><th>EV/R</th><th>월평균</th><th>연복리</th><th>최대낙폭</th><th>차트</th>
      </tr>
    </thead>
    <tbody id="resTbody"></tbody>
  </table>
  </div>
</div>

<div class="card" id="chartCard" style="display:none">
  <h2>수익곡선</h2>
  <div class="tabs" id="chartTabs"></div>
  <canvas id="eqCanvas" height="220"></canvas>
</div>

<div class="card">
  <h2>EV / 기댓값 이론</h2>
  <div class="math-grid">
    <div class="math-box">
      <h3>EV 공식</h3>
      <p style="font-size:.82rem;color:#ccc;line-height:1.7">
        EV = WR × R:R − (1 − WR)<br>
        EV > 0 이면 수익 전략<br>
        손익분기 WR = 1 / (R:R + 1)
      </p>
    </div>
    <div class="math-box">
      <h3>R:R별 손익분기 승률</h3>
      <table class="ev-table">
        <thead><tr><th>R:R</th><th>BEP WR</th></tr></thead>
        <tbody id="evBody"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
// ─────────────────────────────────────────────
// Indicator helpers
// ─────────────────────────────────────────────

function emaArr(closes, p) {
  var n = closes.length;
  var out = new Array(n);
  var k = 2 / (p + 1);
  out[0] = closes[0];
  for (var i = 1; i < n; i++) {
    out[i] = closes[i] * k + out[i - 1] * (1 - k);
  }
  return out;
}

function rsiArr(closes, p) {
  var n = closes.length;
  var out = new Array(n).fill(50);
  if (n < p + 1) return out;
  var avgG = 0, avgL = 0;
  for (var i = 1; i <= p; i++) {
    var d = closes[i] - closes[i - 1];
    if (d > 0) avgG += d; else avgL -= d;
  }
  avgG /= p; avgL /= p;
  out[p] = avgL === 0 ? 100 : 100 - 100 / (1 + avgG / avgL);
  for (var i = p + 1; i < n; i++) {
    var d = closes[i] - closes[i - 1];
    var g = d > 0 ? d : 0;
    var l = d < 0 ? -d : 0;
    avgG = (avgG * (p - 1) + g) / p;
    avgL = (avgL * (p - 1) + l) / p;
    out[i] = avgL === 0 ? 100 : 100 - 100 / (1 + avgG / avgL);
  }
  return out;
}

function atrArr(hi, lo, cl, p) {
  var n = hi.length;
  var out = new Array(n).fill(0);
  if (n < 2) return out;
  var tr0 = hi[0] - lo[0];
  out[0] = tr0;
  var sum = tr0;
  for (var i = 1; i < p && i < n; i++) {
    var tr = Math.max(hi[i] - lo[i], Math.abs(hi[i] - cl[i - 1]), Math.abs(lo[i] - cl[i - 1]));
    sum += tr;
    out[i] = sum / (i + 1);
  }
  if (n <= p) return out;
  var prev = sum / p;
  out[p - 1] = prev;
  for (var i = p; i < n; i++) {
    var tr = Math.max(hi[i] - lo[i], Math.abs(hi[i] - cl[i - 1]), Math.abs(lo[i] - cl[i - 1]));
    prev = (prev * (p - 1) + tr) / p;
    out[i] = prev;
  }
  return out;
}

function adxArr(hi, lo, cl, p) {
  var n = hi.length;
  var out = new Array(n).fill(0);
  if (n < p + 2) return out;
  var dmP = new Array(n).fill(0);
  var dmM = new Array(n).fill(0);
  var tr = new Array(n).fill(0);
  tr[0] = hi[0] - lo[0];
  for (var i = 1; i < n; i++) {
    var upMove = hi[i] - hi[i - 1];
    var downMove = lo[i - 1] - lo[i];
    dmP[i] = (upMove > downMove && upMove > 0) ? upMove : 0;
    dmM[i] = (downMove > upMove && downMove > 0) ? downMove : 0;
    tr[i] = Math.max(hi[i] - lo[i], Math.abs(hi[i] - cl[i - 1]), Math.abs(lo[i] - cl[i - 1]));
  }
  var smTR = 0, smP = 0, smM = 0;
  for (var i = 1; i <= p; i++) { smTR += tr[i]; smP += dmP[i]; smM += dmM[i]; }
  var diP, diM, dx;
  diP = smTR > 0 ? 100 * smP / smTR : 0;
  diM = smTR > 0 ? 100 * smM / smTR : 0;
  dx = (diP + diM) > 0 ? 100 * Math.abs(diP - diM) / (diP + diM) : 0;
  var dxVals = new Array(n).fill(0);
  dxVals[p] = dx;
  for (var i = p + 1; i < n; i++) {
    smTR = smTR - smTR / p + tr[i];
    smP = smP - smP / p + dmP[i];
    smM = smM - smM / p + dmM[i];
    diP = smTR > 0 ? 100 * smP / smTR : 0;
    diM = smTR > 0 ? 100 * smM / smTR : 0;
    dx = (diP + diM) > 0 ? 100 * Math.abs(diP - diM) / (diP + diM) : 0;
    dxVals[i] = dx;
  }
  var adxSum = 0;
  var cnt = Math.min(p, n - p);
  for (var i = p; i < p + cnt; i++) adxSum += dxVals[i];
  if (2 * p - 1 < n) out[2 * p - 1] = cnt > 0 ? adxSum / cnt : 0;
  for (var i = 2 * p; i < n; i++) {
    out[i] = (out[i - 1] * (p - 1) + dxVals[i]) / p;
  }
  return out;
}

function bbArr(closes, p, m) {
  var n = closes.length;
  var upper = new Array(n).fill(0);
  var lower = new Array(n).fill(0);
  var mid = new Array(n).fill(0);
  for (var i = p - 1; i < n; i++) {
    var sum = 0;
    for (var j = i - p + 1; j <= i; j++) sum += closes[j];
    var mn = sum / p;
    var sq = 0;
    for (var j = i - p + 1; j <= i; j++) sq += (closes[j] - mn) * (closes[j] - mn);
    var sd = Math.sqrt(sq / p);
    mid[i] = mn;
    upper[i] = mn + m * sd;
    lower[i] = mn - m * sd;
  }
  return { upper: upper, lower: lower, mid: mid };
}

function stochRsiArr(closes, rl, sl, ks, ds) {
  var n = closes.length;
  var rsi = rsiArr(closes, rl);
  var rawK = new Array(n).fill(50);
  for (var i = sl - 1; i < n; i++) {
    var mn = Infinity, mx = -Infinity;
    for (var j = i - sl + 1; j <= i; j++) {
      if (rsi[j] < mn) mn = rsi[j];
      if (rsi[j] > mx) mx = rsi[j];
    }
    rawK[i] = mx === mn ? 50 : 100 * (rsi[i] - mn) / (mx - mn);
  }
  var smoothK = emaArr(rawK, ks);
  var smoothD = emaArr(smoothK, ds);
  return { k: smoothK, d: smoothD };
}

function macdArr(closes, fast, slow, sig) {
  var emaF = emaArr(closes, fast);
  var emaS = emaArr(closes, slow);
  var n = closes.length;
  var macdLine = new Array(n);
  for (var i = 0; i < n; i++) macdLine[i] = emaF[i] - emaS[i];
  var sigLine = emaArr(macdLine, sig);
  return { macd: macdLine, sig: sigLine };
}

function supertrendArr(hi, lo, cl, p, m) {
  var n = hi.length;
  var trend = new Array(n).fill(1);
  var slLine = new Array(n).fill(0);
  var atr = atrArr(hi, lo, cl, p);
  var upperB = new Array(n);
  var lowerB = new Array(n);
  for (var i = 0; i < n; i++) {
    var mid = (hi[i] + lo[i]) / 2;
    upperB[i] = mid + m * atr[i];
    lowerB[i] = mid - m * atr[i];
  }
  slLine[0] = upperB[0];
  trend[0] = -1;
  for (var i = 1; i < n; i++) {
    var prevTrend = trend[i - 1];
    var prevSl = slLine[i - 1];
    var newUpper = upperB[i];
    var newLower = lowerB[i];
    if (cl[i - 1] <= prevSl) newUpper = Math.min(newUpper, prevSl);
    if (cl[i - 1] >= prevSl) newLower = Math.max(newLower, prevSl);
    if (prevTrend === 1) {
      if (cl[i] < newLower) { trend[i] = -1; slLine[i] = newUpper; }
      else { trend[i] = 1; slLine[i] = newLower; }
    } else {
      if (cl[i] > newUpper) { trend[i] = 1; slLine[i] = newLower; }
      else { trend[i] = -1; slLine[i] = newUpper; }
    }
  }
  return { trend: trend, slLine: slLine };
}

function haArr(o, h, l, c) {
  var n = o.length;
  var haO = new Array(n);
  var haH = new Array(n);
  var haL = new Array(n);
  var haC = new Array(n);
  haO[0] = (o[0] + c[0]) / 2;
  haC[0] = (o[0] + h[0] + l[0] + c[0]) / 4;
  haH[0] = h[0];
  haL[0] = l[0];
  for (var i = 1; i < n; i++) {
    haC[i] = (o[i] + h[i] + l[i] + c[i]) / 4;
    haO[i] = (haO[i - 1] + haC[i - 1]) / 2;
    haH[i] = Math.max(h[i], haO[i], haC[i]);
    haL[i] = Math.min(l[i], haO[i], haC[i]);
  }
  return { haOpen: haO, haHigh: haH, haLow: haL, haClose: haC };
}

// ─────────────────────────────────────────────
// buildInd
// ─────────────────────────────────────────────
function buildInd(candles) {
  var n = candles.length;
  var o = new Array(n), h = new Array(n), l = new Array(n), c = new Array(n);
  for (var i = 0; i < n; i++) {
    o[i] = parseFloat(candles[i][1]);
    h[i] = parseFloat(candles[i][2]);
    l[i] = parseFloat(candles[i][3]);
    c[i] = parseFloat(candles[i][4]);
  }
  var ema3 = emaArr(c, 3), ema8 = emaArr(c, 8), ema21 = emaArr(c, 21);
  var ema55 = emaArr(c, 55), ema200 = emaArr(c, 200);
  var rsi14 = rsiArr(c, 14);
  var atr14 = atrArr(h, l, c, 14);
  var adx14 = adxArr(h, l, c, 14);
  var bb = bbArr(c, 20, 2);
  var srsi = stochRsiArr(c, 14, 14, 3, 3);
  var macd = macdArr(c, 12, 26, 9);
  var st = supertrendArr(h, l, c, 10, 3);
  var ha = haArr(o, h, l, c);
  return {
    n: n, o: o, h: h, l: l, c: c,
    ema3: ema3, ema8: ema8, ema21: ema21, ema55: ema55, ema200: ema200,
    rsi14: rsi14, atr14: atr14, adx14: adx14,
    bbU: bb.upper, bbL: bb.lower,
    srsiK: srsi.k, srsiD: srsi.d,
    macdL: macd.macd, macdS: macd.sig,
    stTrend: st.trend, stSl: st.slLine,
    haO: ha.haOpen, haC: ha.haClose
  };
}

// ─────────────────────────────────────────────
// Aggregation
// ─────────────────────────────────────────────
function agg(c5, factor) {
  var groups = [];
  var n = c5.length;
  for (var i = 0; i < n; i++) {
    var g = Math.floor(i / factor);
    if (!groups[g]) groups[g] = [];
    groups[g].push(c5[i]);
  }
  var result = [];
  for (var g = 0; g < groups.length; g++) {
    var grp = groups[g];
    if (!grp || grp.length === 0) continue;
    var ts = grp[0][0];
    var op = parseFloat(grp[0][1]);
    var hi = -Infinity, lo = Infinity;
    for (var j = 0; j < grp.length; j++) {
      var hv = parseFloat(grp[j][2]);
      var lv = parseFloat(grp[j][3]);
      if (hv > hi) hi = hv;
      if (lv < lo) lo = lv;
    }
    var cl = parseFloat(grp[grp.length - 1][4]);
    var vol = 0;
    for (var j = 0; j < grp.length; j++) vol += parseFloat(grp[j][5] || 0);
    result.push([ts, op, hi, lo, cl, vol]);
  }
  return result;
}

// ─────────────────────────────────────────────
// Signal functions
// ─────────────────────────────────────────────
function scalpSig(stratId, i, ind) {
  if (i < 2) return null;
  if (ind.adx14[i] < 20) return null;
  var atr = ind.atr14[i];
  if (!atr || atr <= 0) return null;
  var bull = ind.c[i] > ind.ema200[i];
  var bear = ind.c[i] < ind.ema200[i];

  if (stratId === 's_ema38') {
    // 추세 정렬: 롱은 ema8>ema21 + EMA200 위, 숏은 반대
    var trendUp = ind.ema8[i] > ind.ema21[i] && bull;
    var trendDn = ind.ema8[i] < ind.ema21[i] && bear;
    var crossUp = ind.ema3[i] > ind.ema8[i] && ind.ema3[i - 1] <= ind.ema8[i - 1];
    var crossDn = ind.ema3[i] < ind.ema8[i] && ind.ema3[i - 1] >= ind.ema8[i - 1];
    if (crossUp && trendUp && ind.rsi14[i] < 65) return { type: 'long', stopLoss: ind.c[i] - atr * 1.2 };
    if (crossDn && trendDn && ind.rsi14[i] > 35) return { type: 'short', stopLoss: ind.c[i] + atr * 1.2 };
  }

  if (stratId === 's_bb') {
    // BB 반등 + EMA200 방향 + RSI 과매도/과매수 확인
    var prevBelow = ind.c[i - 1] < ind.bbL[i - 1];
    var nowAbove = ind.c[i] >= ind.bbL[i];
    var prevAbove = ind.c[i - 1] > ind.bbU[i - 1];
    var nowBelow = ind.c[i] <= ind.bbU[i];
    if (prevBelow && nowAbove && bull && ind.rsi14[i] < 45) return { type: 'long', stopLoss: ind.c[i] - atr * 1.5 };
    if (prevAbove && nowBelow && bear && ind.rsi14[i] > 55) return { type: 'short', stopLoss: ind.c[i] + atr * 1.5 };
  }

  if (stratId === 's_stoch') {
    // StochRSI + EMA200 + EMA21 추세 확인
    var kCrossUp = ind.srsiK[i] > ind.srsiD[i] && ind.srsiK[i - 1] <= ind.srsiD[i - 1] && ind.srsiK[i] < 30;
    var kCrossDn = ind.srsiK[i] < ind.srsiD[i] && ind.srsiK[i - 1] >= ind.srsiD[i - 1] && ind.srsiK[i] > 70;
    if (kCrossUp && bull && ind.c[i] > ind.ema21[i]) return { type: 'long', stopLoss: ind.c[i] - atr * 1.2 };
    if (kCrossDn && bear && ind.c[i] < ind.ema21[i]) return { type: 'short', stopLoss: ind.c[i] + atr * 1.2 };
  }

  return null;
}

function daySig(stratId, i, ind) {
  if (i < 2) return null;
  if (ind.adx14[i] < 20) return null;
  var atr = ind.atr14[i];
  if (!atr || atr <= 0) return null;
  var bull = ind.c[i] > ind.ema200[i];
  var bear = ind.c[i] < ind.ema200[i];

  if (stratId === 'd_macd') {
    // MACD 크로스 + EMA200 방향 필터
    var crossUp = ind.macdL[i] > ind.macdS[i] && ind.macdL[i - 1] <= ind.macdS[i - 1] && ind.macdL[i] < 0;
    var crossDn = ind.macdL[i] < ind.macdS[i] && ind.macdL[i - 1] >= ind.macdS[i - 1] && ind.macdL[i] > 0;
    if (crossUp && bull) return { type: 'long', stopLoss: ind.c[i] - atr * 1.5 };
    if (crossDn && bear) return { type: 'short', stopLoss: ind.c[i] + atr * 1.5 };
  }

  if (stratId === 'd_st') {
    // 슈퍼트렌드 전환 + EMA200 방향 필터
    var flipUp = ind.stTrend[i] === 1 && ind.stTrend[i - 1] === -1;
    var flipDn = ind.stTrend[i] === -1 && ind.stTrend[i - 1] === 1;
    if (flipUp && bull) return { type: 'long', stopLoss: ind.stSl[i] };
    if (flipDn && bear) return { type: 'short', stopLoss: ind.stSl[i] };
  }

  if (stratId === 'd_rsi') {
    var cross50Up = ind.rsi14[i] > 50 && ind.rsi14[i - 1] <= 50 && bull;
    var cross50Dn = ind.rsi14[i] < 50 && ind.rsi14[i - 1] >= 50 && bear;
    if (cross50Up) return { type: 'long', stopLoss: ind.c[i] - atr * 1.5 };
    if (cross50Dn) return { type: 'short', stopLoss: ind.c[i] + atr * 1.5 };
  }

  return null;
}

function swingSig(stratId, i, ind) {
  if (i < 1) return null;
  if (ind.adx14[i] < 20) return null;
  var atr = ind.atr14[i];
  if (!atr || atr <= 0) return null;

  if (stratId === 'w_ha_srsi') {
    var haBull = ind.haC[i] > ind.haO[i];
    var haPrevBear = ind.haC[i - 1] <= ind.haO[i - 1];
    var kCrossUp = ind.srsiK[i] > ind.srsiD[i] && ind.srsiK[i - 1] <= ind.srsiD[i - 1] && ind.srsiK[i] < 30;
    var haBear = ind.haC[i] < ind.haO[i];
    var haPrevBull = ind.haC[i - 1] >= ind.haO[i - 1];
    var kCrossDn = ind.srsiK[i] < ind.srsiD[i] && ind.srsiK[i - 1] >= ind.srsiD[i - 1] && ind.srsiK[i] > 70;
    var bullFilter = ind.c[i] > ind.ema200[i];
    var bearFilter = ind.c[i] < ind.ema200[i];
    if (haBull && haPrevBear && kCrossUp && bullFilter) return { type: 'long', stopLoss: ind.c[i] - atr * 2.5 };
    if (haBear && haPrevBull && kCrossDn && bearFilter) return { type: 'short', stopLoss: ind.c[i] + atr * 2.5 };
  }

  if (stratId === 'w_ema2155') {
    var cross21_55Up = ind.ema21[i] > ind.ema55[i] && ind.ema21[i - 1] <= ind.ema55[i - 1] && ind.c[i] > ind.ema200[i];
    var cross21_55Dn = ind.ema21[i] < ind.ema55[i] && ind.ema21[i - 1] >= ind.ema55[i - 1] && ind.c[i] < ind.ema200[i];
    if (cross21_55Up) return { type: 'long', stopLoss: ind.c[i] - atr * 2.0 };
    if (cross21_55Dn) return { type: 'short', stopLoss: ind.c[i] + atr * 2.0 };
  }

  if (stratId === 'w_macd') {
    var hist = ind.macdL[i] - ind.macdS[i];
    var histPrev = ind.macdL[i - 1] - ind.macdS[i - 1];
    var crossUp = ind.macdL[i] > ind.macdS[i] && ind.macdL[i - 1] <= ind.macdS[i - 1];
    var crossDn = ind.macdL[i] < ind.macdS[i] && ind.macdL[i - 1] >= ind.macdS[i - 1];
    var histIncr = hist > histPrev;
    var histDecr = hist < histPrev;
    var bull200 = ind.c[i] > ind.ema200[i];
    var bear200 = ind.c[i] < ind.ema200[i];
    if (crossUp && histIncr && bull200) return { type: 'long', stopLoss: ind.c[i] - atr * 2.0 };
    if (crossDn && histDecr && bear200) return { type: 'short', stopLoss: ind.c[i] + atr * 2.0 };
  }

  return null;
}

// ─────────────────────────────────────────────
// Backtest engine
// ─────────────────────────────────────────────
async function runBacktest(c5, stratId, tier, riskFrac, leverage, posSizePct, rrMult) {
  var ind5 = buildInd(c5);
  var c15 = agg(c5, 3), c4h = agg(c5, 48);
  var ind15 = buildInd(c15), ind4h = buildInd(c4h);

  var equity = 10000, pos = null, pending = null;
  var wins = 0, total = 0, trades = [], curve = [], lastDay = -1;
  var WARMUP = tier === 'SCALP' ? 500 : tier === 'DAY' ? 1500 : 9600;
  var SL_MIN = tier === 'SCALP' ? 0.001 : tier === 'DAY' ? 0.003 : 0.005;
  var SL_MAX = tier === 'SCALP' ? 0.015 : tier === 'DAY' ? 0.030 : 0.080;
  var maxNF = (posSizePct / 100) * leverage;

  for (var i = WARMUP; i < c5.length - 1; i++) {
    var ts = parseInt(c5[i][0]);
    var hi5 = parseFloat(c5[i][2]);
    var lo5 = parseFloat(c5[i][3]);
    var cl5 = parseFloat(c5[i][4]);
    var day = Math.floor(ts / 86400000);
    if (day !== lastDay) { curve.push({ ts: ts, equity: equity }); lastDay = day; }

    // Enter pending
    if (pending && !pos) {
      var op5 = parseFloat(c5[i][1]);
      var slD = Math.abs(op5 - pending.sl) / op5;
      if (slD < SL_MIN || slD > SL_MAX) {
        pending = null;
      } else {
        var nf = Math.min(riskFrac / slD, maxNF);
        var slAmt = Math.abs(op5 - pending.sl);
        var tp = pending.dir === 'long' ? op5 + slAmt * rrMult : op5 - slAmt * rrMult;
        pos = { dir: pending.dir, entry: op5, sl: pending.sl, tp: tp, nf: nf };
        equity = Math.max(100, equity - equity * nf * 0.0005);
        pending = null;
      }
    }

    // Check exits
    if (pos) {
      var slHit = pos.dir === 'long' ? lo5 <= pos.sl : hi5 >= pos.sl;
      var tpHit = pos.dir === 'long' ? hi5 >= pos.tp : lo5 <= pos.tp;
      if (slHit || tpHit) {
        var win = tpHit && !slHit;
        var exitPx = win ? pos.tp : pos.sl;
        var ret = pos.dir === 'long' ? (exitPx - pos.entry) / pos.entry : (pos.entry - exitPx) / pos.entry;
        var pnl = equity * pos.nf * ret;
        equity = Math.max(100, equity + pnl - equity * pos.nf * 0.0005);
        trades.push({ ts: ts, type: win ? 'WIN' : 'LOSS', pnl: pnl, eq: equity });
        if (win) wins++;
        total++;
        pos = null;
      }
    }

    // Signal detection
    if (!pos && !pending) {
      var sig = null;
      if (tier === 'SCALP' && i >= 500) {
        sig = scalpSig(stratId, i, ind5);
      } else if (tier === 'DAY' && i % 3 === 2) {
        var i15 = Math.floor(i / 3);
        if (i15 >= 300) sig = daySig(stratId, i15, ind15);
      } else if (tier === 'SWING' && i % 48 === 47) {
        var i4h = Math.floor(i / 48);
        if (i4h >= 210) sig = swingSig(stratId, i4h, ind4h);
      }
      if (sig && sig.stopLoss) {
        var d = Math.abs(cl5 - sig.stopLoss) / cl5;
        if (d >= SL_MIN && d <= SL_MAX) pending = { dir: sig.type, sl: sig.stopLoss };
      }
    }
  }

  var wr = total > 0 ? wins / total : 0;
  var nDays = curve.length || 365;
  var totalRet = (equity - 10000) / 10000;
  var annRet = Math.pow(1 + totalRet, 365 / nDays) - 1;
  var monRet = Math.pow(1 + annRet, 1 / 12) - 1;
  var peak = 0, maxDD = 0;
  for (var j = 0; j < curve.length; j++) {
    if (curve[j].equity > peak) peak = curve[j].equity;
    var dd = (peak - curve[j].equity) / peak;
    if (dd > maxDD) maxDD = dd;
  }
  var ev = total > 0 ? wr * rrMult - (1 - wr) : 0;
  var annTrades = Math.round(total * 365 / nDays);
  return {
    equity: equity, totalRet: totalRet, annRet: annRet, monRet: monRet,
    totalTrades: total, annTrades: annTrades, winRate: wr, ev: ev, rrMult: rrMult,
    maxDD: maxDD, curve: curve, trades: trades
  };
}

// ─────────────────────────────────────────────
// OKX fetch
// ─────────────────────────────────────────────
async function fetchCandles5m(pair, onProgress) {
  var allCandles = [];
  var endTs = Date.now();
  var startTs = endTs - 365 * 24 * 60 * 60 * 1000;
  var limit = 300;
  var after = null;
  var maxIter = 200;

  for (var iter = 0; iter < maxIter; iter++) {
    var url = 'https://www.okx.com/api/v5/market/history-candles?instId=' + pair + '&bar=5m&limit=' + limit;
    if (after) url += '&after=' + after;
    var resp;
    try {
      resp = await fetch(url);
    } catch (e) {
      throw new Error('네트워크 오류: ' + e.message);
    }
    var json = await resp.json();
    if (!json.data || json.data.length === 0) break;

    var batch = json.data;
    batch.sort(function(a, b) { return parseInt(a[0]) - parseInt(b[0]); });

    var filtered = [];
    for (var k = 0; k < batch.length; k++) {
      if (parseInt(batch[k][0]) >= startTs) filtered.push(batch[k]);
    }
    allCandles = filtered.concat(allCandles);

    var oldest = parseInt(batch[0][0]);
    if (oldest <= startTs) break;
    after = oldest;

    if (onProgress) {
      var pct = Math.min(95, Math.round((endTs - oldest) / (endTs - startTs) * 100));
      onProgress(pct, allCandles.length);
    }
    await new Promise(function(r) { setTimeout(r, 120); });
  }

  allCandles.sort(function(a, b) { return parseInt(a[0]) - parseInt(b[0]); });
  return allCandles;
}

// ─────────────────────────────────────────────
// Strategy list
// ─────────────────────────────────────────────
var STRATS = [
  { id: 's_ema38',   name: 'EMA 3/8 교차',    tier: 'SCALP' },
  { id: 's_bb',      name: 'BB 밴드 반등',     tier: 'SCALP' },
  { id: 's_stoch',   name: 'StochRSI 과매도',  tier: 'SCALP' },
  { id: 'd_macd',    name: 'MACD 신호 교차',   tier: 'DAY'   },
  { id: 'd_st',      name: '슈퍼트렌드 전환',  tier: 'DAY'   },
  { id: 'd_rsi',     name: 'RSI 50 교차',      tier: 'DAY'   },
  { id: 'w_ha_srsi', name: 'HA+StochRSI',      tier: 'SWING' },
  { id: 'w_ema2155', name: 'EMA 21/55 교차',   tier: 'SWING' },
  { id: 'w_macd',    name: 'MACD 교차 (4H)',   tier: 'SWING' },
];

// ─────────────────────────────────────────────
// Global state
// ─────────────────────────────────────────────
var _c5 = null;
var _results = {};
var _activeChart = null;
var _running = false;

// ─────────────────────────────────────────────
// UI helpers
// ─────────────────────────────────────────────
function setProgress(pct, msg) {
  document.getElementById('pBar').style.width = pct + '%';
  if (msg !== undefined) document.getElementById('statusMsg').textContent = msg;
}

function getConfig() {
  return {
    pair: document.getElementById('pair').value.trim() || 'BTC-USDT',
    leverage: parseFloat(document.getElementById('leverage').value) || 10,
    rr: parseFloat(document.getElementById('rr').value) || 2.5,
    risk_scalp: parseFloat(document.getElementById('risk_scalp').value) / 100 || 0.005,
    risk_day: parseFloat(document.getElementById('risk_day').value) / 100 || 0.01,
    risk_swing: parseFloat(document.getElementById('risk_swing').value) / 100 || 0.02,
    pos_scalp: parseFloat(document.getElementById('pos_scalp').value) || 5,
    pos_day: parseFloat(document.getElementById('pos_day').value) || 7,
    pos_swing: parseFloat(document.getElementById('pos_swing').value) || 10,
  };
}

function getRiskForTier(cfg, tier) {
  if (tier === 'SCALP') return { risk: cfg.risk_scalp, pos: cfg.pos_scalp };
  if (tier === 'DAY') return { risk: cfg.risk_day, pos: cfg.pos_day };
  return { risk: cfg.risk_swing, pos: cfg.pos_swing };
}

function buildEvTable(rrVal) {
  var rows = [1.5, 2.0, 2.5, 3.0, 4.0];
  var tb = document.getElementById('evBody');
  tb.innerHTML = '';
  rows.forEach(function(r) {
    var bep = 1 / (r + 1);
    var tr = document.createElement('tr');
    tr.innerHTML = '<td>' + r.toFixed(1) + '</td><td>' + (bep * 100).toFixed(1) + '%</td>';
    if (Math.abs(r - rrVal) < 0.01) tr.style.color = '#facc15';
    tb.appendChild(tr);
  });
}

function renderResults() {
  var tb = document.getElementById('resTbody');
  tb.innerHTML = '';
  var tabsEl = document.getElementById('chartTabs');
  tabsEl.innerHTML = '';

  STRATS.forEach(function(s) {
    var res = _results[s.id];
    if (!res) return;

    var tierClass = 'tier-' + s.tier;
    var wr = res.winRate;
    var ev = res.ev;
    var mon = res.monRet;
    var ann = res.annRet;
    var dd = res.maxDD;

    var wrClass = wr >= 0.5 ? 'win' : 'loss';
    var evClass = ev > 0 ? 'win' : 'loss';
    var monClass = mon > 0 ? 'win' : 'loss';
    var annClass = ann > 0 ? 'win' : 'loss';
    var ddClass = dd < 0.15 ? 'win' : dd < 0.30 ? 'neutral' : 'loss';

    var tr = document.createElement('tr');
    tr.innerHTML =
      '<td><strong>' + s.name + '</strong></td>' +
      '<td><span class="tier-badge ' + tierClass + '">' + s.tier + '</span></td>' +
      '<td>' + res.totalTrades + ' / ' + res.annTrades + '</td>' +
      '<td class="' + wrClass + '">' + (wr * 100).toFixed(1) + '%</td>' +
      '<td class="' + evClass + '">' + ev.toFixed(3) + '</td>' +
      '<td class="' + monClass + '">' + (mon * 100).toFixed(2) + '%</td>' +
      '<td class="' + annClass + '">' + (ann * 100).toFixed(1) + '%</td>' +
      '<td class="' + ddClass + '">' + (dd * 100).toFixed(1) + '%</td>' +
      '<td><button type="button" class="btn-secondary" style="padding:3px 10px;font-size:.73rem" onclick="showChart(\'' + s.id + '\')">보기</button></td>';
    tb.appendChild(tr);

    var tab = document.createElement('div');
    tab.className = 'tab';
    tab.textContent = s.name;
    tab.setAttribute('data-id', s.id);
    tab.onclick = function() { showChart(this.getAttribute('data-id')); };
    tabsEl.appendChild(tab);
  });

  document.getElementById('resultsCard').style.display = '';
  document.getElementById('chartCard').style.display = '';

  var firstId = STRATS[0] ? STRATS[0].id : null;
  if (firstId && _results[firstId]) showChart(firstId);
}

function showChart(stratId) {
  _activeChart = stratId;
  var tabs = document.querySelectorAll('#chartTabs .tab');
  tabs.forEach(function(t) {
    t.classList.toggle('active', t.getAttribute('data-id') === stratId);
  });
  drawEquityCurve(stratId);
}

function drawEquityCurve(stratId) {
  var res = _results[stratId];
  if (!res || !res.curve || res.curve.length === 0) return;
  var canvas = document.getElementById('eqCanvas');
  var ctx = canvas.getContext('2d');
  var W = canvas.offsetWidth || 800;
  var H = 220;
  canvas.width = W;
  canvas.height = H;
  ctx.clearRect(0, 0, W, H);

  var curve = res.curve;
  var vals = curve.map(function(p) { return p.equity; });
  var minV = Math.min.apply(null, vals);
  var maxV = Math.max.apply(null, vals);
  var range = maxV - minV || 1;
  var pad = 30;

  ctx.fillStyle = '#0f0f18';
  ctx.fillRect(0, 0, W, H);

  ctx.strokeStyle = '#1f1f2e';
  ctx.lineWidth = 1;
  for (var g = 0; g <= 4; g++) {
    var y = pad + (H - 2 * pad) * (1 - g / 4);
    ctx.beginPath();
    ctx.moveTo(pad, y);
    ctx.lineTo(W - pad, y);
    ctx.stroke();
    var label = (minV + range * g / 4).toFixed(0);
    ctx.fillStyle = '#555';
    ctx.font = '10px sans-serif';
    ctx.fillText(label, 2, y + 4);
  }

  var y0 = pad + (H - 2 * pad) * (1 - (10000 - minV) / range);
  ctx.strokeStyle = '#374151';
  ctx.setLineDash([4, 4]);
  ctx.beginPath(); ctx.moveTo(pad, y0); ctx.lineTo(W - pad, y0); ctx.stroke();
  ctx.setLineDash([]);

  var s = STRATS.find(function(x) { return x.id === stratId; });
  var tierColor = s ? (s.tier === 'SCALP' ? '#fbbf24' : s.tier === 'DAY' ? '#60a5fa' : '#4ade80') : '#6366f1';
  ctx.strokeStyle = tierColor;
  ctx.lineWidth = 2;
  ctx.beginPath();
  for (var k = 0; k < curve.length; k++) {
    var x = pad + (W - 2 * pad) * k / (curve.length - 1);
    var y = pad + (H - 2 * pad) * (1 - (curve[k].equity - minV) / range);
    if (k === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.stroke();

  ctx.lineTo(pad + (W - 2 * pad), H - pad);
  ctx.lineTo(pad, H - pad);
  ctx.closePath();
  ctx.fillStyle = tierColor + '22';
  ctx.fill();

  var strat = STRATS.find(function(x) { return x.id === stratId; });
  ctx.fillStyle = '#ccc';
  ctx.font = '12px sans-serif';
  ctx.fillText((strat ? strat.name : stratId) + '  최종: $' + vals[vals.length - 1].toFixed(0), pad + 4, 16);
}

// ─────────────────────────────────────────────
// Run functions
// ─────────────────────────────────────────────
function _setBusy(busy, label) {
  var btnFull = document.getElementById('btnFull');
  var btnQuick = document.getElementById('btnQuick');
  var overlay = document.getElementById('runOverlay');
  if (busy) {
    if (btnFull) { btnFull.disabled = true; btnFull.textContent = label || '실행 중...'; }
    if (btnQuick) { btnQuick.disabled = true; }
    if (overlay) overlay.style.display = 'block';
  } else {
    if (btnFull) { btnFull.disabled = false; btnFull.textContent = '전체 백테스트 실행'; }
    if (btnQuick) { btnQuick.disabled = false; }
    if (overlay) overlay.style.display = 'none';
  }
}

async function runAll() {
  if (_running) return;
  _running = true;
  _setBusy(true, '⏳ 전체 실행 중...');
  var statusEl = document.getElementById('statusMsg');
  if (statusEl) statusEl.style.cssText = 'font-size:1rem;color:#a5b4fc;font-weight:600;min-height:18px;';
  setProgress(5, '시작됨 — OKX 데이터 수집 중...');
  await new Promise(function(r) { setTimeout(r, 80); }); // force render before fetch

  try {
    var cfg = getConfig();
    buildEvTable(cfg.rr);
    if (!_c5 || _c5.length === 0) {
      _c5 = await fetchCandles5m(cfg.pair, function(pct, cnt) {
        setProgress(5 + Math.round(pct * 25), '수집 중: ' + cnt + '개');
      });
    }
    setProgress(30, '데이터 준비 완료 (' + _c5.length + '개 5m 봉). 백테스트 실행 중...');

    _results = {};
    for (var i = 0; i < STRATS.length; i++) {
      var s = STRATS[i];
      var r = getRiskForTier(cfg, s.tier);
      setProgress(30 + Math.round((i / STRATS.length) * 65), s.name + ' 실행 중...');
      await new Promise(function(resolve) { setTimeout(resolve, 0); });
      _results[s.id] = await runBacktest(_c5, s.id, s.tier, r.risk, cfg.leverage, r.pos, cfg.rr);
      await new Promise(function(resolve) { setTimeout(resolve, 0); });
    }

    setProgress(100, '✅ 완료! ' + STRATS.length + '개 전략 백테스트 완료.');
    if (statusEl) statusEl.style.cssText = 'font-size:1rem;color:#4ade80;font-weight:700;min-height:18px;';
    renderResults();
  } catch (e) {
    if (statusEl) statusEl.style.cssText = 'font-size:1.1rem;color:#f87171;font-weight:700;min-height:18px;';
    setProgress(0, '❌ 오류: ' + e.message);
    console.error(e);
  } finally {
    _running = false;
    _setBusy(false);
  }
}

async function runQuick() {
  if (_running) return;
  _running = true;
  _setBusy(true, '⏳ 빠른 실행 중...');
  var statusEl = document.getElementById('statusMsg');
  if (statusEl) statusEl.style.cssText = 'font-size:1rem;color:#a5b4fc;font-weight:600;min-height:18px;';
  setProgress(5, '빠른 실행 시작됨 — OKX 데이터 수집 중...');
  await new Promise(function(r) { setTimeout(r, 80); }); // force render before fetch

  try {
    var cfg = getConfig();
    buildEvTable(cfg.rr);
    if (!_c5 || _c5.length === 0) {
      _c5 = await fetchCandles5m(cfg.pair, function(pct, cnt) {
        setProgress(5 + Math.round(pct * 25), '수집 중: ' + cnt + '개');
      });
    }
    setProgress(30, '빠른 실행: ADX >= 20 고정. 백테스트 중...');

    _results = {};
    for (var i = 0; i < STRATS.length; i++) {
      var s = STRATS[i];
      var r = getRiskForTier(cfg, s.tier);
      setProgress(30 + Math.round((i / STRATS.length) * 65), s.name + ' 빠른 실행 중...');
      await new Promise(function(resolve) { setTimeout(resolve, 0); });
      _results[s.id] = await runBacktest(_c5, s.id, s.tier, r.risk, cfg.leverage, r.pos, cfg.rr);
      await new Promise(function(resolve) { setTimeout(resolve, 0); });
    }

    setProgress(100, '✅ 빠른 실행 완료!');
    if (statusEl) statusEl.style.cssText = 'font-size:1rem;color:#4ade80;font-weight:700;min-height:18px;';
    renderResults();
  } catch (e) {
    if (statusEl) statusEl.style.cssText = 'font-size:1.1rem;color:#f87171;font-weight:700;min-height:18px;';
    setProgress(0, '❌ 오류: ' + e.message);
    console.error(e);
  } finally {
    _running = false;
    _setBusy(false);
  }
}
