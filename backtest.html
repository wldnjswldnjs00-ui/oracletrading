<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Backtest — AYILON</title>
<style>

<body>
<h1>Strategy Backtest</h1>
<p class="sub">1-year backtest · 5m candles → 1H aggregation · OKX BTC/ETH-USDT-SWAP</p>

<div class="controls">
  <select id="pairSel">
    <option value="BTC-USDT-SWAP">BTC-USDT-SWAP</option>
    <option value="ETH-USDT-SWAP">ETH-USDT-SWAP</option>
  </select>
  <button class="run" id="runBtn" onclick="runBacktest()">Run Backtest</button>
</div>

<div class="progress"><div class="progress-bar" id="prog"></div></div>
<div class="log" id="log"></div>
<div class="summary" id="summary" style="display:none"></div>
<div class="grid" id="cards"></div>

<script>
const OKX = 'https://www.okx.com';
const RR = 1.5;
const FEE = 0.001;
const TRAIL_STEP = 0.01;
const STRATEGIES = [
  { id: 'ha_ema_srsi', name: 'HA + EMA + StochRSI', type: 'SWING' },
  { id: 'ma_ribbon',   name: 'MA Ribbon',            type: 'SWING' },
  { id: 'ma50_bounce', name: 'MA50 Bounce',           type: 'SCALP' },
  { id: 'ict_fib_ote', name: 'ICT Fibonacci OTE',     type: 'SWING' }
];
const SCALP_STRATS = new Set(['ma50_bounce']);

function log(msg) {
  const el = document.getElementById('log');
  const d = document.createElement('div');
  d.className = 'msg';
  d.textContent = new Date().toTimeString().slice(0,8) + ' ' + msg;
  el.insertBefore(d, el.firstChild);
}
function prog(pct) {
  document.getElementById('prog').style.width = pct + '%';
}

async function fetchCandles5m(pair) {
  const ONE_YEAR_AGO = Math.floor(Date.now() / 3600000) * 3600000 - 365 * 24 * 3600000;
  log(`Fetching 5m candles for ${pair}...`);
  const seen = new Map();
  let after = '';
  let batch = 0;
  for (;;) {
    const url = `${OKX}/api/v5/market/history-candles?instId=${pair}&bar=5m&limit=100${after ? '&after=' + after : ''}`;
    const res = await fetch(url);
    const j = await res.json();
    const rows = j.data || [];
    if (!rows.length) break;
    let gotNew = false;
    for (const r of rows) {
      const ts = parseInt(r[0]);
      if (ts < ONE_YEAR_AGO) continue;
      if (!seen.has(ts)) { seen.set(ts, r); gotNew = true; }
    }
    const oldest = parseInt(rows[rows.length - 1][0]);
    if (oldest < ONE_YEAR_AGO) break;
    if (!gotNew) break;
    after = oldest;
    batch++;
    if (batch % 20 === 0) log(`  ...fetched ${seen.size} 5m candles so far`);
    await new Promise(r => setTimeout(r, 120));
  }
  const sorted = [...seen.values()].sort((a, b) => parseInt(a[0]) - parseInt(b[0]));
  log(`Loaded ${sorted.length} 5m candles for ${pair}`);
  return sorted;
}

function aggregate1H(candles5m) {
  // candles5m: oldest-first [ts, open, high, low, close, vol]
  const buckets = new Map();
  for (const c of candles5m) {
    const ts = parseInt(c[0]);
    const hr = Math.floor(ts / 3600000) * 3600000;
    if (!buckets.has(hr)) {
      buckets.set(hr, { ts: hr, open: c[1], high: parseFloat(c[2]), low: parseFloat(c[3]), close: c[4], vol: 0 });
    } else {
      const b = buckets.get(hr);
      b.high = Math.max(b.high, parseFloat(c[2]));
      b.low  = Math.min(b.low,  parseFloat(c[3]));
      b.close = c[4];
    }
    buckets.get(hr).vol += parseFloat(c[5]);
  }
  return [...buckets.values()]
    .sort((a, b) => a.ts - b.ts)
    .map(b => [String(b.ts), String(b.open), String(b.high), String(b.low), String(b.close), String(b.vol)]);
}

// ── Indicators ────────────────────────────────────────────────
function _sma(arr, n) {
  if (arr.length < n) return null;
  return arr.slice(arr.length - n).reduce((s, v) => s + v, 0) / n;
}
function calcRSIarr(closes, period = 14) {
  if (closes.length < period + 2) return null;
  let gains = 0, losses = 0;
  for (let i = 1; i <= period; i++) {
    const d = closes[i] - closes[i - 1];
    if (d > 0) gains += d; else losses -= d;
  }
  let ag = gains / period, al = losses / period;
  for (let i = period + 1; i < closes.length; i++) {
    const d = closes[i] - closes[i - 1];
    ag = (ag * (period - 1) + Math.max(0, d)) / period;
    al = (al * (period - 1) + Math.max(0, -d)) / period;
  }
  if (al === 0) return 100;
  return 100 - 100 / (1 + ag / al);
}
function calcEMA200arr(closes) {
  if (closes.length < 200) return null;
  const k = 2 / 201;
  let ema = closes.slice(0, 200).reduce((s, v) => s + v, 0) / 200;
  for (let i = 200; i < closes.length; i++) ema = closes[i] * k + ema * (1 - k);
  return ema;
}
function calcStochRSIarr(closes, rsiLen = 14, stochLen = 14, kSmooth = 3, dSmooth = 3) {
  if (closes.length < rsiLen + stochLen + kSmooth + dSmooth + 5) return null;
  let gains = 0, losses = 0;
  for (let i = 1; i <= rsiLen; i++) {
    const d = closes[i] - closes[i - 1];
    if (d > 0) gains += d; else losses -= d;
  }
  let ag = gains / rsiLen, al = losses / rsiLen;
  const rsiSeries = [];
  for (let i = rsiLen; i < closes.length; i++) {
    const rs = al === 0 ? 100 : ag / al;
    rsiSeries.push(100 - 100 / (1 + rs));
    if (i < closes.length - 1) {
      const d = closes[i + 1] - closes[i];
      ag = (ag * (rsiLen - 1) + Math.max(d, 0)) / rsiLen;
      al = (al * (rsiLen - 1) + Math.max(-d, 0)) / rsiLen;
    }
  }
  if (rsiSeries.length < stochLen) return null;
  const stochSeries = [];
  for (let i = stochLen - 1; i < rsiSeries.length; i++) {
    const sl = rsiSeries.slice(i - stochLen + 1, i + 1);
    const hi = Math.max(...sl), lo = Math.min(...sl);
    stochSeries.push(hi === lo ? 50 : (rsiSeries[i] - lo) / (hi - lo) * 100);
  }
  if (stochSeries.length < kSmooth + dSmooth) return null;
  const kSeries = [];
  for (let i = kSmooth - 1; i < stochSeries.length; i++)
    kSeries.push(stochSeries.slice(i - kSmooth + 1, i + 1).reduce((s, v) => s + v, 0) / kSmooth);
  if (kSeries.length < dSmooth + 1) return null;
  const dSeries = [];
  for (let i = dSmooth - 1; i < kSeries.length; i++)
    dSeries.push(kSeries.slice(i - dSmooth + 1, i + 1).reduce((s, v) => s + v, 0) / dSmooth);
  const k0 = kSeries[kSeries.length - 1], k1 = kSeries[kSeries.length - 2];
  const d0 = dSeries[dSeries.length - 1], d1 = dSeries[dSeries.length - 2];
  return { k: k0, kPrev: k1, d: d0, dPrev: d1 };
}
function calcHAarr(candles) {
  const ha = [];
  for (let i = 0; i < candles.length; i++) {
    const o = parseFloat(candles[i][1]), h = parseFloat(candles[i][2]);
    const l = parseFloat(candles[i][3]), c = parseFloat(candles[i][4]);
    const haC = (o + h + l + c) / 4;
    const haO = i === 0 ? (o + c) / 2 : (ha[i-1][1] + ha[i-1][4]) / 2;
    const haH = Math.max(h, haO, haC), haL = Math.min(l, haO, haC);
    ha.push([candles[i][0], haO, haH, haL, haC, candles[i][5]]);
  }
  return ha;
}

// ── Signal functions (oldest-first candles, idx = current candle index) ──
function signalHAEmaSRSI(candles, idx) {
  if (idx < 210) return null;
  const slice = candles.slice(0, idx + 1); // oldest to current
  const closes = slice.map(c => parseFloat(c[4]));
  const ema200 = calcEMA200arr(closes);
  if (!ema200) return null;
  const srsi = calcStochRSIarr(closes);
  if (!srsi) return null;
  const ha = calcHAarr(slice);
  const haC = ha[ha.length - 1], haP = ha[ha.length - 2];
  const haOpen = haC[1], haHigh = haC[2], haLow = haC[3], haClose = haC[4];
  const pClose = haP[4], pOpen = haP[1];
  const haBody = Math.abs(haClose - haOpen), pBody = Math.abs(pClose - pOpen);
  const lowerWick = Math.min(haOpen, haClose) - haLow;
  const upperWick = haHigh - Math.max(haOpen, haClose);
  const price = parseFloat(candles[idx][4]);
  const kCrossUp   = srsi.kPrev < srsi.dPrev && srsi.k >= srsi.d && srsi.kPrev < 30;
  const strongBull = haClose > haOpen && haBody > pBody * 0.8 && lowerWick < haBody * 0.15;
  if (price > ema200 && kCrossUp && strongBull) {
    const swingLow = Math.min(...candles.slice(Math.max(0, idx - 7), idx).map(c => parseFloat(c[3])));
    if (swingLow >= price) return null;
    return { type: 'long', sl: swingLow };
  }
  const kCrossDown = srsi.kPrev > srsi.dPrev && srsi.k <= srsi.d && srsi.kPrev > 70;
  const strongBear = haClose < haOpen && haBody > pBody * 0.8 && upperWick < haBody * 0.15;
  if (price < ema200 && kCrossDown && strongBear) {
    const swingHigh = Math.max(...candles.slice(Math.max(0, idx - 7), idx).map(c => parseFloat(c[2])));
    if (swingHigh <= price) return null;
    return { type: 'short', sl: swingHigh };
  }
  return null;
}

function signalMARibbon(candles, idx) {
  if (idx < 105) return null;
  const closes = candles.slice(0, idx + 1).map(c => parseFloat(c[4]));
  const price = closes[closes.length - 1];
  const mas = [10, 20, 50, 100].map(p => ({ p, v: _sma(closes, p) })).filter(m => m.v);
  if (mas.length < 4) return null;
  const sorted = [...mas].sort((a, b) => a.p - b.p);
  const bullish = price > sorted[0].v && sorted.every((m, i) => i === 0 || sorted[i-1].v > m.v);
  const bearish = price < sorted[0].v && sorted.every((m, i) => i === 0 || sorted[i-1].v < m.v);
  if (!bullish && !bearish) return null;
  if (Math.abs(price - sorted[0].v) / price > 0.010) return null;
  const recentCandles = candles.slice(Math.max(0, idx - 5), idx + 1);
  const sl = bullish
    ? Math.min(...recentCandles.map(c => parseFloat(c[3])))
    : Math.max(...recentCandles.map(c => parseFloat(c[2])));
  const d = Math.abs(price - sl) / price;
  if (d < 0.005 || d > 0.12) return null;
  return bullish ? { type: 'long', sl } : { type: 'short', sl };
}

function signalMA50Bounce(candles, idx) {
  if (idx < 205) return null;
  const closes = candles.slice(0, idx + 1).map(c => parseFloat(c[4]));
  const price = closes[closes.length - 1];
  const sma50  = _sma(closes, 50);
  const sma200 = _sma(closes, 200);
  if (!sma50 || !sma200) return null;
  if (Math.abs(price - sma50) / price > 0.012) return null;
  const recent10 = candles.slice(Math.max(0, idx - 10), idx);
  const recentAbove = recent10.filter(c => parseFloat(c[4]) > sma50).length;
  const recentBelow = recent10.filter(c => parseFloat(c[4]) < sma50).length;
  const last3 = candles.slice(Math.max(0, idx - 3), idx + 1);
  const isNarrow = last3.every(c => Math.abs(parseFloat(c[4]) - parseFloat(c[1])) / parseFloat(c[1]) <= 0.008);
  const rsi = calcRSIarr(closes);
  if (!rsi || rsi < 35 || rsi > 65) return null;
  if (sma50 > sma200 && recentAbove >= 7 && price >= sma50 && isNarrow) {
    const sl = Math.min(...candles.slice(Math.max(0, idx - 5), idx + 1).map(c => parseFloat(c[3])));
    const d = (price - sl) / price;
    if (d < 0.003 || d > 0.08) return null;
    return { type: 'long', sl };
  }
  if (sma50 < sma200 && recentBelow >= 7 && price <= sma50 && isNarrow) {
    const sl = Math.max(...candles.slice(Math.max(0, idx - 5), idx + 1).map(c => parseFloat(c[2])));
    const d = (sl - price) / price;
    if (d < 0.003 || d > 0.08) return null;
    return { type: 'short', sl };
  }
  return null;
}

function signalICTFibOTE(candles, idx) {
  if (idx < 55) return null;
  const swing = candles.slice(Math.max(0, idx - 50), idx);
  const swingHigh = Math.max(...swing.map(c => parseFloat(c[2])));
  const swingLow  = Math.min(...swing.map(c => parseFloat(c[3])));
  const range = swingHigh - swingLow;
  if (range <= 0) return null;
  const oteBot = swingLow  + range * 0.21;
  const oteTop = swingLow  + range * 0.38;
  const prBot  = swingHigh - range * 0.38;
  const prTop  = swingHigh - range * 0.21;
  const cur = candles[idx];
  const price = parseFloat(cur[4]);
  const isBullish = parseFloat(cur[4]) > parseFloat(cur[1]);
  const isBearish = parseFloat(cur[4]) < parseFloat(cur[1]);
  const closes = candles.slice(0, idx + 1).map(c => parseFloat(c[4]));
  const rsi = calcRSIarr(closes);
  if (!rsi) return null;
  if (price >= oteBot && price <= oteTop && isBullish && rsi < 55) {
    const sl = swingLow * 0.999;
    const d = (price - sl) / price;
    if (d < 0.005 || d > 0.15) return null;
    return { type: 'long', sl };
  }
  if (price >= prBot && price <= prTop && isBearish && rsi > 45) {
    const sl = swingHigh * 1.001;
    const d = (sl - price) / price;
    if (d < 0.005 || d > 0.15) return null;
    return { type: 'short', sl };
  }
  return null;
}

const SIGNAL_FN = {
  ha_ema_srsi: signalHAEmaSRSI,
  ma_ribbon:   signalMARibbon,
  ma50_bounce: signalMA50Bounce,
  ict_fib_ote: signalICTFibOTE
};

// ── Backtest engine ───────────────────────────────────────────
function runStrategy(candles1H, stratId) {
  const isScalp = SCALP_STRATS.has(stratId);
  const fn = SIGNAL_FN[stratId];
  let trades = 0, wins = 0, totalPnl = 0;
  let pos = null;

  for (let i = 0; i < candles1H.length - 1; i++) {
    const c = candles1H[i];
    const nextC = candles1H[i + 1];
    const nextOpen = parseFloat(nextC[1]);
    const nextHigh = parseFloat(nextC[2]);
    const nextLow  = parseFloat(nextC[3]);

    // Check open position
    if (pos) {
      // Swing: trailing logic
      if (!isScalp && pos.halfClosed) {
        const movedEnough = pos.dir === 'long'
          ? nextHigh >= pos.lastTPLevel * (1 + TRAIL_STEP)
          : nextLow  <= pos.lastTPLevel * (1 - TRAIL_STEP);
        if (movedEnough) {
          const trailPrice = pos.dir === 'long' ? pos.lastTPLevel * (1 + TRAIL_STEP) : pos.lastTPLevel * (1 - TRAIL_STEP);
          const pnlPct = pos.dir === 'long'
            ? (trailPrice - pos.entry) / pos.entry
            : (pos.entry - trailPrice) / pos.entry;
          totalPnl += pnlPct * pos.remainFrac - FEE * pos.remainFrac;
          pos.lastTPLevel = trailPrice;
          pos.remainFrac *= 0.9;
          if (pos.remainFrac < 0.01) pos = null;
          continue;
        }
      }

      // SL check
      const slHit = pos.dir === 'long' ? nextLow <= pos.sl : nextHigh >= pos.sl;
      // TP check
      const tpHit = pos.dir === 'long' ? nextHigh >= pos.tp : nextLow <= pos.tp;

      if (slHit && tpHit) {
        // SL wins when both hit same candle
        const pnl = pos.dir === 'long'
          ? (pos.sl - pos.entry) / pos.entry
          : (pos.entry - pos.sl) / pos.entry;
        totalPnl += pnl - FEE;
        trades++; // loss
        pos = null;
        continue;
      }

      if (tpHit && !isScalp && !pos.halfClosed) {
        // SWING: 50% close at TP
        const pnlHalf = pos.dir === 'long'
          ? (pos.tp - pos.entry) / pos.entry * 0.5
          : (pos.entry - pos.tp) / pos.entry * 0.5;
        totalPnl += pnlHalf - FEE * 0.5;
        wins++;
        trades++;
        const dist = Math.abs(pos.tp - pos.entry);
        pos.sl = pos.dir === 'long' ? pos.entry + dist * 0.5 : pos.entry - dist * 0.5;
        pos.halfClosed = true;
        pos.lastTPLevel = pos.tp;
        pos.remainFrac = 0.5;
        pos.tp = null;
        continue;
      }

      if (tpHit && isScalp) {
        // SCALP: 100% close at TP
        const pnl = pos.dir === 'long'
          ? (pos.tp - pos.entry) / pos.entry
          : (pos.entry - pos.tp) / pos.entry;
        totalPnl += pnl - FEE;
        wins++;
        trades++;
        pos = null;
        continue;
      }

      if (slHit) {
        let pnl;
        if (pos.halfClosed) {
          pnl = pos.dir === 'long'
            ? (pos.sl - pos.entry) / pos.entry * pos.remainFrac
            : (pos.entry - pos.sl) / pos.entry * pos.remainFrac;
          totalPnl += pnl - FEE * pos.remainFrac;
        } else {
          pnl = pos.dir === 'long'
            ? (pos.sl - pos.entry) / pos.entry
            : (pos.entry - pos.sl) / pos.entry;
          totalPnl += pnl - FEE;
          trades++;
        }
        pos = null;
        continue;
      }

      continue;
    }

    // No position — check for signal
    const sig = fn(candles1H, i);
    if (!sig) continue;
    if (i + 1 >= candles1H.length) continue;

    const entry = nextOpen;
    const sl = sig.sl;
    const slDist = Math.abs(entry - sl) / entry;
    if (slDist < 0.002 || slDist > 0.15) continue;
    const tp = sig.type === 'long' ? entry * (1 + slDist * RR) : entry * (1 - slDist * RR);

    pos = { dir: sig.type, entry, sl, tp, halfClosed: false, lastTPLevel: null, remainFrac: 1.0 };
    i++; // skip to next candle (already consumed as entry)
  }

  const winRate = trades > 0 ? (wins / trades * 100) : 0;
  return { trades, wins, winRate, totalPnl: totalPnl * 100 };
}

async function runBacktest() {
  const btn = document.getElementById('runBtn');
  btn.disabled = true;
  btn.textContent = 'Running...';
  document.getElementById('log').innerHTML = '';
  document.getElementById('cards').innerHTML = '';
  document.getElementById('summary').style.display = 'none';
  prog(0);

  const pair = document.getElementById('pairSel').value;

  try {
    const candles5m = await fetchCandles5m(pair);
    prog(40);
    const candles1H = aggregate1H(candles5m);
    log(`Aggregated to ${candles1H.length} 1H candles`);
    prog(50);

    const results = [];
    let si = 0;
    for (const strat of STRATEGIES) {
      log(`Running ${strat.name}...`);
      const r = runStrategy(candles1H, strat.id);
      results.push({ ...strat, ...r });
      log(`  ${strat.name}: ${r.trades} trades, ${r.winRate.toFixed(1)}% WR, ${r.totalPnl >= 0 ? '+' : ''}${r.totalPnl.toFixed(2)}% PnL`);
      si++;
      prog(50 + si / STRATEGIES.length * 50);
    }

    // Render cards
    const cards = document.getElementById('cards');
    cards.innerHTML = '';
    for (const r of results) {
      const pnlClass = r.totalPnl >= 0 ? 'up' : 'down';
      const pnlStr = (r.totalPnl >= 0 ? '+' : '') + r.totalPnl.toFixed(2) + '%';
      cards.innerHTML += `
        <div class="card">
          <div class="card-title">Strategy</div>
          <div class="card-strat">${r.name}<span class="card-type type-${r.type.toLowerCase()}">${r.type}</span></div>
          <div class="stat-row"><span class="stat-label">Total Trades</span><span class="stat-val">${r.trades}</span></div>
          <div class="stat-row"><span class="stat-label">Wins</span><span class="stat-val up">${r.wins}</span></div>
          <div class="stat-row"><span class="stat-label">Win Rate</span><span class="stat-val ${r.winRate >= 50 ? 'up' : 'down'}">${r.winRate.toFixed(1)}%</span></div>
          <div class="stat-row"><span class="stat-label">Total PnL</span><span class="stat-val ${pnlClass}">${pnlStr}</span></div>
        </div>`;
    }

    // Summary
    const totalTrades = results.reduce((s, r) => s + r.trades, 0);
    const totalWins   = results.reduce((s, r) => s + r.wins, 0);
    const avgPnl      = results.reduce((s, r) => s + r.totalPnl, 0) / results.length;
    const best = results.reduce((a, b) => a.totalPnl > b.totalPnl ? a : b);
    const sumEl = document.getElementById('summary');
    sumEl.style.display = 'block';
    sumEl.innerHTML = `
      <h2>Summary — ${pair}</h2>
      <div class="sum-row"><span style="color:#666">Total trades (all strategies)</span><span>${totalTrades}</span></div>
      <div class="sum-row"><span style="color:#666">Combined win rate</span><span class="${totalTrades > 0 && totalWins/totalTrades >= 0.5 ? 'up' : 'down'}">${totalTrades > 0 ? (totalWins/totalTrades*100).toFixed(1) : 0}%</span></div>
      <div class="sum-row"><span style="color:#666">Average PnL across strategies</span><span class="${avgPnl >= 0 ? 'up' : 'down'}">${avgPnl >= 0 ? '+' : ''}${avgPnl.toFixed(2)}%</span></div>
      <div class="sum-row"><span style="color:#666">Best strategy</span><span class="up">${best.name} (${best.totalPnl >= 0 ? '+' : ''}${best.totalPnl.toFixed(2)}%)</span></div>`;

    prog(100);
    log('Backtest complete.');
  } catch (e) {
    log('ERROR: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Run Backtest';
  }
}
</script>
</body>
</html>
