<script>
// ════════════════════════════════════════════════════════════
// INDICATOR FUNCTIONS — newest-first candles convention
// ════════════════════════════════════════════════════════════

function _sma(closes, period) {
  if (closes.length < period) return null;
  return closes.slice(0, period).reduce(function(s,v){return s+v;}, 0) / period;
}

function _ema(closes, period) {
  if (closes.length < period) return null;
  var rev = closes.slice().reverse(); // oldest-first
  var k = 2 / (period + 1);
  var e = rev.slice(0, period).reduce(function(s,v){return s+v;}, 0) / period;
  for (var i = period; i < rev.length; i++) e = rev[i] * k + e * (1 - k);
  return e;
}

// candles: newest-first
function calcRSI(candles, period) {
  period = period || 14;
  var closes = candles.map(function(c){return parseFloat(c[4]);}).reverse();
  if (closes.length < period + 1) return null;
  var gains = 0, losses = 0;
  for (var i = 1; i <= period; i++) {
    var d = closes[i] - closes[i-1];
    if (d > 0) gains += d; else losses -= d;
  }
  var avgG = gains / period, avgL = losses / period;
  for (var i = period + 1; i < closes.length; i++) {
    var d = closes[i] - closes[i-1];
    avgG = (avgG * (period - 1) + Math.max(0, d)) / period;
    avgL = (avgL * (period - 1) + Math.max(0, -d)) / period;
  }
  if (avgL === 0) return 100;
  return 100 - 100 / (1 + avgG / avgL);
}

// candles: newest-first → returns newest-first HA candles
function calcHACandles(candles) {
  var rev = candles.slice().reverse();
  var ha = [];
  for (var i = 0; i < rev.length; i++) {
    var o=parseFloat(rev[i][1]),h=parseFloat(rev[i][2]),l=parseFloat(rev[i][3]),cl=parseFloat(rev[i][4]);
    var haClose=(o+h+l+cl)/4;
    var haOpen = i===0 ? (o+cl)/2 : (ha[i-1][1]+ha[i-1][4])/2;
    ha.push([rev[i][0], haOpen, Math.max(h,haOpen,haClose), Math.min(l,haOpen,haClose), haClose, rev[i][5]]);
  }
  ha.reverse();
  return ha;
}

// closes: newest-first
function calcEMA200(closes) {
  if (closes.length < 200) return null;
  var rev = closes.slice().reverse();
  var k = 2/201, ema = rev.slice(0,200).reduce(function(s,v){return s+v;},0)/200;
  for (var i = 200; i < rev.length; i++) ema = rev[i]*k + ema*(1-k);
  return ema;
}

// closes: newest-first
function calcStochRSI(closes, rsiLen, stochLen, kSmooth, dSmooth) {
  rsiLen=rsiLen||14; stochLen=stochLen||14; kSmooth=kSmooth||3; dSmooth=dSmooth||3;
  if (closes.length < rsiLen+stochLen+kSmooth+dSmooth+5) return null;
  var rev = closes.slice().reverse();
  var gains=0, losses=0;
  for (var i=1; i<=rsiLen; i++) { var d=rev[i]-rev[i-1]; if(d>0)gains+=d; else losses-=d; }
  var ag=gains/rsiLen, al=losses/rsiLen, rsiSeries=[];
  for (var i=rsiLen; i<rev.length; i++) {
    var rs=al===0?100:ag/al;
    rsiSeries.push(100-100/(1+rs));
    if (i<rev.length-1) { var d=rev[i+1]-rev[i]; ag=(ag*(rsiLen-1)+Math.max(d,0))/rsiLen; al=(al*(rsiLen-1)+Math.max(-d,0))/rsiLen; }
  }
  if (rsiSeries.length < stochLen) return null;
  var stochSeries=[];
  for (var i=stochLen-1; i<rsiSeries.length; i++) {
    var win=rsiSeries.slice(i-stochLen+1,i+1), hi=Math.max.apply(null,win), lo=Math.min.apply(null,win);
    stochSeries.push(hi===lo?50:(rsiSeries[i]-lo)/(hi-lo)*100);
  }
  if (stochSeries.length < kSmooth+dSmooth) return null;
  var kSeries=[];
  for (var i=kSmooth-1; i<stochSeries.length; i++) kSeries.push(stochSeries.slice(i-kSmooth+1,i+1).reduce(function(s,v){return s+v;},0)/kSmooth);
  if (kSeries.length < dSmooth+1) return null;
  var dSeries=[];
  for (var i=dSmooth-1; i<kSeries.length; i++) dSeries.push(kSeries.slice(i-dSmooth+1,i+1).reduce(function(s,v){return s+v;},0)/dSmooth);
  return { k:kSeries[kSeries.length-1], kPrev:kSeries[kSeries.length-2], d:dSeries[dSeries.length-1], dPrev:dSeries[dSeries.length-2] };
}

// ATR — candles newest-first
function calcATR(candles, period) {
  period = period || 14;
  if (candles.length < period + 2) return null;
  var rev = candles.slice().reverse();
  var trs = [];
  for (var i = 1; i < rev.length; i++) {
    var h=parseFloat(rev[i][2]),l=parseFloat(rev[i][3]),pc=parseFloat(rev[i-1][4]);
    trs.push(Math.max(h-l,Math.abs(h-pc),Math.abs(l-pc)));
  }
  if (trs.length < period) return null;
  var atr = trs.slice(0,period).reduce(function(s,v){return s+v;},0)/period;
  for (var i=period;i<trs.length;i++) atr=(atr*(period-1)+trs[i])/period;
  return atr;
}

// MACD — closes newest-first, returns {macd,signal,hist,macdPrev,sigPrev,histPrev}
function calcMACDFull(closes, fast, slow, sig) {
  fast=fast||12; slow=slow||26; sig=sig||9;
  if (closes.length < slow+sig+10) return null;
  var rev=closes.slice().reverse();
  var kF=2/(fast+1),kS=2/(slow+1),kSig=2/(sig+1);
  var emaF=rev.slice(0,fast).reduce(function(s,v){return s+v;},0)/fast;
  var emaS=rev.slice(0,slow).reduce(function(s,v){return s+v;},0)/slow;
  for(var i=fast;i<slow;i++) emaF=rev[i]*kF+emaF*(1-kF);
  var macdArr=[];
  for(var i=slow;i<rev.length;i++){
    emaF=rev[i]*kF+emaF*(1-kF); emaS=rev[i]*kS+emaS*(1-kS);
    macdArr.push(emaF-emaS);
  }
  if(macdArr.length<sig+2) return null;
  var sigL=macdArr.slice(0,sig).reduce(function(s,v){return s+v;},0)/sig;
  var out=[];
  for(var i=sig;i<macdArr.length;i++){sigL=macdArr[i]*kSig+sigL*(1-kSig);out.push({m:macdArr[i],s:sigL});}
  if(out.length<2) return null;
  var c=out[out.length-1],p=out[out.length-2];
  return {macd:c.m,signal:c.s,hist:c.m-c.s,macdPrev:p.m,sigPrev:p.s,histPrev:p.m-p.s};
}

// Bollinger Bands — closes newest-first
function calcBB(closes, period, mult) {
  period=period||20; mult=mult||2;
  if(closes.length<period+1) return null;
  function bb(arr) {
    var sl=arr.slice(0,period);
    var mid=sl.reduce(function(s,v){return s+v;},0)/period;
    var std=Math.sqrt(sl.reduce(function(s,v){return s+Math.pow(v-mid,2);},0)/period);
    return {upper:mid+mult*std,mid:mid,lower:mid-mult*std,std:std,width:2*mult*std/mid};
  }
  var cur=bb(closes),prv=bb(closes.slice(1));
  return {upper:cur.upper,mid:cur.mid,lower:cur.lower,std:cur.std,width:cur.width,
          upperPrev:prv.upper,midPrev:prv.mid,lowerPrev:prv.lower,widthPrev:prv.width};
}

// SuperTrend — candles newest-first, returns {trend,trendPrev,sl}
function calcSupertrend(candles, period, mult) {
  period=period||10; mult=mult||3;
  if(candles.length<period+20) return null;
  var rev=candles.slice().reverse();
  var trs=[];
  for(var i=1;i<rev.length;i++){
    var h=parseFloat(rev[i][2]),l=parseFloat(rev[i][3]),pc=parseFloat(rev[i-1][4]);
    trs.push(Math.max(h-l,Math.abs(h-pc),Math.abs(l-pc)));
  }
  var atrS=[];
  var a=trs.slice(0,period).reduce(function(s,v){return s+v;},0)/period;
  for(var i=0;i<period;i++) atrS.push(null);
  atrS.push(a);
  for(var i=period;i<trs.length;i++){a=(a*(period-1)+trs[i])/period;atrS.push(a);}
  var dirs=[],ups=[],lows=[];
  for(var i=period;i<rev.length-1;i++){
    if(!atrS[i]) continue;
    var hi=parseFloat(rev[i][2]),lo=parseFloat(rev[i][3]),cl=parseFloat(rev[i][4]);
    var mid=(hi+lo)/2;
    var rawU=mid+mult*atrS[i],rawL=mid-mult*atrS[i];
    var pU=ups.length>0?ups[ups.length-1]:rawU;
    var pL=lows.length>0?lows[lows.length-1]:rawL;
    var pCl=parseFloat(rev[i-1][4]);
    var fU=rawU<pU||pCl>pU?rawU:pU;
    var fL=rawL>pL||pCl<pL?rawL:pL;
    ups.push(fU); lows.push(fL);
    var pd=dirs.length>0?dirs[dirs.length-1]:1;
    var d=pd===1?(cl<fL?-1:1):(cl>fU?1:-1);
    dirs.push(d);
  }
  if(dirs.length<2) return null;
  var last=dirs.length-1;
  return {trend:dirs[last],trendPrev:dirs[last-1],
          sl:dirs[last]===1?lows[last]:ups[last]};
}

// ADX + DI — candles newest-first
function calcADX(candles, period) {
  period=period||14;
  if(candles.length<period*3) return null;
  var rev=candles.slice().reverse();
  var trs=[],pdms=[],ndms=[];
  for(var i=1;i<rev.length;i++){
    var h=parseFloat(rev[i][2]),l=parseFloat(rev[i][3]),pc=parseFloat(rev[i-1][4]);
    var ph=parseFloat(rev[i-1][2]),pl=parseFloat(rev[i-1][3]);
    trs.push(Math.max(h-l,Math.abs(h-pc),Math.abs(l-pc)));
    var up=h-ph,dn=pl-l;
    pdms.push(up>dn&&up>0?up:0); ndms.push(dn>up&&dn>0?dn:0);
  }
  if(trs.length<period*2) return null;
  var smT=trs.slice(0,period).reduce(function(s,v){return s+v;},0);
  var smP=pdms.slice(0,period).reduce(function(s,v){return s+v;},0);
  var smN=ndms.slice(0,period).reduce(function(s,v){return s+v;},0);
  var dxArr=[];
  for(var i=period;i<trs.length;i++){
    smT=smT-smT/period+trs[i]; smP=smP-smP/period+pdms[i]; smN=smN-smN/period+ndms[i];
    var pdi=smT>0?100*smP/smT:0,ndi=smT>0?100*smN/smT:0;
    dxArr.push({dx:(pdi+ndi)>0?100*Math.abs(pdi-ndi)/(pdi+ndi):0,pdi:pdi,ndi:ndi});
  }
  if(dxArr.length<period+1) return null;
  var adx=dxArr.slice(0,period).reduce(function(s,v){return s+v.dx;},0)/period;
  for(var i=period;i<dxArr.length;i++) adx=(adx*(period-1)+dxArr[i].dx)/period;
  var c=dxArr[dxArr.length-1],p=dxArr[dxArr.length-2];
  return {adx:adx,pdi:c.pdi,ndi:c.ndi,pdiPrev:p.pdi,ndiPrev:p.ndi};
}

// Ichimoku — candles newest-first
function calcIchimoku(candles) {
  if(candles.length<80) return null;
  function HL(arr,s,n){
    var sl=arr.slice(s,s+n);
    return{h:Math.max.apply(null,sl.map(function(c){return parseFloat(c[2]);})),
           l:Math.min.apply(null,sl.map(function(c){return parseFloat(c[3]);}))};
  }
  var tk=HL(candles,0,9),kj=HL(candles,0,26);
  var tenkan=(tk.h+tk.l)/2,kijun=(kj.h+kj.l)/2;
  var tkP=HL(candles,1,9),kjP=HL(candles,1,26);
  var tenkanPrev=(tkP.h+tkP.l)/2,kijunPrev=(kjP.h+kjP.l)/2;
  var sa26=HL(candles,26,9),sk26=HL(candles,26,26),sb26=HL(candles,26,52);
  var spA=((sa26.h+sa26.l)/2+(sk26.h+sk26.l)/2)/2;
  var spB=(sb26.h+sb26.l)/2;
  var cloudTop=Math.max(spA,spB),cloudBot=Math.min(spA,spB);
  var price=parseFloat(candles[0][4]);
  return{tenkan:tenkan,kijun:kijun,tenkanPrev:tenkanPrev,kijunPrev:kijunPrev,cloudTop:cloudTop,cloudBot:cloudBot,
         aboveCloud:price>cloudTop,belowCloud:price<cloudBot};
}

// WMA helper
function _wma(arr,period){
  if(arr.length<period) return null;
  var sum=0,w=0;
  for(var i=0;i<period;i++){sum+=arr[i]*(period-i);w+=period-i;}
  return sum/w;
}

// Hull MA — closes newest-first
function calcHullMA(closes, period) {
  period=period||9;
  var sp=Math.round(Math.sqrt(period)),hp=Math.floor(period/2);
  if(closes.length<period+sp+5) return null;
  function hma(arr,offset){
    var raw=[];
    for(var j=0;j<=sp;j++){
      var a=_wma(arr.slice(offset+j),hp),b=_wma(arr.slice(offset+j),period);
      if(!a||!b) return null;
      raw.push(2*a-b);
    }
    return _wma(raw,sp);
  }
  var cur=hma(closes,0),prev=hma(closes,1);
  if(cur==null||prev==null) return null;
  return{value:cur,prev:prev};
}

// CCI — candles newest-first
function calcCCI(candles, period) {
  period=period||20;
  if(candles.length<period+1) return null;
  function cci(arr){
    var tps=arr.slice(0,period).map(function(c){return(parseFloat(c[2])+parseFloat(c[3])+parseFloat(c[4]))/3;});
    var sma=tps.reduce(function(s,v){return s+v;},0)/period;
    var md=tps.reduce(function(s,v){return s+Math.abs(v-sma);},0)/period;
    return md>0?(tps[0]-sma)/(0.015*md):0;
  }
  return{value:cci(candles),prev:cci(candles.slice(1))};
}

// Fisher Transform — candles newest-first
function calcFisher(candles, period) {
  period=period||9;
  if(candles.length<period+2) return null;
  function fish(arr,offset){
    var h=Math.max.apply(null,arr.slice(offset,offset+period).map(function(c){return parseFloat(c[2]);}));
    var l=Math.min.apply(null,arr.slice(offset,offset+period).map(function(c){return parseFloat(c[3]);}));
    var cl=parseFloat(arr[offset][4]);
    var r=(h-l)>0?(2*(cl-l)/(h-l))-1:0;
    r=Math.max(-0.999,Math.min(0.999,r));
    return 0.5*Math.log((1+r)/(1-r));
  }
  return{value:fish(candles,0),prev:fish(candles,1)};
}

// Chandelier Exit — candles newest-first
function calcChandelier(candles, period, mult) {
  period=period||22; mult=mult||3;
  if(candles.length<period+15) return null;
  var atr=calcATR(candles,period),atrP=calcATR(candles.slice(1),period);
  if(!atr||!atrP) return null;
  function chanStops(arr,offset,a){
    var hh=Math.max.apply(null,arr.slice(offset,offset+period).map(function(c){return parseFloat(c[2]);}));
    var ll=Math.min.apply(null,arr.slice(offset,offset+period).map(function(c){return parseFloat(c[3]);}));
    return{longStop:hh-mult*a,shortStop:ll+mult*a};
  }
  var s=chanStops(candles,0,atr),sP=chanStops(candles,1,atrP);
  var price=parseFloat(candles[0][4]),pricePrev=parseFloat(candles[1][4]);
  var dir=price>s.longStop?1:price<s.shortStop?-1:0;
  var dirPrev=pricePrev>sP.longStop?1:pricePrev<sP.shortStop?-1:0;
  return{dir:dir,dirPrev:dirPrev,longStop:s.longStop,shortStop:s.shortStop};
}

function detectSignalHAEmaSRSI(candles, currentPrice) {
  if (candles.length < 210) return null;
  var closes = candles.map(function(c){return parseFloat(c[4]);});
  var ema200 = calcEMA200(closes); if (!ema200) return null;
  var srsi = calcStochRSI(closes); if (!srsi) return null;
  var ha = calcHACandles(candles); if (ha.length < 3) return null;
  var haC=ha[0], haP=ha[1];
  var haOpen=haC[1], haHigh=haC[2], haLow=haC[3], haClose=haC[4];
  var pOpen=haP[1], pClose=haP[4];
  var haBody=Math.abs(haClose-haOpen), pBody=Math.abs(pClose-pOpen);
  var lowerWick=Math.min(haOpen,haClose)-haLow, upperWick=haHigh-Math.max(haOpen,haClose);
  var kCrossUp   = srsi.kPrev<srsi.dPrev && srsi.k>=srsi.d && srsi.kPrev<30;
  var strongBull = haClose>haOpen && haBody>pBody*0.8 && lowerWick<haBody*0.15;
  if (currentPrice>ema200 && kCrossUp && strongBull) {
    var swingLow=Math.min.apply(null, candles.slice(1,8).map(function(c){return parseFloat(c[3]);}));
    if (swingLow>=currentPrice) return null;
    return { type:'long', stopLoss:swingLow };
  }
  var kCrossDown = srsi.kPrev>srsi.dPrev && srsi.k<=srsi.d && srsi.kPrev>70;
  var strongBear = haClose<haOpen && haBody>pBody*0.8 && upperWick<haBody*0.15;
  if (currentPrice<ema200 && kCrossDown && strongBear) {
    var swingHigh=Math.max.apply(null, candles.slice(1,8).map(function(c){return parseFloat(c[2]);}));
    if (swingHigh<=currentPrice) return null;
    return { type:'short', stopLoss:swingHigh };
  }
  return null;
}

function detectSignalMARibbon(candles1H, currentPrice) {
  var closes=candles1H.map(function(c){return parseFloat(c[4]);});
  var mas=[10,20,50,100].map(function(p){return {p:p,v:_sma(closes,p)};}).filter(function(m){return m.v;});
  if (mas.length<4) return null;
  var sorted=mas.slice().sort(function(a,b){return a.p-b.p;});
  var bullish=currentPrice>sorted[0].v && sorted.every(function(m,i){return i===0||sorted[i-1].v>m.v;});
  var bearish=currentPrice<sorted[0].v && sorted.every(function(m,i){return i===0||sorted[i-1].v<m.v;});
  if (!bullish&&!bearish) return null;
  if (Math.abs(currentPrice-sorted[0].v)/currentPrice>0.010) return null;
  var sl=bullish
    ? Math.min.apply(null,candles1H.slice(0,5).map(function(c){return parseFloat(c[3]);}))
    : Math.max.apply(null,candles1H.slice(0,5).map(function(c){return parseFloat(c[2]);}));
  var d=Math.abs(currentPrice-sl)/currentPrice;
  if (d<0.005||d>0.12) return null;
  return bullish ? {type:'long',stopLoss:sl} : {type:'short',stopLoss:sl};
}

function detectSignalMA50Bounce(candles1H, currentPrice) {
  var closes = candles1H.map(function(c){return parseFloat(c[4]);});
  if (closes.length < 205) return null;
  var sma50 = _sma(closes, 50);
  var sma200 = _sma(closes, 200);
  if (!sma50 || !sma200) return null;
  var distTo50 = Math.abs(currentPrice - sma50) / currentPrice;
  if (distTo50 > 0.012) return null;
  var recentAbove = 0, recentBelow = 0;
  for (var i = 1; i <= 10; i++) {
    if (parseFloat(candles1H[i][4]) > sma50) recentAbove++;
    else recentBelow++;
  }
  var bodies = candles1H.slice(0,3).map(function(c){return Math.abs(parseFloat(c[4])-parseFloat(c[1]))/parseFloat(c[1]);});
  var isNarrow = bodies.every(function(b){return b <= 0.008;});
  var rsi = calcRSI(candles1H, 14);
  if (!rsi || rsi < 35 || rsi > 65) return null;
  if (sma50 > sma200 && recentAbove >= 7 && currentPrice >= sma50 && isNarrow) {
    var sl = Math.min.apply(null, candles1H.slice(0,5).map(function(c){return parseFloat(c[3]);}));
    var d = (currentPrice - sl) / currentPrice;
    if (d < 0.003 || d > 0.08) return null;
    return { type:'long', stopLoss:sl };
  }
  if (sma50 < sma200 && recentBelow >= 7 && currentPrice <= sma50 && isNarrow) {
    var sl = Math.max.apply(null, candles1H.slice(0,5).map(function(c){return parseFloat(c[2]);}));
    var d = (sl - currentPrice) / currentPrice;
    if (d < 0.003 || d > 0.08) return null;
    return { type:'short', stopLoss:sl };
  }
  return null;
}

function detectSignalICTFibOTE(candles1H, currentPrice) {
  if (candles1H.length < 55) return null;
  var swing = candles1H.slice(1, 51);
  var swingHigh = Math.max.apply(null, swing.map(function(c){return parseFloat(c[2]);}));
  var swingLow  = Math.min.apply(null, swing.map(function(c){return parseFloat(c[3]);}));
  var range = swingHigh - swingLow;
  if (range <= 0) return null;
  var oteBot = swingLow  + range * 0.21;
  var oteTop = swingLow  + range * 0.38;
  var prBot  = swingHigh - range * 0.38;
  var prTop  = swingHigh - range * 0.21;
  var curCandle = candles1H[0];
  var isBullish = parseFloat(curCandle[4]) > parseFloat(curCandle[1]);
  var isBearish = parseFloat(curCandle[4]) < parseFloat(curCandle[1]);
  var rsi = calcRSI(candles1H, 14);
  if (!rsi) return null;
  if (currentPrice >= oteBot && currentPrice <= oteTop && isBullish && rsi < 55) {
    var sl = swingLow * 0.999;
    var d = (currentPrice - sl) / currentPrice;
    if (d < 0.005 || d > 0.15) return null;
    return { type:'long', stopLoss:sl };
  }
  if (currentPrice >= prBot && currentPrice <= prTop && isBearish && rsi > 45) {
    var sl = swingHigh * 1.001;
    var d = (sl - currentPrice) / currentPrice;
    if (d < 0.005 || d > 0.15) return null;
    return { type:'short', stopLoss:sl };
  }
  return null;
}

function aggregate1H(c5_of) {
  var hours = {}, order = [];
  for (var i = 0; i < c5_of.length; i++) {
    var h = Math.floor(parseInt(c5_of[i][0]) / 3600000) * 3600000;
    if (!hours[h]) { hours[h] = []; order.push(h); }
    hours[h].push(c5_of[i]);
  }
  return order.map(function(h) {
    var b = hours[h];
    var hi = b.reduce(function(m,c){return Math.max(m,parseFloat(c[2]));}, -Infinity);
    var lo = b.reduce(function(m,c){return Math.min(m,parseFloat(c[3]));},  Infinity);
    var vol= b.reduce(function(s,c){return s+parseFloat(c[5]);}, 0);
    return [String(h), b[0][1], String(hi), String(lo), b[b.length-1][4], String(vol)];
  });
}

// ════════════════════════════════════════════════════════════
// BACKTEST ENGINE
// ════════════════════════════════════════════════════════════
// SCALP: 100% TP close (no trailing)
// SWING: 50% TP → SL locked at entry+50%*dist → trailing TP (same dist again)
// Fee: OKX 시장가 taker 0.05%/side on notional. notional = equity×notionalFrac
//      where notionalFrac = min(riskFrac/slDist, posSize%/100×leverage)
//      → fee scales with leverage automatically via notionalFrac

// 모든 전략: TP 도달 시 100% 즉시 청산, SL 도달 시 100% 손절
function runBacktest(c5_of, c1h_of, strategy, riskFrac, leverage, posSizePct) {
  var RR = 1.5;
  var maxNotionalFrac = (posSizePct / 100) * leverage;

  var equity = 10000, pos = null, pending = null;
  var trades = [], curve = [], lastDay = -1;
  var wins = 0, total = 0;
  var WARMUP = 2520;

  for (var i = WARMUP; i < c5_of.length - 1; i++) {
    var c   = c5_of[i];
    var ts  = parseInt(c[0]);
    var hi5 = parseFloat(c[2]);
    var lo5 = parseFloat(c[3]);
    var cl5 = parseFloat(c[4]);
    var dayKey = Math.floor(ts / 86400000);
    if (dayKey !== lastDay) { curve.push({ts:ts, equity:equity}); lastDay = dayKey; }

    if (pending && !pos) {
      var entryPx = parseFloat(c5_of[i][1]);
      var actualSlDist = Math.abs(entryPx - pending.sl) / entryPx;
      if (actualSlDist < 0.001) { pending = null; continue; }
      var actualTp = pending.dir==='long' ? entryPx*(1+actualSlDist*RR) : entryPx*(1-actualSlDist*RR);
      var notionalFrac = Math.min(riskFrac / actualSlDist, maxNotionalFrac);
      pos = { dir:pending.dir, entry:entryPx, sl:pending.sl, tp:actualTp,
               slDist:actualSlDist, notionalFrac:notionalFrac, idx:i };
      equity = Math.max(100, equity - equity * notionalFrac * 0.0005);
      pending = null;
    }

    if (pos) {
      var slHit = pos.dir==='long' ? lo5<=pos.sl : hi5>=pos.sl;
      var tpHit = pos.dir==='long' ? hi5>=pos.tp : lo5<=pos.tp;

      if (slHit) {
        var exitRet = pos.dir==='long' ? (pos.sl - pos.entry) / pos.entry : (pos.entry - pos.sl) / pos.entry;
        var pnl = equity * pos.notionalFrac * exitRet;
        equity = Math.max(100, equity + pnl - equity * pos.notionalFrac * 0.0005);
        trades.push({ts:ts, type:'SL', pnl:pnl, eq:equity});
        total++; pos = null;
      } else if (tpHit) {
        var exitRet = pos.dir==='long' ? (pos.tp - pos.entry) / pos.entry : (pos.entry - pos.tp) / pos.entry;
        var pnl = equity * pos.notionalFrac * exitRet;
        equity = Math.max(100, equity + pnl - equity * pos.notionalFrac * 0.0005);
        trades.push({ts:ts, type:'TP', pnl:pnl, eq:equity});
        wins++; total++; pos = null;
      }
    }

    // Detect new signal — 1H close only
    if (!pos && !pending) {
      var is1HClose = (i % 12 === 11);
      if (!is1HClose) continue;

      // Fix: use (i+1)/12 to include the just-completed 1H bar
      var h1Done = Math.floor((i + 1) / 12);
      var c1h_nf = h1Done > 0 ? c1h_of.slice(0, h1Done).reverse() : [];
      var sig = null;

      if      (strategy==='ha_ema_srsi'   && c1h_nf.length>=210) sig=detectSignalHAEmaSRSI(c1h_nf,cl5);
      else if (strategy==='ma_ribbon'     && c1h_nf.length>=105) sig=detectSignalMARibbon(c1h_nf,cl5);
      else if (strategy==='ma50_bounce'   && c1h_nf.length>=210) sig=detectSignalMA50Bounce(c1h_nf,cl5);
      else if (strategy==='ict_fib_ote'   && c1h_nf.length>=60)  sig=detectSignalICTFibOTE(c1h_nf,cl5);
      else if (strategy==='ema_9_21'      && c1h_nf.length>=30)  sig=detectSignalEMA921(c1h_nf,cl5);
      else if (strategy==='ema_21_55'     && c1h_nf.length>=65)  sig=detectSignalEMA2155(c1h_nf,cl5);
      else if (strategy==='macd_signal'   && c1h_nf.length>=55)  sig=detectSignalMACDSignal(c1h_nf,cl5);
      else if (strategy==='macd_zero'     && c1h_nf.length>=55)  sig=detectSignalMACDZero(c1h_nf,cl5);
      else if (strategy==='supertrend'    && c1h_nf.length>=50)  sig=detectSignalSupertrend(c1h_nf,cl5);
      else if (strategy==='bb_bounce'     && c1h_nf.length>=25)  sig=detectSignalBBBounce(c1h_nf,cl5);
      else if (strategy==='bb_breakout'   && c1h_nf.length>=25)  sig=detectSignalBBBreakout(c1h_nf,cl5);
      else if (strategy==='rsi_trend'     && c1h_nf.length>=220) sig=detectSignalRSITrend(c1h_nf,cl5);
      else if (strategy==='adx_di'        && c1h_nf.length>=55)  sig=detectSignalADXDI(c1h_nf,cl5);
      else if (strategy==='ichimoku'      && c1h_nf.length>=85)  sig=detectSignalIchimoku(c1h_nf,cl5);
      else if (strategy==='hull_cross'    && c1h_nf.length>=45)  sig=detectSignalHullCross(c1h_nf,cl5);
      else if (strategy==='chandelier'    && c1h_nf.length>=45)  sig=detectSignalChandelier(c1h_nf,cl5);
      else if (strategy==='fisher'        && c1h_nf.length>=20)  sig=detectSignalFisher(c1h_nf,cl5);
      else if (strategy==='cci_100'       && c1h_nf.length>=25)  sig=detectSignalCCI100(c1h_nf,cl5);
      else if (strategy==='ha_supertrend' && c1h_nf.length>=55)  sig=detectSignalHASupertrend(c1h_nf,cl5);
      else if (strategy==='rsi_bb'        && c1h_nf.length>=25)  sig=detectSignalRSIBB(c1h_nf,cl5);

      if (sig && sig.stopLoss) {
        var slDist = Math.abs(cl5 - sig.stopLoss) / cl5;
        if (slDist >= 0.002 && slDist <= 0.15) {
          var tp = sig.type==='long' ? cl5*(1+slDist*RR) : cl5*(1-slDist*RR);
          pending = { dir:sig.type, sl:sig.stopLoss, tp:tp };
        }
      }
    }
  }

  var winRate = total > 0 ? wins / total : 0;
  var actualDays = curve.length || 365;
  var totalRet = (equity - 10000) / 10000;
  var annRet = Math.pow(1 + totalRet, 365 / actualDays) - 1;
  var monRet = Math.pow(1 + annRet, 1/12) - 1;
  var dayRet = Math.pow(1 + annRet, 1/365) - 1;
  var peak = 0, maxDD = 0;
  curve.forEach(function(p){ if(p.equity>peak)peak=p.equity; var dd=(peak-p.equity)/peak; if(dd>maxDD)maxDD=dd; });
  return { equity:equity, totalRet:totalRet, annRet:annRet, monRet:monRet, dayRet:dayRet,
           totalTrades:total, winRate:winRate,
           maxDD:maxDD, curve:curve, trades:trades };
}

async function fetchCandles5m(pair, onProgress) {
  var ONE_YEAR_AGO = Math.floor(Date.now() / 3600000) * 3600000 - 365*24*3600*1000;
  var all = [], after = '';
  for (var iter = 0; iter < 1200; iter++) {
    var qs = 'instId='+encodeURIComponent(pair)+'&bar=5m&limit=100'+(after?'&after='+after:'');
    try {
      var res = await fetch('https://www.okx.com/api/v5/market/history-candles?'+qs);
      var j = await res.json();
      var batch = j.data || [];
      if (!batch.length) break;
      all.push.apply(all, batch);
      after = batch[batch.length-1][0];
      if (onProgress) onProgress(all.length);
      if (parseInt(batch[batch.length-1][0]) <= ONE_YEAR_AGO) break;
      await new Promise(function(r){setTimeout(r,50);});
    } catch(e) { break; }
  }
  var seen = {}, deduped = [];
  all.forEach(function(c){ if(!seen[c[0]]){seen[c[0]]=1;deduped.push(c);} });
  return deduped.filter(function(c){return parseInt(c[0])>=ONE_YEAR_AGO;}).reverse();
}

// ════════════════════════════════════════════════════════════

var BT_STRATS = [
  {id:'ha_ema_srsi',   name:'HA+EMA+StochRSI',   type:'SWING'},
  {id:'ma_ribbon',     name:'MA Ribbon',           type:'SWING'},
  {id:'ma50_bounce',   name:'MA50 Bounce',         type:'SCALP'},
  {id:'ict_fib_ote',   name:'ICT Fibonacci OTE',   type:'SWING'},
  {id:'ema_9_21',      name:'EMA Cross 9/21',      type:'SCALP'},
  {id:'ema_21_55',     name:'EMA Cross 21/55',     type:'SWING'},
  {id:'macd_signal',   name:'MACD Signal Cross',   type:'SWING'},
  {id:'macd_zero',     name:'MACD Zero Cross',     type:'SWING'},
  {id:'supertrend',    name:'SuperTrend(10,3)',     type:'SWING'},
  {id:'bb_bounce',     name:'BB Bounce',           type:'SCALP'},
  {id:'bb_breakout',   name:'BB Breakout',         type:'SWING'},
  {id:'rsi_trend',     name:'RSI+EMA200 Trend',    type:'SWING'},
  {id:'adx_di',        name:'ADX+DI Cross',        type:'SWING'},
  {id:'ichimoku',      name:'Ichimoku TK+Cloud',   type:'SWING'},
  {id:'hull_cross',    name:'Hull MA Cross',        type:'SWING'},
  {id:'chandelier',    name:'Chandelier Exit',      type:'SWING'},
  {id:'fisher',        name:'Fisher Transform',     type:'SCALP'},
  {id:'cci_100',       name:'CCI ±100',       type:'SCALP'},
  {id:'ha_supertrend', name:'HA+SuperTrend',        type:'SWING'},
  {id:'rsi_bb',        name:'RSI+BB Combo',        type:'SCALP'}
];

var _c5of = null, _c1hof = null, _results = {}, _chart = null, _loadedPair = '';

function onPairChange() {
  var p = (document.getElementById('btPair').value||'').toUpperCase().trim();
  document.getElementById('btStartBtn').textContent =
    p !== _loadedPair ? '백테스팅 시작 (20개 전략 · 약 3분 소요)' : '다시 실행 (캐시 재사용)';
}

function pct(v,d){d=d==null?2:d; return (v>=0?'+':'')+(v*100).toFixed(d)+'%';}
function clr(v){return v>=0?'#22c55e':'#ef4444';}

async function startBacktest() {
  var pair    = (document.getElementById('btPair').value||'BTC-USDT-SWAP').toUpperCase().trim();
  var riskPct = parseFloat(document.getElementById('btRisk').value) || 2;
  var lev     = parseFloat(document.getElementById('btLev').value)  || 10;
  var posSz   = parseFloat(document.getElementById('btPos').value)  || 10;

  var btn=document.getElementById('btStartBtn');
  var prog=document.getElementById('btProg');
  var bar=document.getElementById('btBar');
  var msg=document.getElementById('btMsg');

  btn.disabled=true;
  prog.style.display='block';

  if (_c5of && _loadedPair === pair) {
    bar.style.width='42%';
    msg.textContent='캐시 데이터 재사용: '+_c5of.length.toLocaleString()+'개 5분봉 (동일 결과 보장)';
    btn.textContent='실행 중...';
    await new Promise(function(r){setTimeout(r,10);});
  } else {
    btn.textContent='데이터 수집 중...';
    bar.style.width='0%';
    msg.textContent='OKX 5분봉 데이터 수집 중 (약 10만 개)...';
    try {
      _c5of = await fetchCandles5m(pair, function(n){
        bar.style.width=Math.min(40, n/2625)+'%';
        msg.textContent='5분봉 수집: '+n.toLocaleString()+'개...';
      });
      _loadedPair = pair;
    } catch(e) {
      msg.textContent='데이터 수집 실패: '+(e.message||e);
      btn.disabled=false; btn.textContent='백테스팅 시작 (20개 전략 · 약 3분 소요)';
      return;
    }
  }

  bar.style.width='42%';
  msg.textContent='1H 집계 중... ('+_c5of.length.toLocaleString()+'개 5분봉)';
  await new Promise(function(r){setTimeout(r,10);});
  _c1hof = aggregate1H(_c5of);

  msg.textContent='5분봉 '+_c5of.length.toLocaleString()+'개 / 1H '+_c1hof.length.toLocaleString()+'개 → 백테스팅 실행 중';

  _results = {};
  for (var si = 0; si < BT_STRATS.length; si++) {
    var s = BT_STRATS[si];
    bar.style.width=(42 + si/BT_STRATS.length*56)+'%';
    msg.textContent='['+(si+1)+'/'+BT_STRATS.length+'] '+s.name+' 백테스팅 중...';
    await new Promise(function(r){setTimeout(r,0);});
    _results[s.id] = runBacktest(_c5of, _c1hof, s.id, riskPct / 100, lev, posSz);
  }

  bar.style.width='100%';
  msg.textContent='완료! 5분봉 '+_c5of.length.toLocaleString()+'개 · 1H '+_c1hof.length.toLocaleString()+'개 사용 (캐시 보존)';
  btn.disabled=false; btn.textContent='다시 실행 (캐시 재사용)';

  renderTable();
  buildTabs();
  showChart(BT_STRATS[0].id);
}

function renderTable() {
  var tbody = document.getElementById('btTbody');
  var rows = BT_STRATS.map(function(s){
    var r = _results[s.id];
    if (!r) return '';
    var isNA = r.totalTrades === 0;
    var typeColor = s.type==='SCALP' ? '#f59e0b' : '#22c55e';
    var typeBg    = s.type==='SCALP' ? 'rgba(245,158,11,0.12)' : 'rgba(34,197,94,0.12)';
    var typeBadge = '<span style="font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;background:'+typeBg+';color:'+typeColor+';margin-left:6px;">'+s.type+'</span>';
    var dr = isNA?'N/A':'<span style="color:'+clr(r.dayRet)+'">'+pct(r.dayRet)+'</span>';
    var mr = isNA?'N/A':'<span style="color:'+clr(r.monRet)+'">'+pct(r.monRet)+'</span>';
    var ar = isNA?'N/A':'<span style="color:'+clr(r.annRet)+'">'+pct(r.annRet,1)+'</span>';
    var dd = isNA?'N/A':'<span style="color:#ef4444">-'+pct(r.maxDD,1).replace('+','')+'</span>';
    var wr = isNA?'N/A':'<span style="color:'+clr(r.winRate-0.5)+'">'+Math.round(r.winRate*100)+'%</span>';
    return '<tr>'+
      '<td>'+s.name+typeBadge+'</td>'+
      '<td style="text-align:center;">'+s.type+'</td>'+
      '<td>'+r.totalTrades+'</td>'+
      '<td>'+wr+'</td>'+
      '<td>'+dr+'</td>'+
      '<td>'+mr+'</td>'+
      '<td>'+ar+'</td>'+
      '<td>'+dd+'</td>'+
      '<td style="text-align:center;"><button onclick="showChart(\''+s.id+'\')" style="background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);color:#fff;padding:4px 12px;border-radius:6px;cursor:pointer;font-size:12px;font-family:inherit;">차트</button></td>'+
    '</tr>';
  }).join('');
  tbody.innerHTML = rows;
  document.getElementById('btResultCard').classList.remove('hidden');
}

function buildTabs() {
  var el = document.getElementById('btTabs');
  el.innerHTML = BT_STRATS.map(function(s){
    return '<button class="tab" id="tab_'+s.id+'" onclick="showChart(\''+s.id+'\')">'+s.name+'</button>';
  }).join('');
}

function showChart(id) {
  var s = BT_STRATS.find(function(x){return x.id===id;});
  var r = _results[id];
  if (!s||!r) return;

  BT_STRATS.forEach(function(x){
    var t=document.getElementById('tab_'+x.id);
    if(t) t.classList.toggle('active', x.id===id);
  });

  var t = s.name+' | 연 복리: '+pct(r.annRet,1)+
    ' | 승률: '+Math.round(r.winRate*100)+'%'+
    ' | 거래: '+r.totalTrades+'건'+
    ' | 최대낙폭: -'+pct(r.maxDD,1).replace('+','');
  document.getElementById('btChartTitle').textContent = t;

  var ctx = document.getElementById('btCanvas').getContext('2d');
  if (_chart) _chart.destroy();

  var labels = r.curve.map(function(p){return new Date(p.ts).toLocaleDateString('ko-KR',{month:'2-digit',day:'2-digit'});});
  var data   = r.curve.map(function(p){return p.equity;});
  var isPos  = r.annRet >= 0;
  var col    = isPos ? '#22c55e' : '#ef4444';
  var grd    = ctx.createLinearGradient(0,0,0,280);
  grd.addColorStop(0, isPos?'rgba(34,197,94,0.25)':'rgba(239,68,68,0.25)');
  grd.addColorStop(1,'rgba(0,0,0,0)');

  _chart = new Chart(ctx, {
    type:'line',
    data:{labels:labels,datasets:[{label:'자산($)',data:data,borderColor:col,borderWidth:1.5,
          pointRadius:0,fill:true,backgroundColor:grd,tension:0.3}]},
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:function(c){return '$'+c.parsed.y.toFixed(0);}}}},
      scales:{
        x:{ticks:{color:'rgba(255,255,255,0.3)',maxTicksLimit:12,font:{size:10}},grid:{color:'rgba(255,255,255,0.04)'}},
        y:{ticks:{color:'rgba(255,255,255,0.4)',font:{size:10},callback:function(v){return '$'+v.toFixed(0);}},grid:{color:'rgba(255,255,255,0.06)'}}
      }
    }
  });
  document.getElementById('btChartCard').classList.remove('hidden');
  document.getElementById('btChartCard').scrollIntoView({behavior:'smooth',block:'nearest'});
}
